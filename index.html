  /* annual projection tables */
  .ap-thead{display:grid;grid-template-columns:1fr 84px 92px 26px;gap:8px;font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;padding:0 2px 6px;}
  .ap-thead span:nth-child(2),.ap-thead span:nth-child(3){text-align:right;}
  .ap-row{display:grid;grid-template-columns:1fr 84px 92px 26px;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid #F2F1F8;}
  .ap-row input{border:1px solid #E4E3EE;border-radius:9px;padding:8px 9px;font-size:12.5px;font-family:inherit;background:#FAFAFD;color:#1A1A22;width:100%;}
  .ap-row input:focus{outline:none;border-color:var(--accent);background:#fff;}
  .ap-amt{text-align:right;font-variant-numeric:tabular-nums;}
  .ap-acc{font-size:11.5px;font-weight:700;color:#1A1A22;text-align:right;font-variant-numeric:tabular-nums;}
  .ap-del{border:0;background:none;color:#C9C8D3;cursor:pointer;padding:2px;display:flex;justify-content:center;}
  .ap-del svg{width:15px;height:15px;}
  .ap-foot{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;font-weight:700;color:#1A1A22;border-top:1px dashed #E4E3EE;margin-top:8px;padding-top:10px;}
  .ap-foot b{font-variant-numeric:tabular-nums;}
  /* scheduled cost rows */
  .sc-row{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid #F2F1F8;}
  .sc-main{flex:1;min-width:0;}
  .sc-desc{font-size:13px;font-weight:600;color:#1A1A22;}
  .sc-meta{font-size:11px;color:var(--muted);margin-top:3px;}
  .sc-amt{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;}
  .sc-tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;}
  .sc-tag.annual{background:#EEF2FF;color:#2563EB;}
  .sc-tag.holiday{background:#FEF3C7;color:#B45309;}
  /* homepage: saving vs cost comparison bars */
  .apc-bars{margin-top:2px;}
  .apc-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .apc-lbl{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:#1A1A22;}
  .apc-dot{width:9px;height:9px;border-radius:50%;flex:none;}
  .apc-dot.save{background:#159250;}
  .apc-dot.cost{background:#E4621F;}
  .apc-val{font-size:12.5px;font-weight:800;font-variant-numeric:tabular-nums;}
  .apc-val.pos{color:#159250;}
  .apc-val.neg{color:#C2410C;}
  .apc-track{height:9px;background:#EDECF4;border-radius:999px;overflow:hidden;}
  .apc-fill{height:100%;border-radius:999px;}
  .apc-fill.save{background:linear-gradient(90deg,#22C55E,#159250);}
  .apc-fill.save.deficit{background:linear-gradient(90deg,#EF4444,#991B1B);}
  .apc-fill.cost{background:linear-gradient(90deg,#F97316,#C2410C);}
  .apc-note{display:flex;align-items:flex-start;gap:7px;font-size:11px;line-height:1.5;font-weight:600;color:var(--muted);margin-top:11px;}
  .apc-note svg{width:13px;height:13px;flex:none;margin-top:1px;}
  .apc-links{display:flex;flex-direction:column;gap:2px;margin-top:12px;border-top:1px solid #F2F1F8;padding-top:8px;}
  .apc-link{display:flex;justify-content:space-between;align-items:center;width:100%;background:none;border:0;font-family:inherit;font-size:12px;font-weight:700;color:var(--accent,#2563EB);padding:8px 0;cursor:pointer;text-align:left;}
  .apc-link svg{width:14px;height:14px;}
  /* info icon + popover (Atur Annual Projection) */
  .apc-info-btn{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;padding:0;border:0;background:none;color:var(--muted);cursor:pointer;opacity:.75;}
  .apc-info-btn:hover,.apc-info-btn:active{opacity:1;color:var(--accent,#2563EB);}
  .apc-info-btn svg{width:15px;height:15px;}
  .apc-pop-mask{position:absolute;inset:0;z-index:60;display:flex;align-items:flex-end;background:rgba(15,15,22,.32);animation:popFade .18s ease;}
  .apc-pop{width:100%;background:#fff;border-radius:20px 20px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom)) 20px;box-shadow:0 -8px 30px rgba(0,0,0,.18);animation:popUp .24s cubic-bezier(.22,1,.36,1);}
  .apc-pop h4{margin:0 0 4px;font-size:15px;font-weight:800;color:#16161C;}
  .apc-pop p{margin:0 0 12px;font-size:12.5px;line-height:1.55;color:var(--muted);font-weight:600;}
  .apc-pop .apc-pop-row{display:flex;align-items:flex-start;gap:9px;font-size:12px;line-height:1.5;font-weight:600;color:#33333D;padding:9px 0;border-top:1px solid #F2F1F8;}
  .apc-pop .apc-pop-row svg{width:15px;height:15px;flex:none;margin-top:1px;color:var(--accent,#2563EB);}
  .apc-pop-close{margin-top:14px;width:100%;border:0;border-radius:13px;background:#16161C;color:#fff;font-family:inherit;font-size:13.5px;font-weight:800;padding:13px;cursor:pointer;}
  @keyframes popFade{from{opacity:0}to{opacity:1}}
  @keyframes popUp{from{transform:translateY(24px);opacity:.4}to{transform:translateY(0);opacity:1}}
  /* homepage: wealth mini composition */
  .wealth-mini{display:grid;grid-template-columns:1fr 1fr;gap:7px 14px;margin-top:12px;}
  .wm-item{display:flex;align-items:center;gap:7px;font-size:11.5px;}
  .wm-dot{width:8px;height:8px;border-radius:50%;flex:none;}
  .wm-nm{flex:1;color:#1A1A22;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .wm-pc{font-weight:800;font-variant-numeric:tabular-nums;color:var(--muted);}
  /* wealth detail screen legend */
  .wealth-legend{margin-top:12px;}
  .wl-item{display:flex;align-items:center;gap:9px;padding:7px 0;font-size:12.5px;}
  .wl-nm{flex:1;color:#1A1A22;font-weight:600;}
  .wl-pc{font-weight:800;font-variant-numeric:tabular-nums;color:var(--muted);}

  /* ===== v1.9.0: proyeksi kekayaan (slider + grafik) di beranda ===== */
  .form-suffix{display:flex;align-items:center;gap:8px;}
  .form-suffix .form-in{flex:1;}
  .form-suffix-tx{font-size:13px;font-weight:800;color:var(--muted);flex:none;}
  /* kolom angka pendek (mis. bunga %/th) — tak perlu selebar layar */
  .rate-suffix{justify-content:flex-start;}
  .rate-suffix .form-in{flex:none;width:120px;max-width:48%;}
  .wealth-proj{margin-top:14px;padding-top:14px;border-top:1px solid var(--line);}
  .wp-head{display:flex;justify-content:space-between;align-items:center;}
  .wp-lbl{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:800;color:var(--ink);}
  .wp-lbl svg{width:14px;height:14px;}
  .wp-rate{font-size:10.5px;font-weight:700;color:var(--muted);background:#F1F0F7;padding:3px 8px;border-radius:999px;}
  .wp-val{font-size:21px;font-weight:900;color:var(--ink);margin:8px 0 1px;font-variant-numeric:tabular-nums;}
  .wp-gain{font-size:11.5px;font-weight:700;color:#16A34A;margin-bottom:10px;}
  .wp-chart{display:flex;align-items:flex-end;gap:6px;height:78px;padding:0 1px;}
  .wp-bar{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:5px;height:100%;border:none;background:transparent;cursor:pointer;font-family:inherit;padding:0;}
  .wp-bar .wp-col{width:100%;max-width:26px;height:var(--h);min-height:6px;background:#DBD9E6;border-radius:7px 7px 4px 4px;transition:background .15s,transform .15s;}
  .wp-bar.base .wp-col{background:#C8C6D6;}
  .wp-bar.on .wp-col{background:var(--accent,#2563EB);transform:scaleY(1.02);}
  .mode-b .wp-bar.on .wp-col{background:#C2410C;}
  .wp-yl{font-size:9.5px;font-weight:700;color:var(--faint);}
  .wp-bar.on .wp-yl{color:var(--ink);font-weight:800;}
  .wp-sliderrow{display:flex;align-items:center;gap:10px;margin-top:12px;}
  .wp-sl-lbl{font-size:10px;font-weight:700;color:var(--faint);flex:none;}
  .wp-slider{flex:1;-webkit-appearance:none;appearance:none;height:5px;border-radius:999px;background:#E3E1EE;outline:none;}
  .wp-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;background:#2563EB;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.2);}
  .mode-b .wp-slider::-webkit-slider-thumb{background:#C2410C;}
  .wp-slider::-moz-range-thumb{width:18px;height:18px;border:none;border-radius:50%;background:#2563EB;cursor:pointer;}
  .mode-b .wp-slider::-moz-range-thumb{background:#C2410C;}
  .wp-note{font-size:10.5px;color:var(--faint);font-weight:600;margin-top:9px;line-height:1.4;}
  /* form helpers */
  .form-row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .form-row2 .form-grp{margin-bottom:0;}
  .prev-card{background:#F7F7FB;border-radius:13px;padding:12px 14px;margin-bottom:14px;}
  /* goal type picker */
  .type-pick{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px;}
  .type-opt{border:1.5px solid #ECEBF3;background:#fff;border-radius:14px;padding:13px 11px;display:flex;flex-direction:column;align-items:flex-start;gap:3px;cursor:pointer;font-family:inherit;color:#64607A;}
  .type-opt svg{width:20px;height:20px;margin-bottom:3px;}
  .type-opt span{font-size:13px;font-weight:800;color:#1A1A22;}
  .type-opt small{font-size:10.5px;color:var(--muted);line-height:1.3;}
  .type-opt.on{border-color:var(--accent,#2563EB);background:#F2F6FF;box-shadow:0 0 0 3px rgba(37,99,235,.10);}
  .ng-item{background:#F7F7FB;border-radius:13px;padding:12px;margin-bottom:10px;}
  .goal-sumrow{display:flex;justify-content:space-between;align-items:center;background:#fff;border-radius:13px;padding:13px 14px;margin:6px 0 14px;box-shadow:var(--sh-sm);font-size:12.5px;color:var(--muted);font-weight:600;}
  .goal-sumrow b{font-size:15px;}
  .goal-recapnote{font-size:12px;color:var(--muted);margin-top:10px;line-height:1.5;}

  /* profile / settings sheet */
  .prof-top{display:flex;align-items:center;gap:14px;background:#fff;border-radius:20px;padding:16px;box-shadow:var(--sh-md);margin-bottom:16px;}
  .prof-ava{width:54px;height:54px;border-radius:18px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:20px;flex:none;}
  .mode-s .prof-ava{background:linear-gradient(145deg,#3B82F6,#2563EB);}
  .mode-b .prof-ava{background:linear-gradient(145deg,#E4621F,#C2410C);}
  .prof-nm{font-size:17px;font-weight:700;}
  .prof-em{font-size:12px;color:var(--muted);margin-top:2px;}
  .set-group{background:#fff;border-radius:18px;box-shadow:var(--sh-sm);overflow:hidden;margin-bottom:14px;}
  .set-row{display:flex;align-items:center;gap:13px;padding:14px 16px;border-bottom:1px solid #F2F1F8;cursor:pointer;}
  .set-row:last-child{border-bottom:none;}
  .set-ic{width:34px;height:34px;border-radius:11px;background:#F2F1F8;display:flex;align-items:center;justify-content:center;color:var(--ink);flex:none;}
  .set-lbl{flex:1;font-size:14px;font-weight:600;}
  .set-val{font-size:12px;color:var(--muted);margin-right:6px;}
  .grp-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--faint);margin:4px 2px 8px;}

  .sec-card{background:#fff;border-radius:20px;padding:18px;box-shadow:var(--sh-md);margin-bottom:14px;position:relative;}

  /* ===== Turn 24: onboarding ===== */
  .ob-hi{font-size:23px;font-weight:800;color:var(--ink);margin-top:6px;letter-spacing:-.02em;}
  .ob-sub{font-size:13px;color:var(--muted);line-height:1.55;margin:10px 0 22px;max-width:280px;}
  .ob-input{width:100%;border:1.5px solid #E3E1EE;border-radius:14px;padding:15px 16px;font-family:inherit;font-size:15px;font-weight:600;color:var(--ink);background:#fff;outline:none;text-align:center;transition:border-color .15s,box-shadow .15s;}
  .ob-input:focus{border-color:#2563EB;box-shadow:0 0 0 3px rgba(37,99,235,.12);}
  .ob-input::placeholder{color:#B4B1C4;font-weight:500;}
  .ob-btn{width:100%;border:none;border-radius:14px;padding:15px;margin-top:14px;background:#2563EB;color:#fff;font-family:inherit;font-size:14.5px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;box-shadow:0 8px 20px -6px rgba(37,99,235,.5);transition:transform .12s,box-shadow .12s;}
  .ob-btn:active{transform:scale(.97);}
  .ob-btn svg{stroke:#fff;}
  .ob-foot{font-size:11px;color:var(--faint);margin-top:20px;line-height:1.5;display:flex;align-items:center;gap:6px;max-width:280px;text-align:left;}
  .ob-foot svg{flex:none;}
  @keyframes shakeX{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}
  .shake{animation:shakeX .4s;border-color:#DC2626 !important;}

  /* ===== Turn 24: form fields ===== */
  .fld-lbl{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);margin:0 2px 7px;}
  .fld-inp{width:100%;border:1.5px solid #E3E1EE;border-radius:13px;padding:13px 14px;font-family:inherit;font-size:14.5px;font-weight:600;color:var(--ink);background:#fff;outline:none;transition:border-color .15s,box-shadow .15s;box-sizing:border-box;}
  .fld-inp:focus{border-color:#2563EB;box-shadow:0 0 0 3px rgba(37,99,235,.12);}
  .fld-inp::placeholder{color:#B4B1C4;font-weight:500;}

  /* ===== Turn 24: Berdua lock overlay ===== */
  .bd-scrim{position:absolute;inset:0;z-index:60;display:flex;align-items:flex-end;justify-content:center;background:rgba(20,16,40,.46);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);opacity:0;transition:opacity .24s;padding:18px;}
  .bd-scrim.show{opacity:1;}
  .bd-card{width:100%;max-width:360px;background:#fff;border-radius:24px;padding:26px 22px 22px;text-align:center;box-shadow:0 -10px 40px -8px rgba(0,0,0,.3);transform:translateY(24px);transition:transform .28s cubic-bezier(.2,.8,.2,1);}
  .bd-scrim.show .bd-card{transform:translateY(0);}
  .bd-ic{width:52px;height:52px;border-radius:16px;background:linear-gradient(135deg,#FDE7D9,#FBD0B5);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;color:#C2410C;}
  .bd-ic svg{width:22px;height:22px;}
  .bd-t{font-size:18px;font-weight:800;color:var(--ink);letter-spacing:-.01em;}
  .bd-d{font-size:12.5px;color:var(--muted);line-height:1.55;margin:8px 0 18px;}
  .bd-card .ob-btn{background:#C2410C;box-shadow:0 8px 20px -6px rgba(194,65,12,.5);}
  .bd-card .fld-inp:focus{border-color:#C2410C;box-shadow:0 0 0 3px rgba(194,65,12,.12);}
  .bd-share{width:100%;border:none;background:transparent;color:#C2410C;font-family:inherit;font-size:12.5px;font-weight:700;cursor:pointer;margin-top:12px;display:flex;align-items:center;justify-content:center;gap:7px;padding:8px;}
  .bd-share svg{stroke:#C2410C;}
  .bd-skip{width:100%;border:none;background:transparent;color:var(--faint);font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;margin-top:6px;padding:6px;text-decoration:underline;}

  /* ===== Turn 24: import review ===== */
  .imp-cat,.imp-sub{font-family:inherit;font-size:12px;font-weight:600;color:var(--ink);border:1.4px solid #E3E1EE;border-radius:10px;padding:7px 9px;background:#fff;outline:none;max-width:100%;}
  .imp-cat:focus,.imp-sub:focus{border-color:#2563EB;}
  .imp-ok{border-color:#16A34A !important;background:#F0FDF4 !important;}

  /* ===== Turn 25: editable review fields ===== */
  .imp-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px;}
  .imp-dirtoggle{display:inline-flex;background:#F2F1F8;border-radius:11px;padding:3px;gap:2px;}
  .imp-dirbtn{display:inline-flex;align-items:center;gap:4px;border:none;background:transparent;font-family:inherit;font-size:11.5px;font-weight:700;color:var(--muted);padding:6px 11px;border-radius:9px;cursor:pointer;transition:all .14s;}
  .imp-dirbtn svg{width:12px;height:12px;}
  .imp-dirbtn.on.in{background:#fff;color:#16A34A;box-shadow:var(--sh-sm);}
  .imp-dirbtn.on.out{background:#fff;color:#DC2626;box-shadow:var(--sh-sm);}
  .imp-dirbtn.on.trf{background:#fff;color:#4F46E5;box-shadow:var(--sh-sm);}
  .imp-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .imp-fld{display:flex;flex-direction:column;grid-column:1 / -1;}
  .imp-fld.imp-half{grid-column:span 1;}
  .imp-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);margin:0 0 5px 2px;}
  .imp-inp{width:100%;border:1.4px solid #E3E1EE;border-radius:11px;padding:11px 12px;font-family:inherit;font-size:13.5px;font-weight:600;color:var(--ink);background:#fff;outline:none;box-sizing:border-box;transition:border-color .14s,box-shadow .14s;}
  .imp-inp:focus{border-color:#2563EB;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
  .imp-inp::placeholder{color:#B4B1C4;font-weight:500;}
  .imp-sel{width:100%;border:1.4px solid #E3E1EE;border-radius:11px;padding:11px 12px;font-family:inherit;font-size:13px;font-weight:600;color:var(--ink);background:#fff;outline:none;box-sizing:border-box;cursor:pointer;}
  .imp-sel:focus{border-color:#2563EB;}
  .mode-b .imp-inp:focus{border-color:#C2410C;box-shadow:0 0 0 3px rgba(194,65,12,.1);}
  .mode-b .imp-sel:focus{border-color:#C2410C;}

  /* ===== Turn 26: ringkasan transaksi (collapse/expand) ===== */
  .imp-card{padding:0;overflow:hidden;}
  .imp-summary{display:flex;align-items:center;gap:11px;width:100%;border:none;background:transparent;font-family:inherit;text-align:left;padding:13px 14px;cursor:pointer;}
  .imp-sum-dir{flex:none;width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;}
  .imp-sum-dir svg{width:15px;height:15px;}
  .imp-sum-dir.in{background:#ECFDF3;color:#16A34A;}
  .imp-sum-dir.out{background:#FEF2F2;color:#DC2626;}
  .imp-sum-dir.trf{background:#EEF0FE;color:#4F46E5;}
  .imp-sum-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px;}
  .imp-sum-desc{font-size:13.5px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .imp-sum-meta{font-size:11px;font-weight:600;color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .imp-sum-right{flex:none;display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
  .imp-sum-amt{font-size:13.5px;font-weight:800;}
  .imp-sum-amt.in{color:#16A34A;}
  .imp-sum-amt.out{color:#DC2626;}
  .imp-sum-amt.trf{color:#4F46E5;}
  .imp-sum-chev{flex:none;color:#B7B6C4;transition:transform .26s;display:flex;align-items:center;}
  .imp-card.open .imp-sum-chev{transform:rotate(180deg);}
  .imp-body{padding:2px 14px 14px;border-top:1px solid #EEEDF5;margin-top:2px;}
  .imp-body[hidden]{display:none;}
  .imp-body .imp-hd{justify-content:flex-start;margin:12px 0;}

  /* ===== v1.9.1: Tinjau Hasil AI — saringan PERIODE tanggal (Dari … Sampai) + tampilan ringkas ===== */
  .imp-period{background:#fff;border:1.4px solid #E3E1EE;border-radius:14px;padding:11px 12px;margin:0 0 10px;}
  .imp-period-row{display:flex;align-items:flex-end;gap:9px;}
  .imp-period-fld{flex:1;display:flex;flex-direction:column;gap:4px;min-width:0;}
  .imp-period-fld>span{font-size:10.5px;font-weight:800;letter-spacing:.02em;text-transform:uppercase;color:var(--muted);}
  .imp-period-fld select{width:100%;font-family:inherit;font-size:13px;font-weight:700;color:var(--ink);background:#F6F5FB;border:1.3px solid #E3E1EE;border-radius:10px;padding:8px 9px;-webkit-appearance:none;appearance:none;cursor:pointer;}
  .imp-period-fld select:focus{outline:none;border-color:var(--accent);}
  .imp-period-dash{padding-bottom:9px;color:var(--faint);font-weight:800;}
  .imp-period-foot{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:9px;}
  .imp-period-n{font-size:11.5px;font-weight:700;color:var(--muted);}
  .imp-period-reset{flex:none;font-family:inherit;font-size:11.5px;font-weight:800;color:var(--accent);background:none;border:none;padding:2px 0;cursor:pointer;}
  .imp-empty{text-align:center;color:var(--faint);font-size:12.5px;font-weight:600;padding:26px 16px;}
  /* lebih ringkas: rapatkan ringkasan kartu */
  .imp-scroll .imp-card{margin-bottom:8px;}
  .imp-scroll .imp-summary{padding:11px 13px;gap:10px;}
  .imp-scroll .imp-sum-dir{width:28px;height:28px;border-radius:8px;}

  /* ============================================================
     ANTI AUTO-ZOOM iOS — Safari/iOS otomatis zoom-in saat fokus ke
     input/select/textarea ber-font < 16px. Paksa semua kontrol form
     minimal 16px HANYA di layar HP (coarse pointer / layar kecil),
     agar tampilan desktop tetap. 16px = ambang aman, tak memicu zoom.
     ============================================================ */
  @media (max-width:768px), (pointer:coarse){
    input:not([type=checkbox]):not([type=radio]):not([type=range]),
    select, textarea,
    .form-in, .imp-inp, .imp-sel, .imp-cat, .imp-sub,
    .imp-date, .imp-time, .imp-amt-in, .imp-desc, .imp-note,
    .imp-period-fld select, .ap-row input, .cf-dr-fld input,
    .wa-phone input, .ob-input,
    .budg-cap-edit, .ap-amt, .ng-it-amt, .ng-it-mon, #b-cap, #waPhone{
      font-size:16px !important;
      /* cegah iOS membesarkan teks otomatis di orientasi tertentu */
      -webkit-text-size-adjust:100%;
    }
  }
</style>
</head>

/* ===== taxonomy (Category -> Sub-category) refer Amel_Expense ===== */
/* ---------- shared chart data ---------- */
const months = ['Jan','Feb','Mar','Apr','Mei','Jun'];
const monthsFull = ['Januari','Februari','Maret','April','Mei','Juni'];
const income  = [0,0,0,0,0,0]; // mulai 0 — terisi dari input manual / e-statement
const expense = [0,0,0,0,0,0]; // mulai 0 — terisi dari input manual / e-statement
const MAXBAR  = 70;
// fokus bulan bersama hero & grafik (index ke months[]). Default: bulan berjalan (Jun = index terakhir).
let focusMonth = months.length-1;

// Seri per-bulan dalam Rupiah. TIAP bulan memakai total live per-bulan dari
// gabungan semua sumber (input manual + e-statement), agar grafik akurat per bulan
// sekaligus mencerminkan seluruh transaksi yang dimasukkan user.
function monthSeries(){
  return months.map((m,i)=>{
    const mt=(typeof monthTotalsForIndex==='function')?monthTotalsForIndex(i):{inn:Math.round(income[i]*1e6),out:Math.round(expense[i]*1e6)};
    const inn=mt.inn, out=mt.out;
    return {idx:i, label:m, full:monthsFull[i], inn, out, net:inn-out};
  });
}

function chartSVG(mode, dark){
  const W=358,H=dark?118:164,padB=4,padT=dark?20:22;
  const innerH=H-padB-padT;
  const groupW=W/months.length;
  const barW=dark?14:16, gap=5;
  const inc = dark ? (mode==='s'?'#5B9BFF':'#F08A5D') : (mode==='s' ? '#2563EB' : '#C2410C');
  const exp = dark ? 'rgba(255,255,255,.42)' : '#E5C7BC';
  const fi=Math.max(0,Math.min(months.length-1,focusMonth));
  // Data riil per bulan dari gabungan semua sumber (manual + e-statement).
  const ser=monthSeries();                       // [{inn,out,net}, ...] dalam Rupiah
  // Skala dinamis: ambil nilai terbesar antara pemasukan, pengeluaran, dan |net|.
  let maxVal=0;
  ser.forEach(s=>{ maxVal=Math.max(maxVal, s.inn, s.out, Math.abs(s.net)); });
  // Empty-state: jika TIDAK ADA data sama sekali (semua bulan nol), tampilkan
  // placeholder kosong, bukan grafik batang dengan tinggi 0. Chart hanya muncul
  // bila ada data yang dimasukkan (manual / e-statement) pada mode aktif.
  const hasData = ser.some(s=> s.inn>0 || s.out>0 );
  if(!hasData){
    const txtCol = dark ? 'rgba(255,255,255,.55)' : 'var(--muted)';
    const subCol = dark ? 'rgba(255,255,255,.38)' : '#9A97A8';
    return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" xmlns="http://www.w3.org/2000/svg">
      <text x="${W/2}" y="${H/2-4}" font-size="13" font-weight="700" fill="${txtCol}" text-anchor="middle">Belum ada data</text>
      <text x="${W/2}" y="${H/2+14}" font-size="10.5" font-weight="500" fill="${subCol}" text-anchor="middle">Tambah transaksi untuk melihat grafik</text>
    </svg>`;
  }
  if(maxVal<=0) maxVal=1;                         // hindari bagi nol saat semua kosong
  const sc=v=>(v/maxVal)*innerH;                  // Rupiah -> tinggi piksel
  let bars='';
  let linePts=[];
  months.forEach((m,i)=>{
    const cx=i*groupW+groupW/2;
    const incH=sc(ser[i].inn);
    const expH=sc(ser[i].out);
    const x1=cx-barW-gap/2, x2=cx+gap/2;
    const dim = i===fi ? 1 : (dark?.3:.34);   // bulan fokus penuh, lainnya redup
    bars+=`<rect x="${x1}" y="${padT+innerH-incH}" width="${barW}" height="${incH}" rx="5" fill="${inc}" opacity="${dim}"/>`;
    bars+=`<rect x="${x2}" y="${padT+innerH-expH}" width="${barW}" height="${expH}" rx="5" fill="${exp}" opacity="${dim}"/>`;
    const net=ser[i].net;                       // tabungan = pemasukan − pengeluaran
    const ny=padT+innerH-sc(net);
    linePts.push([cx,ny]);
  });
  const lineColor = dark ? '#FFC65C' : (mode==='s' ? '#FFC65C':'#1A1A22');
  const dotStroke = dark ? '#16161C' : '#fff';
  const gridColor = dark ? 'rgba(255,255,255,.14)' : '#EDECF4';
  let path='M '+linePts.map(p=>p[0]+' '+p[1]).join(' L ');
  let dots=linePts.map((p,i)=>`<circle cx="${p[0]}" cy="${p[1]}" r="${i===fi?4.2:3}" fill="${lineColor}" stroke="${dotStroke}" stroke-width="1.6"/>`).join('');
  // highlight band di bawah bulan fokus
  const fcx=fi*groupW+groupW/2;
  const bandColor = dark ? '#fff' : (mode==='s'?'#2563EB':'#C2410C');
  const band=`<rect x="${fcx-groupW/2+3}" y="${padT-6}" width="${groupW-6}" height="${innerH+12}" rx="10" fill="${bandColor}" opacity="${dark?.08:.06}"/>`;
  // label bulan di sumbu-x (versi dark menyatu di dalam SVG agar ringkas)
  let xlabels='';
  if(dark){
    months.forEach((m,i)=>{
      const cx=i*groupW+groupW/2;
      const on=i===fi;
      xlabels+=`<text x="${cx}" y="${H-1}" font-size="9.5" font-weight="${on?700:500}" fill="${on?'#fff':'rgba(255,255,255,.5)'}" text-anchor="middle">${m}</text>`;
    });
  }
  // +/- vs bulan sebelumnya (selisih tabungan bersih)
  let deltaBadge='';
  if(fi>0){
    const netNow=ser[fi].net;
    const netPrev=ser[fi-1].net;
    const d=netNow-netPrev;            // dalam Rupiah
    const upd=d>=0;
    const bg=upd?'#0F9D58':'#D64545';
    const arrow=upd
      ? `<path d="M-3 2 0 -2 3 2" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>`
      : `<path d="M-3 -2 0 2 3 -2" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>`;
    const txt=(upd?'+':'−')+'Rp '+Math.round(Math.abs(d)).toLocaleString('id-ID');
    const bw=Math.max(64, txt.length*6.0+22);
    let bx=fcx; bx=Math.max(bw/2+2, Math.min(W-bw/2-2, bx));
    deltaBadge=`<g>
      <rect x="${bx-bw/2}" y="0" width="${bw}" height="17" rx="8.5" fill="${bg}"/>
      <g transform="translate(${bx-bw/2+12},8.5)">${arrow}</g>
      <text x="${bx+5}" y="12" font-size="9.5" font-weight="700" fill="#fff" text-anchor="middle">${txt}</text>
    </g>`;
  }
  return `<svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
    ${band}
    <line x1="0" y1="${padT+innerH}" x2="${W}" y2="${padT+innerH}" stroke="${gridColor}" stroke-width="1"/>
    ${bars}
    <path d="${path}" fill="none" stroke="${lineColor}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}
    ${xlabels}
    ${deltaBadge}
  </svg>`;
}

const cats=[
  {nm:'Cicilan KPR', pc:28, c:'#2563EB'},
  {nm:'Keluarga', pc:19, c:'#0F766E'},
  {nm:'Makanan & Minuman', pc:17, c:'#F97316'},
  {nm:'Transportasi', pc:14, c:'#9A3412'},
  {nm:'IPL & Utilitas', pc:12, c:'#C4B5FD'},
  {nm:'Lainnya', pc:10, c:'#E2E0EC'}
];
function donutSVG(){
  const size=120,r=46,cx=size/2,cy=size/2,sw=15;
  const C=2*Math.PI*r;
  let off=0,segs='';
  const list=donutCats().filter(s=> (typeof s.pc==='number'? s.pc:0) > 0);
  const totalOut=list.reduce((a,b)=>a+(typeof b.amt==='number'?b.amt:0),0);
  const gap = list.length>1 ? 2 : 0;       // beri jarak antar-segmen hanya bila >1 kategori
  list.forEach(s=>{
    const len=C*s.pc/100;
    const dash=Math.max(0.5, len-gap);      // jangan pernah negatif → tiap warna kategori tetap tampil
    segs+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.c}" stroke-width="${sw}"
      stroke-dasharray="${dash} ${C-dash}" stroke-dashoffset="${-off}" stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})"/>`;
    off+=len;
  });
  if(!segs){ // tidak ada pengeluaran → cincin abu netral
    segs=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#ECEAF4" stroke-width="${sw}"/>`;
  }
  // Nominal lengkap di tengah donut — auto-scale agar selalu muat di dalam grafik (tidak terpotong)
  const totalTxt = totalOut>0 ? ('Rp '+jtfmt(totalOut)) : 'Rp 0';
  const inner = (r - sw/2) * 2;             // diameter area dalam cincin
  const maxW  = inner * 0.92;               // sisakan padding kiri-kanan
  let fs = 15;                              // ukuran ideal
  const estW = totalTxt.length * fs * 0.58; // perkiraan lebar teks
  if(estW > maxW) fs = Math.max(8, fs * maxW / estW); // kecilkan bila kepanjangan
  fs = Math.round(fs*10)/10;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    ${segs}
    <text x="${cx}" y="${cy-3}" font-size="9" fill="#8A8A99" text-anchor="middle">Total Bln Ini</text>
    <text x="${cx}" y="${cy+14}" font-size="${fs}" font-weight="700" fill="#1A1A22" text-anchor="middle" textLength="${Math.min(maxW, estW)}" lengthAdjust="spacingAndGlyphs">${totalTxt}</text>
  </svg>`;
}

// Goal pockets — RECAP keuangan (bukan kantong dana). 2 tipe: annual & holiday.
// items: target pengeluaran tahun ini {nm, amt, month(0-11)}. tgt = Σ item. cur = terkumpul (otomatis dari txn tabungan tertaut).
// Default: satu Annual Fund + satu Holiday Fund (cur 0; target mengikuti Proyeksi Pengeluaran Non-Reguler).
// CATATAN: goals & scheduledCosts TERPISAH per mode (Sendiri vs Berdua). Lihat
// modeProjStore di bawah — saat ganti mode, isi array di-swap, jadi tujuan
// keuangan Berdua default 0 / kosong dan tidak ikut data Sendiri.
function defaultGoals(){
  return [
    {type:'annual',  nm:'Tabungan Tahunan 2026',  ic:'wealth', cur:0, items:[], year:2026},
    {type:'holiday', nm:'Tabungan Liburan 2026', ic:'plane',  cur:0, items:[], year:2026}
  ];
}
let goals=defaultGoals();
// Label tampilan tipe tujuan (Bahasa Indonesia). Kunci internal 'annual'/'holiday' TETAP.
// Sinkron dgn kategori transfer "Tabungan Terjadwal" (sub Tahunan/Liburan).
function fundTypeLabel(type){ return type==='holiday' ? 'Tabungan Liburan' : 'Tabungan Tahunan'; }
// Sub "Tabungan Terjadwal" yang memetakan ke tiap tipe tujuan.
function fundTypeSub(type){ return type==='holiday' ? 'Liburan' : 'Tahunan'; }
// Target goal disinkronkan dari Proyeksi Pengeluaran Non-Reguler:
// goal annual = Σ scheduled 'annual', goal holiday = Σ scheduled 'holiday'.
function goalTgt(g){
  if(g.type==='annual') return scheduledByCat('annual');
  if(g.type==='holiday') return scheduledByCat('holiday');
  return (g.items||[]).reduce((a,b)=>a+(b.amt||0),0);
}
// Kategori transaksi yang mengisi tiap tipe tujuan (dibaca dari Catatan Arus Kas).
function goalCatName(g){ return g.type==='holiday' ? 'Holiday Fund' : 'Annual Fund'; }
// Terkumpul OTOMATIS = Σ setoran ke tujuan. Sinkron dgn DUA sumber:
//  1) kategori transfer baru "Tabungan Terjadwal" sub "Tahunan"/"Liburan" (utama, baru);
//  2) kompat lama: kategori "Annual Fund"/"Holiday Fund" (data lama sebelum rename).
// Setiap nominal di Catatan Arus Kas dengan kategori tsb. otomatis menambah progress tujuan.
// Hanya hitung uang MASUK (dir:'in') ke kategori tsb. agar tidak dobel dengan transfer keluar pasangannya.
// Bila tidak ada transaksi 'in' sama sekali, jatuh-balik ke total semua transaksi kategori tsb.
function goalCollected(g){
  const legacyCat=goalCatName(g);            // 'Annual Fund' / 'Holiday Fund' (kompat lama)
  const schedSub=fundTypeSub(g.type);        // 'Tahunan' / 'Liburan' (baru)
  const match=t=>(t.cat===legacyCat) || (t.cat==='Tabungan Terjadwal' && (t.sub===schedSub));
  let inSum=0, allSum=0;
  (typeof activeTxns==='function'?activeTxns():(typeof manualTxns!=='undefined'?manualTxns:[])).forEach(t=>{
    if(match(t)){ const v=(typeof txnIDR==='function'?txnIDR(t):manualParse(t.amt)); allSum+=v; if(t.dir==='in') inSum+=v; }
  });
  return inSum>0 ? inSum : allSum;
}
// Nilai terkumpul efektif: hasil otomatis dari transaksi + setoran manual lama (g.cur).
function goalCur(g){ return goalCollected(g) + (g.cur||0); }
function goalPc(g){ const t=goalTgt(g)||1; return Math.min(100,Math.round(goalCur(g)/t*100)); }
// kebutuhan setoran per bulan agregat dari semua goals (sisa target ÷ bulan tersisa di tahun)
function goalMonthlyNeed(){
  const now=6; // Juni (index 5) -> sisa bulan dihitung dari curMonthKey
  let need=0;
  goals.forEach(g=>{ const t=goalTgt(g); const remain=Math.max(0,t-goalCur(g)); const monthsLeft=Math.max(1,12-now); need+=remain/monthsLeft; });
  return need;
}
function jtfmt(n){ // 85000000 -> "85.000.000" ; 1200000 -> "1.200.000" (nominal lengkap, tanpa "Rp")
  return Math.round(n||0).toLocaleString('id-ID');
}
const ID_MONTHS=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

/* ===== ATUR ANNUAL PROJECTION model ===== */
// Pemasukan & pengeluaran TETAP (per bulan). akumulasi = jumlah × 12 (setahun).
let fixedIncome=[];
let fixedExpense=[];
// Biaya terjadwal setahun. cat: 'annual' | 'holiday'. month 0-11.
let scheduledCosts=[];
// ===== Penyimpanan proyeksi per mode (Sendiri 's' vs Berdua 'b') =====
// goals, scheduledCosts, fixedIncome, fixedExpense disimpan TERPISAH per mode
// supaya tujuan keuangan & proyeksi non-reguler Berdua TIDAK ikut data Sendiri.
const _projStore={
  s:{ goals:goals,          scheduledCosts:scheduledCosts, fixedIncome:fixedIncome, fixedExpense:fixedExpense },
  b:{ goals:defaultGoals(), scheduledCosts:[],             fixedIncome:[],          fixedExpense:[] }
};
let _projMode='s';
function swapProjStore(mode){
  if(mode===_projMode) return;
  // simpan referensi array mode lama
  _projStore[_projMode]={ goals, scheduledCosts, fixedIncome, fixedExpense };
  const st=_projStore[mode]||_projStore.s;
  goals=st.goals; scheduledCosts=st.scheduledCosts; fixedIncome=st.fixedIncome; fixedExpense=st.fixedExpense;
  _projMode=mode;
}
function fixedIncomeYear(){ return fixedIncome.reduce((a,b)=>a+(b.amt||0),0)*12; }
function fixedExpenseYear(){ return fixedExpense.reduce((a,b)=>a+(b.amt||0),0)*12; }
function scheduledByCat(cat){ return scheduledCosts.filter(c=>c.cat===cat).reduce((a,b)=>a+(b.amt||0),0); }
function monthsLeftInYear(){ const now=new Date().getMonth(); return Math.max(1,12-now); }
/* Jam LIVE untuk status bar — waktu nyata HP user, format 24 jam HH:MM.
   Diperbarui tiap menit oleh startLiveClock(); ikon sinyal/wifi/baterai palsu
   sudah dihapus karena tak bisa di-sync di web app. */
function nowClock(){
  const d=new Date();
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}
let _clockTimer=null;
function startLiveClock(){
  const tick=()=>{ document.querySelectorAll('#liveClock,.sb-clock').forEach(el=>{ el.textContent=nowClock(); }); };
  tick();
  if(_clockTimer) clearInterval(_clockTimer);
  _clockTimer=setInterval(tick,15000); // segarkan tiap 15 dtk agar selalu akurat
}
function annualProj(){
  const grossSaving=fixedIncomeYear()-fixedExpenseYear(); // sisa saving tahunan sebelum biaya terjadwal
  const scheduledTotal=scheduledCosts.reduce((a,b)=>a+(b.amt||0),0);
  const netSaving=grossSaving-scheduledTotal;            // saving setelah biaya terjadwal dikurangi (BISA MINUS)
  const deficit = netSaving<0;                           // tabungan tergerus jadi minus
  // Persentase tabungan tersisa dari akumulasi reguler. Saat akumulasi 0 tapi ada
  // biaya non-reguler -> 0%; tetap dipakai untuk lebar bar (lihat juga deficit).
  const pc=grossSaving>0? Math.min(100,Math.max(0,Math.round(netSaving/grossSaving*100))):0;
  const annualCost=scheduledByCat('annual'), holidayCost=scheduledByCat('holiday');
  const ml=monthsLeftInYear();
  return {grossSaving,scheduledTotal,netSaving,deficit,pc,annualCost,holidayCost,
          annualPerMonth:Math.round(annualCost/ml), holidayPerMonth:Math.round(holidayCost/ml), monthsLeft:ml};
}

// Isi kartu "Anggaran Bulan Ini" (beranda). Pengeluaran (spent) dihitung dari
// transaksi BULAN TERPILIH: mode Sendiri pakai sendiriBudgetSpent, mode Berdua
// pakai pagu rumah tangga (budgetSpent per key). Pagu (cap) tetap dari setelan user.
function budgetCardInner(){
  const mLbl=monthsFull[Math.max(0,Math.min(months.length-1,focusMonth))]||'';
  const isB=currentMode==='b';
  const rows=isB?householdBudgets:budgets;
  const spentOf=isB?(b=>budgetSpent(b.key)):(b=>sendiriBudgetSpent(b));
  const totSpent=rows.reduce((a,b)=>a+(spentOf(b)||0),0);
  const totCap=rows.reduce((a,b)=>a+(b.cap||0),0);
  const hasBudget=totCap>0; // user sudah set pagu untuk minimal satu kategori?
  const head=`<div class="sec-head" style="margin-bottom:10px">
          <div class="seclabel" style="margin-bottom:0">Anggaran Bulan Ini <span class="sec-month">· ${mLbl}</span></div>
          <div class="chip-link">Atur ${I.chev}</div>
        </div>`;
  // Belum ada pagu -> jangan tampilkan persentase semu. User harus set anggaran
  // dulu; pemakaian baru terhitung otomatis dari arus kas setelah pagu diatur.
  if(!hasBudget){
    return head+
      `<div class="budg-empty-row">
        <div class="budg-empty-txt">Belum ada pagu. Atur anggaran per kategori dulu — pemakaian akan terhitung otomatis dari arus kas.</div>
      </div>`;
  }
  const pc=Math.min(100,Math.round(totSpent/totCap*100));
  const over=rows.filter(b=>(b.cap||0)>0 && spentOf(b)>b.cap).length;
  // Pagu harian: sisa uang per hari = (pagu − terpakai) ÷ sisa hari bulan ini.
  // Bulan acuan = focusMonth pada tahun berjalan; bila bulan berjalan, pakai
  // hari tersisa sampai akhir bulan, selain itu pakai jumlah hari penuh bulan itu.
  // Sisa hari mengikuti waktu nyata:
  //  · bulan lampau  → 0 (bulan sudah selesai, tidak ada pembagian per hari)
  //  · bulan berjalan → hari tersisa sampai akhir bulan (live)
  //  · bulan depan    → jumlah hari penuh bulan itu
  const _now=new Date();
  const _fy=_now.getFullYear();
  const _curM=_now.getMonth();
  const _dim=new Date(_fy, focusMonth+1, 0).getDate();
  const _isPast = (focusMonth < _curM); // demo tahun sama (2026); fokus < bulan kini = lampau
  const _isCur  = (focusMonth === _curM);
  const _daysLeft = _isPast ? 0 : (_isCur ? Math.max(1,_dim-_now.getDate()+1) : _dim);
  const phRows=rows.filter(b=>(b.cap||0)>0);
  const phStrip=phRows.length? `<div class="ph-strip">${phRows.map(b=>{
      const cap=(b.cap||0)*1e6, sp=(spentOf(b)||0)*1e6;
      const sisa=cap-sp; const isOver=sisa<0;
      const usePc=Math.min(100,Math.round(sp/Math.max(1,cap)*100));
      if(_isPast){
        // Bulan selesai: tampilkan sisa total tanpa pembagian harian.
        return `<div class="ph-card${isOver?' over':''}">
        <div class="ph-nm">${catLabel(b.nm)}</div>
        <div class="ph-day ${isOver?'over':'ok'}">${isOver?'− ':''}Rp ${jtfmt(Math.abs(sisa))}</div>
        <div class="ph-sub">${isOver?'lewat pagu':'sisa akhir'}</div>
        <div class="ph-track"><div class="ph-fill${isOver?' over':''}" style="width:${usePc}%"></div></div>
        <div class="ph-cap">bulan selesai</div>
      </div>`;
      }
      const perDay=Math.round(sisa/_daysLeft);
      return `<div class="ph-card${isOver?' over':''}">
        <div class="ph-nm">${catLabel(b.nm)}</div>
        <div class="ph-day ${isOver?'over':'ok'}">${perDay<0?'− ':''}Rp ${jtfmt(Math.abs(perDay))}</div>
        <div class="ph-sub">${isOver?'lewat pagu':'sisa per hari'}</div>
        <div class="ph-track"><div class="ph-fill${isOver?' over':''}" style="width:${usePc}%"></div></div>
        <div class="ph-cap">${isOver?'− ':''}Rp ${jtfmt(Math.abs(sisa))} ${isOver?'lewat':'sisa'} · ${_daysLeft} hari</div>
      </div>`;}).join('')}</div>` : '';
  return head+
        `<div class="ratio-track" style="height:9px"><div style="width:${pc}%;height:100%;background:var(--coral);border-radius:999px"></div></div>
        <div style="display:flex;justify-content:space-between;margin-top:9px;font-size:11.5px;color:var(--muted);font-weight:600">
          <span>Rp ${jtfmt(totSpent*1e6)} terpakai · ${pc}% dari Rp ${jtfmt(totCap*1e6)} pagu</span>
          ${over>0?`<span style="color:#DC2626;display:flex;align-items:center;gap:4px">${I.bell} ${over} kategori lewat</span>`:`<span style="color:#16A34A;display:flex;align-items:center;gap:4px">${I.check} Semua aman</span>`}
        </div>${phStrip}`;
}

/* ===== in-app dialog (robust replacement for window.confirm / window.alert) =====
   window.confirm is suppressed inside sandboxed/preview iframes and returns false,
   which silently breaks delete actions. This custom dialog always works. */
function appDialog({title,msg,okText='OK',cancelText=null,danger=false}){
  return new Promise(resolve=>{
    const scrim=document.getElementById('dlgScrim');
    const tEl=document.getElementById('dlgTitle');
    const mEl=document.getElementById('dlgMsg');
    const aEl=document.getElementById('dlgActions');
    if(!scrim){ resolve(true); return; }
    tEl.textContent=title||'';
    mEl.textContent=msg||''; mEl.style.display=msg?'block':'none';
    const okCls=danger?'dlg-ok danger':('dlg-ok accent-'+currentMode);
    aEl.innerHTML='';
    let cancelBtn=null;
    if(cancelText){
      cancelBtn=document.createElement('button');
      cancelBtn.className='dlg-cancel'; cancelBtn.textContent=cancelText;
      aEl.appendChild(cancelBtn);
    }
    const okBtn=document.createElement('button');
    okBtn.className=okCls; okBtn.textContent=okText;
    aEl.appendChild(okBtn);
    const close=(val)=>{ scrim.classList.remove('show'); setTimeout(()=>{ aEl.innerHTML=''; },240); resolve(val); };
    okBtn.addEventListener('click',()=>close(true));
    if(cancelBtn) cancelBtn.addEventListener('click',()=>close(false));
    scrim.onclick=(e)=>{ if(e.target===scrim) close(false); };
    requestAnimationFrame(()=>scrim.classList.add('show'));
  });
}
function appConfirm(msg,title='Konfirmasi'){ return appDialog({title,msg,okText:'Hapus',cancelText:'Batal',danger:true}); }
function appAlert(msg,title='Perhatian'){ return appDialog({title,msg,okText:'Mengerti'}); }

// Kompat lama: gabungan semua kategori (pakai jenis 'out' lebih dulu agar warna donut konsisten).
const taxonomy = Object.assign({}, TAXO_BY_DIR.transfer, TAXO_BY_DIR.in, TAXO_BY_DIR.out);
// Daftar kategori untuk satu jenis transaksi (dipakai semua dropdown kategori).
function taxFor(dir){ return TAXO_BY_DIR[dir] || TAXO_BY_DIR.out; }
// Tambah kategori baru ke jenis tertentu + sinkron ke `taxonomy` gabungan.
function addTaxoCat(dir, name){
  const tx=taxFor(dir);
  if(!tx[name]) tx[name]=['Others'];
  if(!taxonomy[name]) taxonomy[name]=tx[name];
  return tx[name];
}
// Pemetaan kategori lama -> kategori baru (agar data lama tidak rusak).
const CAT_MIGRATE={ 'Revenue':'Salary', 'Investment':'Investment Return', 'Annual Fund':'Setor Tabungan', 'Holiday Fund':'Setor Tabungan', 'Lainnya':'Other Expense' };
function migrateCat(cat,dir){
  if(taxonomy[cat]) return cat;
  if(CAT_MIGRATE[cat]) return CAT_MIGRATE[cat];
  return dir==='in'?'Other Income':(dir==='transfer'?'Other Transfer':'Other Expense');
}

function savingRatio(){
  let txnIncome=0, txnSaved=0;
  activeTxns().forEach(t=>{
    const v=txnIDR(t);
    if(t.dir==='in') txnIncome+=v;
    // setoran tabungan/investasi = pengeluaran berkategori Investment Return/Setor Tabungan, atau sub 'Saving'
    if(t.dir==='out' && (t.cat==='Investment Return' || t.cat==='Setor Tabungan' || (t.sub||'').toLowerCase()==='saving')) txnSaved+=v;
  });
  // Pemasukan bulanan total (semua sumber) — pakai baseline + tambahan dari txn manual user.
  const income = Math.max(MONTH_BASE.in, txnIncome);
  // Setoran reguler ke tujuan keuangan (rutin) + investasi non-reguler dari transaksi.
  const goalRegular = REGULAR_GOAL_SAVING; // setoran rutin yang sukses tersimpan bulan ini
  const saved = goalRegular + txnSaved;
  // Target: kebutuhan setoran bulanan dari tujuan ÷ pemasukan (cap 60% realistis).
  const need=goalMonthlyNeed();
  const target=Math.min(60, Math.max(20, Math.round(need/income*100)))||50;
  const ratio=income>0? Math.round(saved/income*100):0;
  return {income, saved, ratio:Math.min(100,ratio), target, goalRegular, txnSaved};
}

const ID_MON={'Jan':0,'Feb':1,'Mar':2,'Apr':3,'Mei':4,'Jun':5,'Jul':6,'Agu':7,'Sep':8,'Okt':9,'Nov':10,'Des':11};
const ID_MON_NAMES=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
// parse "05 Jun" (asumsi 2026) atau "2026-06-29" -> {sortKey(number), label("05 Jun")}
// Normalisasi tanggal hasil impor ("DD Mon" / ISO) — normDate sudah mengenali keduanya.
function normImportDate(d){ return d||'—'; }
function normDate(d){
  if(!d) return {key:0,label:'—'};
  if(/^\d{4}-\d{2}-\d{2}/.test(d)){
    const [y,m,day]=d.slice(0,10).split('-').map(Number);
    const mon=ID_MON_NAMES[m-1]||'Jun';
    return {key:y*10000+m*100+day, label:String(day).padStart(2,'0')+' '+mon};
  }
  const mt=d.match(/(\d{1,2})\s+([A-Za-z]{3})/);
  if(mt){ const day=+mt[1], mon=ID_MON[mt[2]]??5; return {key:2026*10000+(mon+1)*100+day, label:String(day).padStart(2,'0')+' '+mt[2]}; }
  return {key:0,label:d};
}

    const isE=t.origin==='estmt';
    const curCode=t.cur||'IDR';
    const amtRaw = curCode==='IDR' ? 'Rp '+v.toLocaleString('id-ID')
                 : (CURRENCIES[curCode]?.sym||curCode)+' '+orig.toLocaleString('id-ID')+' · Rp '+v.toLocaleString('id-ID');
    list.push({id:t.id, dir:t.dir, amtNum:v, amtRaw,
      cur:curCode,
      bank:t.bank, bankAbbr:(t.bank||'').slice(0,3).toUpperCase(),
      bankColor: bankColorOf(t.bank),
      title:t.ket||t.sender||'Transaksi', sub:catLabel(t.cat)+' · '+subLabel(t.sub),
      cat:t.cat, subc:t.sub, time:t.time, dkey:nd.key, dlabel:nd.label, seq:t.seq||0,
      src: isE?'estmt':'manual'});
  });
  // tanggal terbaru di atas; pada tanggal yang sama, input/edit terbaru (seq besar) di atas
  list.sort((a,b)=> (b.dkey-a.dkey) || (b.seq-a.seq));
  return list;
}
// Total Saldo Kamu = akumulasi pemasukan − pengeluaran dari seluruh sumber yang
// dimasukkan user (e-statement + input manual, semua tersimpan di manualTxns).
function saldoFromTxns(){
  const list=allTxns();
  let inn=0,out=0,trf=0;
  list.forEach(t=>{ if(t.dir==='in') inn+=t.amtNum; else if(t.dir==='transfer') trf+=t.amtNum; else out+=t.amtNum; });
  const banks=[...new Set(list.map(t=>t.bank).filter(Boolean))];
  return {saldo:inn-out, inn, out, trf, count:list.length, banks};
}
function bankColorOf(nm){
  const s=srcBreakdown.find(x=>x.nm===nm); if(s) return s.c;
  const m={'Impor':'#0F766E','e-Statement':'#0F766E','Jago':'#FF6B00','BCA':'#2563EB','Mandiri':'#1E40AF','BNI':'#F97316','BRI':'#1D4ED8','Jenius':'#0EA5E9','SeaBank':'#16A34A','DANA':'#2563EB','ShopeePay':'#EA580C','blu':'#06B6D4','Permata':'#15803D','CIMB Niaga':'#DC2626','Danamon':'#EA580C','OCBC':'#B91C1C','LINE Bank':'#16A34A','Superbank':'#7C3AED'};
  return m[nm]||'#64748B';
}

/* 2b — Berdua: Pengeluaran per Kategori (1:1 nama kategori donut Indonesia) +
   Kontribusi pengeluaran bersama (dipindah dari hero) + rincian per orang.
   SEMUA angka diturunkan dari transaksi Berdua (e-statement / input manual) lewat
   deriveAll() -> activeTxns(). Tidak ada pagu inline di sini (pagu dikelola di
   "Anggaran & Alert"). */
function scrKategoriBerdua(){
  const d=deriveAll();
  const bdp=d.byDonutPic||{};
  // Daftar kategori = kategori donut yang BENAR-BENAR punya pengeluaran bulan ini,
  // urut dari terbesar. Nama & warna ikut `cats` (Bahasa Indonesia) -> 1:1 dgn Arus Kas.
  const catMeta=nm=>cats.find(c=>c.nm===nm)||{nm,c:'#64748B'};
  const rows=Object.keys(bdp)
    .map(nm=>({nm, c:catMeta(nm).c, reza:bdp[nm].reza||0, dini:bdp[nm].dini||0, total:bdp[nm].total||0}))
    .filter(r=>r.total>0)
    .sort((a,b)=>b.total-a.total);
  const totSpent=rows.reduce((a,r)=>a+r.total,0);
  const nameMe=myName(), namePa=partnerDisplay();
  const tab = (kbPicTab==='dini')?'dini':'reza';
  // Pengeluaran per orang (bulan fokus) langsung dari transaksi tercatat -> sinkron dgn Catatan Arus Kas.
  const meExp = rows.reduce((s,r)=>s+r.reza,0);
  const paExp = rows.reduce((s,r)=>s+r.dini,0);
  // Kumpulan transaksi per orang (pengeluaran bulan fokus), urut nominal terbesar.
  const personTxns=(who)=>{
    return curMonthTxns()
      .filter(t=>t.dir==='out' && txnPic(t)===who)
      .map(t=>{ const nd=normDate(t.date); return {
        id:t.id, title:t.ket||t.sender||'Transaksi', cat:t.cat, sub:t.sub,
        amtNum:txnIDR(t), dlabel:nd.label, dkey:nd.key, seq:t.seq||0,
        bank:t.bank, src:(t.origin==='estmt'?'estmt':'manual') };})
      .sort((a,b)=> (b.dkey-a.dkey) || (b.seq-a.seq) );
  };
  const txnRowHTML=(t)=>{
    const cm=catMeta(catLabel(t.cat));
    const col=cm && cm.c ? cm.c : '#64748B';
    return `<div class="kbp-txn tappable" data-edit-txn="${t.id}">
      <div class="kbp-dot" style="background:${col}"></div>
      <div class="kbp-main"><div class="kbp-t">${t.title}</div><div class="kbp-s">${catLabel(t.cat)} · ${subLabel(t.sub)} · ${t.dlabel}</div></div>
      <div class="kbp-amt">−Rp ${(t.amtNum||0).toLocaleString('id-ID')}</div>
    </div>`;
  };
  const list = personTxns(tab);
  const whoName = tab==='reza'?nameMe:namePa;
  const whoTot  = tab==='reza'?meExp:paExp;
  const personSection = `<div class="sec-card">
      <div class="kbp-toggle">
        <button type="button" class="kbp-tab${tab==='reza'?' on':''}" data-kbpic="reza">${nameMe}</button>
        <button type="button" class="kbp-tab${tab==='dini'?' on':''}" data-kbpic="dini">${namePa}</button>
      </div>
      <div class="kbp-sum"><span>Pengeluaran ${whoName} bulan ini</span><b class="neg">${jt(whoTot)}</b></div>
      <div class="kbp-list">
        ${list.length? list.map(txnRowHTML).join('') : `<div class="kbp-empty">Belum ada transaksi ${whoName} bulan ini. Tambah lewat e-Statement atau input manual — otomatis sinkron dengan Catatan Arus Kas.</div>`}
      </div>
      <div class="kbp-foot">${I.info} Ketuk transaksi untuk mengubahnya di Catatan Arus Kas. Penanggung jawab tiap transaksi bisa diatur di sana.</div>
    </div>`;
  function catCard(r){
    const pc = totSpent>0?Math.round(r.total/totSpent*100):0;
    const mePart = r.total>0?Math.round(r.reza/r.total*100):0;
    const paPart = 100-mePart;
    return `<div class="sec-card budg-card hh-card" data-cat="${r.nm}">
      <div class="budg-top">
        <div class="budg-ic" style="background:${r.c}1A;color:${r.c}">${I[catIcon[r.nm]]||I.dots3}</div>
        <div style="flex:1;min-width:0"><div class="budg-nm">${r.nm}</div><div class="budg-meta">${jt(r.total)} · ${pc}% dari pengeluaran rumah</div></div>
        <div class="cpc" style="white-space:nowrap;color:var(--muted)">Rincian ${I.chev}</div>
      </div>
      <div class="contrib-bar" style="margin-top:11px"><div class="cb-save" style="width:${mePart}%"></div><div class="cb-exp" style="width:${paPart}%"></div></div>
      <div class="contrib-legend" style="justify-content:flex-start;margin:8px 0 0">
        <span><i class="lg-save"></i>${nameMe} ${jt(r.reza)}</span>
        <span><i class="lg-exp"></i>${namePa} ${jt(r.dini)}</span>
      </div>
    </div>`;
  }
  return subBar('Pengeluaran per Kategori',`Transaksi ${monthsFull[Math.max(0,Math.min(months.length-1,focusMonth))]||''} · dari catatan bersama`)+
  `<div class="sub-scroll" id="hhScroll">
    <div class="sec-card">
      <div class="seclabel" style="margin-bottom:2px">Pengeluaran rumah</div>
      <div class="ratio-val neg" style="margin:2px 0 4px">${jt(totSpent)}</div>
      <div style="font-size:11.5px;color:var(--muted);font-weight:600">Total pengeluaran bersama bulan ini · dari e-statement &amp; input manual</div>
    </div>
    ${personSection}
    <div class="seclabel" style="margin:18px 4px 8px">Per Kategori</div>
    ${rows.length? rows.map(catCard).join('') : `<div class="budg-empty-row"><div class="budg-empty-txt">Belum ada pengeluaran bersama bulan ini. Tambah transaksi lewat e-statement atau input manual — kategori &amp; pembagian per orang muncul otomatis.</div></div>`}
  </div>`;
}

/* Tier ditentukan dari annual saving (gross) dalam rupiah.
   Ambang dibuat per juta agar progresif & memberi target yang terasa. */
function savingMoodBerdua(amt){
  const jt = (amt||0)/1e6; // ke juta
  if(amt<=0)      return {key:'flat', face:SAVE_FACES.flat,  color:'#94A3B8', glow:'rgba(148,163,184,.30)', label:'Yuk mulai sisihkan', cheer:'Tabungan tahunan masih nol — langkah pertama bareng pasangan paling berarti.'};
  if(jt < 25)     return {key:'calm', face:SAVE_FACES.calm,  color:'#E0A33E', glow:'rgba(224,163,62,.32)',  label:'Awal yang baik', cheer:'Kalian sudah mulai menabung. Konsisten sedikit demi sedikit, ya!'};
  if(jt < 75)     return {key:'happy',face:SAVE_FACES.happy, color:'#D9772B', glow:'rgba(217,119,43,.34)',  label:'Tabungan tumbuh', cheer:'Mantap! Tabungan tahunan kalian terus naik — pertahankan ritmenya.'};
  if(jt < 150)    return {key:'love', face:SAVE_FACES.love,  color:'#C2410C', glow:'rgba(194,65,12,.38)',   label:'Kompak menabung', cheer:'Kalian solid! Konsistensi berdua bikin mimpi finansial makin dekat.'};
  return                 {key:'star', face:SAVE_FACES.star,  color:'#9A3412', glow:'rgba(154,52,12,.42)',   label:'Juara menabung', cheer:'Luar biasa! Tabungan tahunan kalian masuk level juara — pertahankan!'};
}
// Penanda mood menabung romantis untuk kartu "Proyeksi Tabungan Setahun" di beranda (Berdua).
// Dipindah dari Atur Proyeksi Tahunan; wajah emoji lucu & romantis (lihat SAVE_FACES).
function savingMoodCardHTML(){
  if(currentMode!=='b') return '';
  const p=annualProj();
  const mood=savingMoodBerdua(p.grossSaving);
  const tiers=[0,25e6,75e6,150e6]; const sv=Math.max(0,p.grossSaving);
  let lo=0,hi=tiers[1];
  for(let k=0;k<tiers.length;k++){ if(sv>=tiers[k]){ lo=tiers[k]; hi=tiers[k+1]||tiers[k]; } }
  const isMax=mood.key==='star';
  const segPc=isMax?100:Math.min(100,Math.round((sv-lo)/((hi-lo)||1)*100));
  const toNext=isMax?0:Math.max(0,hi-sv);
  return `<div class="mood-marker" style="--mc:${mood.color};--mg:${mood.glow}">
    <div class="mood-top">
      <div class="mood-face" style="color:${mood.color};box-shadow:0 0 0 6px ${mood.glow}">${mood.face}</div>
      <div class="mood-meta">
        <div class="mood-lbl" style="color:${mood.color}">${I.heart2}<span>${mood.label}</span></div>
        <div class="mood-val">${'Rp '+jtfmt(p.grossSaving)} <span>/ tahun bersama</span></div>
      </div>
    </div>
    <div class="mood-track"><div class="mood-fill" style="width:${segPc}%;background:${mood.color}"></div></div>
    <div class="mood-foot">${ isMax
      ? `${I.spark} ${mood.cheer}`
      : `${mood.cheer} <b style="color:${mood.color}">+Rp ${jtfmt(toNext)} lagi</b> untuk naik level berikutnya.` }</div>
  </div>`;
}

// Baris proyeksi per-tahun (1–5) untuk detail aset.
function assetProjRows(base, rate, accent){
  const r=(rate||0)/100;
  if(!base){ return `<div class="re-note" style="margin:0">${I.info} Isi nilai aset untuk melihat proyeksi.</div>`; }
  if(!rate){ return `<div class="re-note" style="margin:0">${I.info} Isi bunga %/tahun untuk melihat proyeksi kenaikan. Tanpa bunga, nilai dianggap tetap.</div>`; }
  let html='';
  for(let y=1;y<=5;y++){
    const fut=Math.round(base*Math.pow(1+r,y));
    const gain=fut-base;
    html+=`<div class="re-row"><span>Tahun ${y}</span><b style="color:${accent}">${rpjt(fut)} <small style="color:#16A34A;font-weight:700">(+${jtfmt(gain)})</small></b></div>`;
  }
  return html;
}

/* 7 — Budget & Alert (per kategori) */
function scrBudget(){
  const accent=currentMode==='s'?'#2563EB':'#C2410C';
  const mLbl=monthsFull[Math.max(0,Math.min(months.length-1,focusMonth))]||'';
  const totSpent=budgets.reduce((a,b)=>a+sendiriBudgetSpent(b),0);
  const totCap=budgets.reduce((a,b)=>a+b.cap,0);
  const over=budgets.filter(b=>b.cap>0 && sendiriBudgetSpent(b)>b.cap);
  return subBar('Anggaran & Alert',`Transaksi ${mLbl} · pagu per kategori`)+
  `<div class="sub-scroll">
    <div class="sec-card">
      <div class="stat-grid">
        <div class="stat-box"><div class="sv neg">${jt(totSpent)}</div><div class="sl">Total terpakai</div></div>
        <div class="stat-box"><div class="sv">${jt(totCap)}</div><div class="sl">Total pagu</div></div>
      </div>
      <div class="ratio-track" style="height:10px;margin-top:14px"><div style="width:${totCap>0?Math.min(100,totSpent/totCap*100):0}%;height:100%;background:${accent};border-radius:999px"></div></div>
    </div>
    ${over.length?`<div class="alert-card">${I.bell}<div><div class="alert-t">${over.length} kategori melebihi pagu</div><div class="alert-s">${over.map(o=>o.nm).join(' · ')} — kamu akan diberi notifikasi otomatis.</div></div></div>`:''}
    <div class="sec-head" style="padding:0 4px 4px"><div class="seclabel" style="margin:0">Pagu per Kategori</div><button class="add-btn" data-budget-add style="background:${accent}"><span class="add-btn-ic">${I.plus2}</span>Tambah</button></div>
    ${budgets.length===0?`<div class="sec-card" style="text-align:center;padding:28px 18px;color:var(--muted)">
      <div style="font-size:30px;line-height:1;margin-bottom:8px">🗂️</div>
      <div style="font-weight:600;color:var(--ink);margin-bottom:4px">Belum ada pagu kategori</div>
      <div style="font-size:13px;line-height:1.5">Tekan <b>+ Tambah</b> untuk menetapkan anggaran bulanan per kategori. Pilih kategori sesuai Arus Kas.</div>
    </div>`:''}
    ${budgets.map((b,bi)=>{
      const spent=sendiriBudgetSpent(b);
      const pc=b.cap>0?Math.min(100,Math.round(spent/b.cap*100)):0;
      const ratio=b.cap>0?spent/b.cap:0;
      const state= ratio>1?'over': ratio>=0.85?'warn':'ok';
      const barc= state==='over'?'#DC2626': state==='warn'?'#F59E0B': b.c;
      const tag= state==='over'?'Lewat pagu': state==='warn'?'Hampir habis':'Aman';
      const capRp=Math.round(b.cap*1e6);
      return `<div class="sec-card budg-card" data-budget-card="${bi}">
        <div class="budg-top">
          <div class="budg-ic" style="background:${b.c}1A;color:${b.c}">${I[b.ic]||I.dots3}</div>
          <div class="budg-mid">
            <div class="budg-nm">${b.nm}</div>
            <div class="budg-meta">${jt(spent)} dari <span class="budg-cap-txt">${capRp>0?('Rp '+capRp.toLocaleString('id-ID')):'belum diatur'}</span></div>
          </div>
          <div class="budg-tag ${state}">${tag}</div>
          <button class="budg-edit-btn" data-budget-edit="${bi}" aria-label="Ubah pagu">${I.edit}Ubah</button>
          <button class="fund-del" data-del-budget="${bi}" aria-label="Hapus">${I.trash}</button>
        </div>
        <div class="ratio-track" style="height:8px;margin-top:10px"><div style="width:${pc}%;height:100%;background:${barc};border-radius:999px"></div></div>
        <div class="budg-editrow" id="budgEdit${bi}" hidden>
          <label class="budg-edit-lbl">Pagu bulanan</label>
          <div class="budg-edit-field">
            <span class="budg-edit-prefix">Rp</span>
            <input type="text" inputmode="numeric" class="budg-cap-edit" data-i="${bi}" value="${capRp>0?capRp.toLocaleString('id-ID'):''}" placeholder="0">
          </div>
          <button class="budg-save-btn" data-save-budget="${bi}" style="background:${accent}">Simpan</button>
        </div>
      </div>`;
    }).join('')}
    <div class="src-excel">${I.gear} Atur pagu & ambang notifikasi kapan saja</div>
  </div>`;
}

// ---- Ekstraksi teks PDF sederhana (tanpa library): ambil string di antara tanda kurung
//      pada operator Tj/TJ. Cukup untuk e-statement berbasis teks. ----
// ---- Pemuat skrip eksternal sekali-pakai (lazy). Hanya diunduh dari CDN
//      SAAT dibutuhkan (parsing PDF), sehingga alur normal aplikasi tetap
//      mandiri/offline. Bila CDN gagal, kita jatuh balik ke parser regex.
const _cdnCache={};
function loadScriptOnce(src){
  if(_cdnCache[src]) return _cdnCache[src];
  _cdnCache[src]=new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src=src; s.async=true;
    s.onload=()=>res(true);
    s.onerror=()=>{ delete _cdnCache[src]; rej(new Error('cdn-failed:'+src)); };
    document.head.appendChild(s);
  });
  return _cdnCache[src];
}

const PDFJS_SRC='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
const PDFJS_WORKER='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
const TESS_SRC='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';

// Ekstraksi teks via pdf.js (akurat, menangani PDF terkompresi). Mengembalikan
// {text, pages, hasTextLayer}. Lempar error bila pdf.js tak bisa dimuat.
async function extractViaPdfjs(file){
  await loadScriptOnce(PDFJS_SRC);
  const pdfjs=window.pdfjsLib;
  if(!pdfjs) throw new Error('pdfjs-missing');
  try{ pdfjs.GlobalWorkerOptions.workerSrc=PDFJS_WORKER; }catch(e){}
  const buf=await file.arrayBuffer();
  const doc=await pdfjs.getDocument({data:buf}).promise;
  let all=[]; let charCount=0;
  const n=doc.numPages;
  for(let p=1;p<=n;p++){
    const page=await doc.getPage(p);
    const tc=await page.getTextContent();
    const line=tc.items.map(it=>it.str).join(' ');
    charCount+=line.length;
    all.push(line);
  }
  return { text:all.join('\n'), pages:n, charCount, doc };
}

// OCR halaman PDF (untuk e-statement hasil scan/foto yang tak punya text layer).
// Merender tiap halaman ke canvas lalu menjalankan Tesseract (ind+eng).
async function ocrPdfDoc(doc, maxPages){
  await loadScriptOnce(TESS_SRC);
  if(!window.Tesseract) throw new Error('tesseract-missing');
  const lim=Math.min(doc.numPages, maxPages||6); // batasi agar tak terlalu lama
  let out=[];
  for(let p=1;p<=lim;p++){
    const page=await doc.getPage(p);
    const vp=page.getViewport({scale:2});
    const canvas=document.createElement('canvas');
    canvas.width=vp.width; canvas.height=vp.height;
    const ctx=canvas.getContext('2d');
    await page.render({canvasContext:ctx,viewport:vp}).promise;
    const dataUrl=canvas.toDataURL('image/png');
    const r=await window.Tesseract.recognize(dataUrl,'ind+eng');
    out.push((r&&r.data&&r.data.text)||'');
  }
  return out.join('\n');
}

// Parser regex lama (cadangan terakhir): tarik teks di dalam ( ... ) dari byte PDF.
function extractPdfTextRegex(buf){
  try{
    let bin=''; const bytes=new Uint8Array(buf);
    for(let i=0;i<bytes.length;i++) bin+=String.fromCharCode(bytes[i]);
    const out=[]; const re=/\(((?:\\.|[^()\\])*)\)/g; let m;
    while((m=re.exec(bin))!==null){
      let s=m[1].replace(/\\([()\\nrt])/g,(x,c)=>({'n':'\n','r':'\r','t':'\t'}[c]||c));
      if(/[A-Za-z0-9]/.test(s)) out.push(s);
    }
    return out.join(' ');
  }catch(e){ return ''; }
}

// Orkestrator ekstraksi teks PDF (Opsi C):
//   1) pdf.js (text layer) — paling akurat untuk PDF digital.
//   2) Bila teks terlalu sedikit (kemungkinan PDF hasil scan) → OCR Tesseract.
//   3) Bila pdf.js gagal dimuat → parser regex byte lama.
async function extractPdfText(file){
  let buf=null;
  try{ buf=await file.arrayBuffer(); }catch(e){ buf=null; }
  try{
    const r=await extractViaPdfjs(file);
    const txt=(r.text||'').trim();
    // Heuristik: <40 karakter "berarti" per halaman → kemungkinan PDF scan.
    const perPage=txt.replace(/\s+/g,'').length/Math.max(1,r.pages);
    if(perPage>=40 || !window.Tesseract && txt.length>120){
      return txt;
    }
    // Coba OCR sebagai pelengkap bila teks tipis.
    try{
      const ocr=await ocrPdfDoc(r.doc);
      const merged=[txt, (ocr||'').trim()].filter(Boolean).join('\n');
      if(merged.replace(/\s+/g,'').length>txt.replace(/\s+/g,'').length) return merged;
    }catch(e){ /* OCR gagal → pakai teks pdf.js apa adanya */ }
    return txt;
  }catch(e){
    // pdf.js tak tersedia (CDN diblok/offline) → cadangan regex byte.
    return buf ? extractPdfTextRegex(buf) : '';
  }
}

// ---- Heuristik lokal: cari baris bernominal Rupiah + tebak kategori dari kata kunci.
//      Dipakai sebagai fallback bila tidak ada API key / panggilan AI gagal. ----
const KW_CAT=[
  [/indomaret|alfamart|superindo|grocer|belanja bulanan/i,'Groceries','Food'],
  [/gojek|grab|gocar|gofood|transport|bensin|parkir|tol|kereta|krl|mrt/i,'Transport','Motor'],
  [/gaji|salary|payroll|transfer masuk/i,'Salary','Monthly'],
  [/bibit|bareksa|reksa|saham|stockbit|invest|emas|pluang/i,'Investment Return','Capital Gain'],
  [/listrik|pln|token|air|pdam|internet|wifi|indihome|telkom|pulsa/i,'Utilities','Electricity'],
  [/netflix|spotify|youtube|disney|langganan|subscription/i,'Subscription','Software'],
  [/resto|cafe|kopi|makan|food|warung|kfc|mcd/i,'Food','Meal'],
  [/rumah sakit|klinik|apotek|dokter|obat|bpjs/i,'Medical','Doctor'],
  [/tiket|hotel|liburan|wisata|vacation/i,'Vacation','Others'],
  [/baju|sepatu|tokopedia|shopee|lazada|elektronik/i,'Shopping','Clothings']
];
function localParse(text){
  const res=[]; if(!text) return res;
  if(typeof text!=='string') text=String(text);
  const tokens=text.split(/\s{2,}|\n|;/).map(s=>s.trim()).filter(Boolean);
  let i=0;
  tokens.forEach(line=>{
    const am=line.match(/(?:rp\.?\s*)?(\d{1,3}(?:[.,]\d{3})+|\d{4,})(?:[.,]\d{2})?/i);
    if(!am) return;
    const amt=parseInt(am[1].replace(/[.,]/g,''),10); if(!amt||amt<1000) return;
    const dirHit=/(masuk|kredit|credit|gaji|salary|cr\b|\+)/i.test(line);
    const dir=dirHit?'in':'out';
    let cat='Lainnya', sub='Others', kwHit=false;
    for(const [re,c,s] of KW_CAT){ if(re.test(line)){ cat=c; sub=s; kwHit=true; break; } }
    const dm=line.match(/(\d{1,2})[\/\-\s](jan|feb|mar|apr|mei|may|jun|jul|agu|aug|sep|okt|oct|nov|des|dec)/i);
    const date=dm?`${dm[1].padStart(2,'0')} ${dm[2].slice(0,3).replace(/may/i,'Mei').replace(/aug/i,'Agu').replace(/oct/i,'Okt').replace(/dec/i,'Des')}`:'—';
    const tm=line.match(/\b([01]?\d|2[0-3]):([0-5]\d)\b/);
    const time=tm?`${tm[1].padStart(2,'0')}:${tm[2]}`:'';
    // Confidence bertingkat (bukan datar 60%): dihitung dari kekuatan sinyal yang
    // benar-benar ditemukan di baris — kategori dari kata kunci, kejelasan nominal
    // (format ribuan Rp), ada tanggal, ada waktu, dan arah in/out yang eksplisit.
    // Hasil di-clamp ke rentang 0.35–0.9 supaya jujur: parser lokal tak pernah
    // seyakin AI, tapi tetap membedakan baris yang jelas vs yang menebak.
    let conf=0.35;
    if(kwHit) conf+=0.30;                                   // kategori dikenali dari kata kunci
    if(/[.,]\d{3}/.test(am[1])) conf+=0.12;                 // nominal berformat ribuan (lebih pasti angka uang)
    if(dm) conf+=0.10;                                      // ada tanggal
    if(time) conf+=0.05;                                    // ada waktu
    if(dirHit) conf+=0.08;                                  // arah masuk/keluar eksplisit
    const descLen=line.replace(am[0],'').replace(/[^A-Za-z]/g,'').length;
    if(descLen>=6) conf+=0.05;                              // ada deskripsi merchant yang memadai
    conf=Math.max(0.35,Math.min(0.9,Math.round(conf*100)/100));
    res.push({sender:(line.replace(am[0],'').replace(/[^A-Za-z0-9 &.\-]/g,' ').replace(/\s+/g,' ').trim().slice(0,40))||'Transaksi '+(++i), note:'', amt, date, time, dir, cat, sub, conf, save:/(tabung|saving|invest|bibit|reksa)/i.test(line)});
  });
  return res;
}

function isJagoSampleFile(file,text){
  // Shortcut demo HANYA untuk berkas contoh yang namanya eksplisit "sample/dummy/demo".
  // PDF Bank Jago ASLI milik pengguna TIDAK boleh ke-trigger di sini — biar
  // diteruskan ke AI (OpenAI) untuk diurai sungguhan.
  const nm=((file&&file.name)||'').toLowerCase();
  if(/jago/.test(nm) && /(sample|dummy|demo|contoh)/.test(nm)) return true;
  return false;
}
// Deteksi nama bank dari nama berkas / isi e-statement → dipakai sebagai label
// sumber di Catatan Arus Kas (mis. "Jago"), bukan label generik "Impor".
function detectBankName(file,text){
  const hay=(((file&&file.name)||'')+' '+(text||'')).toLowerCase();
  const banks=[
    [/bank\s*jago|jago/,'Jago'],[/\bbca\b|bank central asia/,'BCA'],
    [/mandiri/,'Mandiri'],[/\bbni\b/,'BNI'],[/\bbri\b/,'BRI'],
    [/jenius|btpn/,'Jenius'],[/seabank/,'SeaBank'],[/\bgopay\b/,'GoPay'],
    [/\bovo\b/,'OVO'],[/\bdana\b/,'DANA'],[/shopeepay/,'ShopeePay'],
    [/bibit/,'Bibit'],[/blu\b|bca digital/,'blu'],[/permata/,'Permata'],
    [/\bcimb\b|niaga/,'CIMB Niaga'],[/danamon/,'Danamon'],[/\bocbc\b/,'OCBC'],
    [/line\s*bank/,'LINE Bank'],[/superbank/,'Superbank']
  ];
  for(const [re,nm] of banks){ if(re.test(hay)) return nm; }
  return 'e-Statement';
}
function jagoSampleParse(){
  return JAGO_SAMPLE_TXNS.map(t=>{
    let dir=(t.dir==='in'?'in':'out');
    let pc=pocketToCat(t.pocket);
    const hay=[t.sender,t.note,t.pocket].filter(Boolean).join(' ');
    const tdet=detectTransfer(hay);
    if(t.dir==='transfer'){ dir='transfer'; if(tdet) pc=tdet; else if(!taxFor('transfer')[pc[0]]) pc=['Antar Kantong','Internal']; }
    else if(tdet){ dir='transfer'; pc=tdet; }
    return {sender:t.sender||'Transaksi', note:t.note||'', amt:Math.abs(+t.amt||0),
            date:t.date||'—', time:t.time||'', dir:dir,
            pocket:t.pocket||'', cat:pc[0], sub:pc[1], conf:0.99};
  }).filter(t=>t.amt>0).sort((a,b)=>dateSortKey(a.date)-dateSortKey(b.date));
}

// ---- Pengurai TERSTRUKTUR untuk e-statement Bank Jago (format per-kantong).
//      Membaca aliran teks PDF apa adanya: deteksi header KANTONG, lalu setiap
//      blok transaksi berbentuk baris-baris:
//        Tanggal · Waktu · Sumber/Tujuan(1-2 baris) · "Pembayaran QRIS/Transfer/…"
//        · ID#… · Catatan(opsional) · JUMLAH(tak bertanda; minus utk keluar) · SALDO
//      Aturan kunci: DUA angka terakhir di blok = [Jumlah, Saldo-setelah-transaksi].
//      Jumlah bertanda minus = keluar; tanpa minus = masuk. Kategori dari NAMA KANTONG.
//      Menghasilkan 8 kolom granular (source/detail/balance/dateFull/timeFull) agar
//      seragam dengan jalur AI — dipakai sebagai cadangan akurat saat AI tak tersedia. ----
const JAGO_POCKETS=['Kantong Utama','GoPay','OVO','Shopping','Self Care','Food','Holiday Fund','Transport','Utilities','Subscription','Groceries','Annual Fund'];
const JAGO_TXKW=/(Pembayaran QRIS|Transaksi POS|Transfer Keluar|Transfer Masuk|Tambah Uang Kantong|Pindah uang antar Kantong|Tarik Uang Kantong|Setor Uang Kantong|Isi Saldo E-Wallet|Pajak Bunga|Bunga)/i;
// Deteksi transaksi jenis TRANSFER (perpindahan dana, bukan income/expense riil).
// Mengembalikan [cat,sub] bila cocok, atau null bila bukan transfer.
function detectTransfer(text){
  const s=text||'';
  if(/Tambah Uang Kantong|Pindah uang antar Kantong/i.test(s)) return ['Antar Kantong','Internal'];
  if(/Isi Saldo E-?Wallet|Top-?up/i.test(s)){
    let sub='Others';
    if(/GoPay/i.test(s)) sub='GoPay'; else if(/OVO/i.test(s)) sub='OVO';
    else if(/DANA/i.test(s)) sub='DANA'; else if(/ShopeePay/i.test(s)) sub='ShopeePay';
    return ['Top-up E-Wallet',sub];
  }
  if(/Setor Uang Kantong/i.test(s)) return ['Setor Tabungan','Setoran'];
  if(/Tarik Uang Kantong/i.test(s)) return ['Tarik Tabungan','Tarik'];
  return null;
}
function parseJagoText(text){
  if(!text || !/Bank Jago|KANTONG|Kantong Utama|Laporan Keuangan/i.test(text)) return [];
  const lines=text.replace(/\r/g,'\n').split('\n').map(s=>s.trim()).filter(Boolean);
  const reDate=/^(\d{1,2})\s+(Jan|Feb|Mar|Apr|Mei|Jun|Jul|Agu|Sep|Okt|Nov|Des)\s+20\d{2}$/i;
  const reTime=/^([01]?\d|2[0-3])[.:]([0-5]\d)(?:[.:]([0-5]\d))?$/;
  // angka format Indonesia: "-900.000", "9.125", "42.230.074,50"
  const reNum=/^-?\d{1,3}(\.\d{3})*(,\d+)?$|^-?\d+(,\d+)?$/;
  // baris non-transaksi (header tabel / ringkasan / footer) yang harus dilewati
  const NOISE=/^(Jago|DUMMY|Laporan Keuangan|www\.|LPS|Dokumen dummy|Mata Uang|Saldo Sebelumnya|Total Pemasukan|Total Pengeluaran|Saldo Akhir|Tanggal & Waktu|Sumber\/Tujuan|Rincian Transaksi|Catatan|Jumlah|Saldo|Akun Aktif|ID Kantong|RINGKASAN|SOROTAN|KANTONG|Total Saldo|Halaman|PT Bank Jago|IDR|This recreated)/i;
  const toNum=(s)=>parseFloat(String(s).replace(/\./g,'').replace(',','.'))||0;
  let pocket='Kantong Utama';
  const res=[];
  for(let i=0;i<lines.length;i++){
    // header kantong: baris yang PERSIS nama kantong, biasanya diikuti "ID Kantong"
    const pk=JAGO_POCKETS.find(p=>p.toLowerCase()===lines[i].toLowerCase());
    if(pk && (i+1>=lines.length || /^ID Kantong/i.test(lines[i+1]) || lines[i+1]==='')){ pocket=pk; continue; }
    if(!reDate.test(lines[i])) continue;
    const dm=lines[i].match(reDate);
    const monRaw=dm[2]; const mon=monRaw.charAt(0).toUpperCase()+monRaw.slice(1,3).toLowerCase();
    const dateFull=`${dm[1].padStart(2,'0')} ${mon} ${lines[i].match(/20\d{2}/)[0]}`;
    const date=`${dm[1].padStart(2,'0')} ${mon}`;
    let j=i+1, timeFull='';
    if(j<lines.length && reTime.test(lines[j])){
      const tm=lines[j].match(reTime);
      timeFull=`${tm[1].padStart(2,'0')}.${tm[2]}`+(tm[3]?`.${tm[3]}`:''); j++;
    }
    // kumpulkan blok sampai transaksi berikutnya / header kantong / akhir
    const block=[];
    while(j<lines.length && !reDate.test(lines[j])
          && !(JAGO_POCKETS.some(p=>p.toLowerCase()===lines[j].toLowerCase()) && /^ID Kantong/i.test(lines[j+1]||''))){
      block.push(lines[j]); j++;
    }
    // DUA angka terakhir di blok = Jumlah lalu Saldo-setelah
    const numIdx=block.map((b,k)=>reNum.test(b)?k:-1).filter(k=>k>=0);
    if(numIdx.length<2){ i=j-1; continue; }
    const jk=numIdx[numIdx.length-2], sk=numIdx[numIdx.length-1];
    const jumlah=toNum(block[jk]);
    const balance=Math.round(toNum(block[sk]));     // saldo setelah transaksi -> kolom Catatan
    const dir=jumlah<0?'out':'in';
    const amt=Math.abs(Math.round(jumlah));
    if(!amt){ i=j-1; continue; }
    // bagian teks sebelum angka: source (sebelum kata kunci jenis) + detail (sesudahnya)
    const mid=block.slice(0,jk).filter(b=>!NOISE.test(b));
    const joined=mid.join(' ').replace(/\s+/g,' ').trim();
    const mkw=joined.match(JAGO_TXKW);
    let source='', detail=joined;
    if(mkw){ source=joined.slice(0,mkw.index).trim(); detail=joined.slice(mkw.index).trim(); }
    else { source=mid[0]||''; }
    const pc=pocketToCat(pocket);
    // Confidence bertingkat untuk parser terstruktur: dasar tinggi (0.85) karena
    // kolom terbaca rapi; naik bila source & detail keduanya kebaca, turun sedikit
    // bila blok minim teks (hanya angka) sehingga deskripsi lemah.
    let conf=0.85;
    if(source && detail && detail!==source) conf+=0.05;
    if(!source && !detail) conf-=0.15;
    conf=Math.max(0.6,Math.min(0.95,Math.round(conf*100)/100));
    res.push({
      sender:source||detail||'Transaksi', source, detail,
      note:'', amt, balance,
      date, dateFull, time:timeFull, timeFull,
      dir, pocket, cat:pc[0], sub:pc[1], conf
    });
    i=j-1;
  }
  return res.sort((a,b)=>dateSortKey(a.date)-dateSortKey(b.date));
}
// Endpoint backend proxy (serverless). Relatif terhadap origin, jadi otomatis
// benar saat di-deploy ke Vercel ('/api/parse-estatement'). Bisa di-override.

// Prompt sistem (dipakai HANYA bila jalur BYO-key langsung; jalur proxy memakai
// prompt yang sama di sisi server agar key tetap rahasia).
function aiSystemPrompt(cats){
