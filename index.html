// Isi kartu "Anggaran Bulan Ini" (beranda). Pengeluaran (spent) dihitung dari
// transaksi BULAN TERPILIH: mode Sendiri pakai sendiriBudgetSpent, mode Berdua
// pakai pagu rumah tangga (budgetSpent per key). Pagu (cap) tetap dari setelan user.
function budgetCardInner(){
  const mLbl=monthsFull[Math.max(0,Math.min(months.length-1,focusMonth))]||'';
  const isB=currentMode==='b';
  const rows=isB?householdBudgets:budgets;
  const spentOf=isB?(b=>budgetSpent(b.key)):(b=>sendiriBudgetSpent(b));
  const totSpent=rows.reduce((a,b)=>a+(spentOf(b)||0),0);
  const totCap=rows.reduce((a,b)=>a+(b.cap||0),0);
  const hasBudget=totCap>0; // user sudah set pagu untuk minimal satu kategori?
  const head=`<div class="sec-head" style="margin-bottom:10px">
          <div class="seclabel" style="margin-bottom:0">Anggaran Bulan Ini <span class="sec-month">· ${mLbl}</span></div>
          <div class="chip-link">Atur ${I.chev}</div>
        </div>`;
  // Belum ada pagu -> jangan tampilkan persentase semu. User harus set anggaran
  // dulu; pemakaian baru terhitung otomatis dari arus kas setelah pagu diatur.
  if(!hasBudget){
    return head+
      `<div class="budg-empty-row">
        <div class="budg-empty-txt">Belum ada pagu. Atur anggaran per kategori dulu — pemakaian akan terhitung otomatis dari arus kas.</div>
      </div>`;
  }
  const pc=Math.min(100,Math.round(totSpent/totCap*100));
  const over=rows.filter(b=>(b.cap||0)>0 && spentOf(b)>b.cap).length;
  // Pagu harian: sisa uang per hari = (pagu − terpakai) ÷ sisa hari bulan ini.
  // Acuan "hari" SELALU mengikuti kalender nyata — bukan posisi dataset. Aturannya:
  //  · bulan sebelum bulan nyata → SELESAI: 0 hari, tampilkan "bulan selesai"
  //                                 (tanpa pembagian/penanda harian sama sekali)
  //  · bulan = bulan nyata        → BERJALAN: sisa hari live sampai akhir bulan,
  //                                 barulah muncul penanda "· N hari"
  //  · bulan setelah bulan nyata  → belum mulai: pakai jumlah hari penuh bulan itu
  const _now=new Date();
  const _fy=_now.getFullYear();
  const _realM=_now.getMonth();
  const _dim=new Date(_fy, focusMonth+1, 0).getDate();
  const _isPast = (focusMonth < _realM);   // bulan sudah lewat secara kalender = selesai
  const _isCur  = (focusMonth === _realM);  // bulan yang benar-benar sedang berjalan
  const _daysLeft = _isPast ? 0 : (_isCur ? Math.max(1,_dim-_now.getDate()+1) : _dim);
  const phRows=rows.filter(b=>(b.cap||0)>0);
  // v1.11.32: badge inisial penanggung jawab (Berdua saja). PIC 'none'/kosong → tanpa badge.
  const picBadge=b=>{ if(!isB) return ''; const who=b.pic; if(!PIC_VALID.includes(who)) return '';
    return `<span class="ph-pic" style="background:${picColor[who]||'#B9AFA8'}" title="${who==='dini'?partnerDisplay():myName()}">${picInitial(who)}</span>`; };
  const phStrip=phRows.length? `<div class="ph-strip">${phRows.map(b=>{
      const cap=(b.cap||0)*1e6, sp=(spentOf(b)||0)*1e6;
      const sisa=cap-sp; const isOver=sisa<0;
      const usePc=Math.min(100,Math.round(sp/Math.max(1,cap)*100));
      if(_isPast){
        // Bulan selesai: tampilkan sisa total tanpa pembagian harian.
        return `<div class="ph-card${isOver?' over':''}">
        <div class="ph-nm-wrap"><span class="ph-nm">${catLabel(b.nm)}</span>${picBadge(b)}</div>
        <div class="ph-day ${isOver?'over':'ok'}">${isOver?'− ':''}Rp ${jtfmt(Math.abs(sisa))}</div>
        <div class="ph-sub">${isOver?'lewat pagu':'sisa akhir'}</div>
        <div class="ph-track"><div class="ph-fill${isOver?' over':''}" style="width:${usePc}%"></div></div>
        <div class="ph-cap">bulan selesai</div>
      </div>`;
      }
      const perDay=Math.round(sisa/_daysLeft);
      return `<div class="ph-card${isOver?' over':''}">
        <div class="ph-nm-wrap"><span class="ph-nm">${catLabel(b.nm)}</span>${picBadge(b)}</div>
        <div class="ph-day ${isOver?'over':'ok'}">${perDay<0?'− ':''}Rp ${jtfmt(Math.abs(perDay))}</div>
        <div class="ph-sub">${isOver?'lewat pagu':'sisa per hari'}</div>
        <div class="ph-track"><div class="ph-fill${isOver?' over':''}" style="width:${usePc}%"></div></div>
        <div class="ph-cap">${isOver?'− ':''}Rp ${jtfmt(Math.abs(sisa))} ${isOver?'lewat':'sisa'} · ${_daysLeft} hari</div>
      </div>`;}).join('')}</div>` : '';
  return head+
        `<div class="ratio-track" style="height:9px"><div style="width:${pc}%;height:100%;background:var(--coral);border-radius:999px"></div></div>
        <div style="display:flex;justify-content:space-between;margin-top:9px;font-size:11.5px;color:var(--muted);font-weight:600">
          <span>Rp ${jtfmt(totSpent*1e6)} terpakai · ${pc}% dari Rp ${jtfmt(totCap*1e6)} pagu</span>
          ${over>0?`<span style="color:#DC2626;display:flex;align-items:center;gap:4px">${I.bell} ${over} kategori lewat</span>`:`<span style="color:#16A34A;display:flex;align-items:center;gap:4px">${I.check} Semua aman</span>`}
        </div>${phStrip}`;
}

/* ===== in-app dialog (robust replacement for window.confirm / window.alert) =====
   window.confirm is suppressed inside sandboxed/preview iframes and returns false,
   which silently breaks delete actions. This custom dialog always works. */
function appDialog({title,msg,okText='OK',cancelText=null,danger=false}){
  return new Promise(resolve=>{
    const scrim=document.getElementById('dlgScrim');
    const tEl=document.getElementById('dlgTitle');
    const mEl=document.getElementById('dlgMsg');
    const aEl=document.getElementById('dlgActions');
    if(!scrim){ resolve(true); return; }
    tEl.textContent=title||'';
    mEl.textContent=msg||''; mEl.style.display=msg?'block':'none';
    const okCls=danger?'dlg-ok danger':('dlg-ok accent-'+currentMode);
    aEl.innerHTML='';
    let cancelBtn=null;
    if(cancelText){
      cancelBtn=document.createElement('button');
      cancelBtn.className='dlg-cancel'; cancelBtn.textContent=cancelText;
      aEl.appendChild(cancelBtn);
    }
    const okBtn=document.createElement('button');
    okBtn.className=okCls; okBtn.textContent=okText;
    aEl.appendChild(okBtn);
    const close=(val)=>{ scrim.classList.remove('show'); setTimeout(()=>{ aEl.innerHTML=''; },240); resolve(val); };
    okBtn.addEventListener('click',()=>close(true));
    if(cancelBtn) cancelBtn.addEventListener('click',()=>close(false));
    scrim.onclick=(e)=>{ if(e.target===scrim) close(false); };
    requestAnimationFrame(()=>scrim.classList.add('show'));
  });
}

// v1.11.31: Toast ringan non-blocking untuk feedback singkat (mis. "Tautan
// tersalin"). Auto-hilang ~2.2 dtk, tidak menghalangi interaksi. Dipakai di
// alur "ajak pasangan gabung" (guest & sudah login). Bila opts.anchor diberi
// (elemen yang diklik), toast muncul TEPAT DI ATAS elemen itu supaya user ngeh
// di dekat titik aksi; tanpa anchor → fallback melayang di bawah layar.
let _toastTimer=null;
function showToast(msg, opts){
  opts=opts||{};
  const withCheck = opts.check!==false;
  const anchor = opts.anchor||null;
  let el=document.getElementById('appToast');
  if(!el){
    el=document.createElement('div');
    el.id='appToast'; el.className='app-toast'; el.setAttribute('role','status'); el.setAttribute('aria-live','polite');
    document.body.appendChild(el);
  }
  el.innerHTML=`${withCheck?I.check:''}<span>${msg}</span>`;
  if(anchor && anchor.getBoundingClientRect){
    // Posisikan di atas elemen anchor, terpusat horizontal, dijaga di dalam viewport.
    el.classList.add('anchored');
    el.style.visibility='hidden'; el.style.left='0px'; el.style.top='0px';
    void el.offsetWidth; // ukur dimensi toast dulu
    const r=anchor.getBoundingClientRect();
    const tw=el.offsetWidth, th=el.offsetHeight, m=8;
    let left=r.left + r.width/2 - tw/2;
    left=Math.max(m, Math.min(left, window.innerWidth - tw - m));
    let top=r.top - th - 10;                 // default: di atas anchor
    if(top < m) top=r.bottom + 10;           // kalau mepet atas → taruh di bawah anchor
    el.style.left=left+'px'; el.style.top=top+'px';
    el.style.visibility='';
  }else{
    el.classList.remove('anchored');
    el.style.left=''; el.style.top=''; el.style.visibility='';
  }
  // paksa reflow supaya animasi masuk konsisten walau toast dipakai beruntun
  void el.offsetWidth;
  el.classList.add('show');
  if(_toastTimer) clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>{ el.classList.remove('show'); }, 2200);
}

 * Ikon export di header membuka bottom-sheet: pilih mode (default = mode

const EXP_MONTHS=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
let expState=null; // {mode, period:'bulanan'|'tanggal', month, year, from, to}

function expDefaultState(){
  const now=new Date();
  const y=String(now.getFullYear());
  const m=EXP_MONTHS[now.getMonth()];
  const mm=String(now.getMonth()+1).padStart(2,'0');
  const last=new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  return { mode: currentMode, period:'bulanan', month:m, year:y,
    from:`${y}-${mm}-01`, to:`${y}-${mm}-${String(last).padStart(2,'0')}` };
}
function expFilename(){
  const s=expState; const md=s.mode==='s'?'Sendiri':'Berdua';
  if(s.period==='bulanan'){
    const mi=String(EXP_MONTHS.indexOf(s.month)+1).padStart(2,'0');
    return `${s.year}-${mi}_Atur-${md}_e-Statement.xls`;
  }
  return `${s.from}_sd_${s.to}_Atur-${md}_e-Statement.xls`;
}
function openExport(){
  expState=expDefaultState();
  renderExportSheet();
  const sc=document.getElementById('expScrim');
  if(sc){ void sc.offsetWidth; sc.classList.add('show'); }
}
function closeExport(){
  const sc=document.getElementById('expScrim'); if(sc) sc.classList.remove('show');
}
function setExpMode(m){ expState.mode=m; renderExportSheet(); }
function setExpPeriod(p){ expState.period=p; renderExportSheet(); }
function setExpVal(k,v){ expState[k]=v; renderExportSheet(); }

// Parse "DD Mon" (mis. "3 Jul") + tahun terpilih -> Date. Data app diperlakukan
// bertahun sesuai pilihan; bila tak ada tahun eksplisit dipakai year state.
function expParseTxnDate(dstr, year){
  const m=(''+dstr).trim().match(/(\d{1,2})\s+([A-Za-z]{3})/);
  if(!m) return null;
  const day=+m[1]; const mi=EXP_MONTHS.findIndex(x=>x.toLowerCase()===m[2].toLowerCase());
  if(mi<0) return null;
  return new Date(+year, mi, day);
}
function expFilteredTxns(){
  const s=expState;
  // Sumber data: ledger transaksi manual + e-statement (mode aktif app).
  const src=(typeof manualTxns!=='undefined' && Array.isArray(manualTxns))?manualTxns:[];
  return src.filter(t=>{
    const d=expParseTxnDate(t.date, s.period==='bulanan'?s.year:(s.from||'2026').slice(0,4));
    if(!d) return true; // tanpa tanggal valid → tetap sertakan
    if(s.period==='bulanan'){
      return d.getMonth()===EXP_MONTHS.indexOf(s.month) && d.getFullYear()===+s.year;
    }
    const from=new Date(s.from+'T00:00:00'), to=new Date(s.to+'T23:59:59');
    return d>=from && d<=to;
  });
}
function expCountTxns(){ try{ return expFilteredTxns().length; }catch(e){ return 0; } }

function xmlEsc(s){ return (''+(s==null?'':s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

const TA_CHAT_URL = (window.ATUR_AI_CHAT_URL || '/api/tanya-ai');

// Ringkas data keuangan user (dari transaksi) untuk konteks model — dihitung lokal.
function taBuildContext(){
  let cats=[]; try{ cats=(typeof validCats==='function')?validCats():[]; }catch(e){}
  const src=(typeof manualTxns!=='undefined'&&Array.isArray(manualTxns))?manualTxns:[];
  let masuk=0, keluar=0; const perCat={};
  src.forEach(t=>{
    const amt=(typeof expAmtNum==='function')?expAmtNum(t.amt):(parseInt((''+t.amt).replace(/[^\d]/g,''))||0);
    if(t.dir==='in') masuk+=amt; else if(t.dir==='out'){ keluar+=amt; const c=(typeof catLabel==='function'?catLabel(t.cat):t.cat)||'Lainnya'; perCat[c]=(perCat[c]||0)+amt; }
  });
  const top=Object.entries(perCat).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([k,v])=>({kategori:k,total:v}));
  const savingsRate = masuk>0 ? Math.round((masuk-keluar)/masuk*100) : null;
  let ef=0, wealth=0, purposes=[];
  try{
    ef=emergencyFundNow();
    wealth=(typeof wealthTotalNow==='function')?wealthTotalNow():0;
    const pm={};
    activeAssets().forEach(a=>{ const p=(a&&a.purpose)?purposeLabel(a.purpose):''; if(p) pm[p]=(pm[p]||0)+(a.amtNum||0); });
    purposes=Object.entries(pm).map(([k,v])=>({tujuan:k,total:v}));
  }catch(e){}
  const efMonths = keluar>0 ? +(ef/keluar).toFixed(1) : null;
  return { mode: currentMode, cats,
    summary:{ jumlah_transaksi:src.length, total_masuk:masuk, total_keluar:keluar,
      savings_rate_persen:savingsRate, kategori_terbesar:top,
      total_kekayaan:wealth, dana_darurat:ef, dana_darurat_bulan_pengeluaran:efMonths,
      kekayaan_per_tujuan:purposes } };
}

// Panggil model via proxy. Mengembalikan {ok, reply} atau {ok:false} bila
// server belum dikonfigurasi / gagal → pemanggil fallback ke basis lokal.
async function taApiChat(){
  const messages=taConvo.map(m=>({ role:m.who==='user'?'user':'assistant',
    content:m.who==='user'?(m.text||''):(m.plain||(m.html||'').replace(/<[^>]+>/g,' ')) }));
  try{
    const r=await fetch(TA_CHAT_URL,{ method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ messages, context: taBuildContext() }) });
    if(!r.ok) return {ok:false};
    const d=await r.json();
    if(d && typeof d.reply==='string' && d.reply.trim()) return {ok:true, reply:d.reply.trim()};
    return {ok:false};
  }catch(e){ return {ok:false}; }
}

function taSend(){
  const inp=document.getElementById('taInput'); if(!inp) return;
  const text=inp.value.trim(); if(!text) return;
  inp.value='';
  const sg=document.getElementById('taSuggest'); if(sg) sg.style.display='none';
  taAppend({who:'user',text});
  const body=document.getElementById('taBody');
  if(body){ body.insertAdjacentHTML('beforeend','<div class="ta-typing" id="taTyping"><span></span><span></span><span></span></div>'); body.scrollTop=body.scrollHeight; }
  // 1) Coba model via proxy. 2) Bila server belum siap/gagal → basis pengetahuan lokal.
  taApiChat().then(res=>{
    const tp=document.getElementById('taTyping'); if(tp) tp.remove();
    if(res.ok){
      // Balasan model boleh mengandung HTML sederhana yang diizinkan prompt.
      taAppend({who:'bot',html:res.reply, plain:res.reply.replace(/<[^>]+>/g,' '), actions:[]});
    }else{
      const r=taBotReply(text);
      taAppend({who:'bot',html:r.html, plain:(r.html||'').replace(/<[^>]+>/g,' '), actions:r.actions});
    }
  });
}

  const joinCode = o.code || APP.pendingJoin || '';
  // Tahap: default varian join → 'choose'; tapi bila sudah cloud, lompat ke 'name'.
  const step = o.step || (isJoin ? (APP.authMode==='cloud' ? 'name' : 'choose') : 'name');

  if(isJoin && step==='choose'){ mountJoinChoose(joinCode); return; }

      // tanpa perlakuan "baru gabung sebagai pasangan".
      if(ok && res && res.self){ mountPhone(); return; }

      // Gagal accept (mis. kode kedaluwarsa) → tetap masuk, beri tahu singkat.

    // Alur pasangan TANPA login (guest): tak bisa tersinkron ke akun pengundang,
    // tapi tetap masuk ke tampilan ATUR Berdua secara lokal di perangkat ini.
    if(isJoin){
      APP.partner=APP.partner||inviter||'Pasangan';
      APP.berduaSetup=true; berduaConnected=true; currentMode='b';

      try{ appAlert && appAlert('Kamu masuk ATUR Berdua tanpa login, jadi data belum tersinkron dengan '+(inviter||'pengundang')+'. Masuk dengan Google untuk menautkan kedua akun.'); }catch(e){}
      enterBerduaAfterJoin(); return;
    }
    mountPhone();
  };
  btn.addEventListener('click',enter);
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter') enter(); });
  const gate=document.getElementById('obToGate');
  if(gate) gate.addEventListener('click',mountAuthGate);
  setTimeout(()=>inp&&inp.focus(),100);
  startLiveClock();
}

// ----- (v1.11.20) Reset data & Log out DIPISAH -----
// Sebelumnya hanya ada satu aksi "Reset Data & Keluar" (doResetApp) yang sekaligus
// menghapus SEMUA data lokal + signOut. Kini dipisah:
//   • doLogout()      → hanya keluar dari sesi (signOut). Data cloud TETAP ada,
//                        login ulang memulihkan data. Data lokal TIDAK dihapus.
//   • doResetData()   → tampilkan pilihan cakupan: Reset Sendiri / Reset Berdua.
//   • resetSendiri()  → hapus data mode Sendiri saja (transaksi, pagu, aset).
//   • resetBerdua()   → hapus data mode Berdua saja (+ keluar household bila cloud).

// Keluar dari sesi tanpa menghapus data (cloud tetap tersimpan).
async function doLogout(){
  const isCloud = APP.authMode==='cloud';
  const msg = isCloud
    ? 'Kamu akan keluar dari sesi ini. Data yang tersimpan di cloud TIDAK dihapus — login kembali dengan akun yang sama untuk memulihkannya.'
    : 'Kamu akan kembali ke layar awal. Data di perangkat ini TIDAK dihapus dan tetap tersedia saat kamu masuk lagi.';
  if(!(await appDialog({title:'Keluar dari akun?',msg,okText:'Keluar',cancelText:'Batal'}))) return;
  try{ await signOut(); }catch(e){}
  // Bersihkan hanya state sesi/lokal di perangkat ini; data cloud tetap utuh.
  APP.authMode='guest'; APP.email=''; APP.householdId=''; APP.profileDone=false;
  APP.joinFlow=false; APP.pendingJoin='';
  try{ localStorage.removeItem('atur_pending_join'); localStorage.removeItem('atur_join_flow'); }catch(e){}
  berduaConnected=false; currentMode='s'; saveApp(); syncNames();
  screenStack.length=0;
  mountWelcome();
}

// Pilih cakupan reset: Sendiri atau Berdua (dialog 2 opsi + batal).
function doResetData(){
  const scrim=document.getElementById('dlgScrim');
  const tEl=document.getElementById('dlgTitle');
  const mEl=document.getElementById('dlgMsg');
  const aEl=document.getElementById('dlgActions');
  if(!scrim){ return; }
  tEl.textContent='Reset data yang mana?';
  mEl.textContent='Pilih data yang ingin dihapus permanen dari perangkat ini. Tindakan ini tidak bisa dibatalkan.';
  mEl.style.display='block';
  aEl.innerHTML='';
  const close=()=>{ scrim.classList.remove('show'); setTimeout(()=>{ aEl.innerHTML=''; },240); };
  const mk=(label,cls,fn)=>{ const b=document.createElement('button'); b.className=cls; b.textContent=label; b.addEventListener('click',()=>{ close(); setTimeout(fn,260); }); return b; };
  aEl.appendChild(mk('Reset data Sendiri','dlg-ok danger', ()=>resetSendiri()));
  aEl.appendChild(mk('Reset data Berdua','dlg-ok danger', ()=>resetBerdua()));
  aEl.appendChild(mk('Batal','dlg-cancel', ()=>{}));
  scrim.onclick=(e)=>{ if(e.target===scrim) close(); };
  requestAnimationFrame(()=>scrim.classList.add('show'));
}

// Hapus data mode Sendiri saja.
async function resetSendiri(){
  if(!(await appDialog({title:'Reset data Sendiri?',msg:'Semua transaksi, anggaran, dan aset di mode ATUR Sendiri akan dihapus dari perangkat ini. Data Berdua tidak terpengaruh.',okText:'Reset Sendiri',cancelText:'Batal',danger:true}))) return;
  try{ localStorage.removeItem('atur_manual_txns'); localStorage.removeItem('atur_budget_caps'); }catch(e){}
  manualTxns.length=0; assetsSendiri.length=0;
  budgets.length=0;
  try{ loadBudgetCaps(); }catch(e){}
  invalidateDerive && invalidateDerive();
  currentMode='s'; swapProjStore('s'); saveApp();
  screenStack.length=0; mountPhone && mountPhone();
  try{ appAlert('Data ATUR Sendiri sudah direset.','Selesai'); }catch(e){}
}

// Hapus data mode Berdua saja (dan keluar household bila tersambung cloud).
async function resetBerdua(){
  if(!(await appDialog({title:'Reset data Berdua?',msg:'Semua transaksi, anggaran, pembagian tugas, dan aset di mode ATUR Berdua akan dihapus dari perangkat ini. Bila kamu tersambung dengan pasangan, koneksi juga diputus. Data Sendiri tidak terpengaruh.',okText:'Reset Berdua',cancelText:'Batal',danger:true}))) return;
  try{ if(APP.householdId) await leaveHousehold(); }catch(e){ berduaConnected=false; }
  try{ localStorage.removeItem('atur_household_txns'); localStorage.removeItem('atur_hh_budget_caps'); localStorage.removeItem('atur_pic'); }catch(e){}
  householdTxns.length=0; assetsBerdua.length=0;
  householdBudgets.length=0;
  try{ _berduaInitDone=false; }catch(e){} // izinkan sinkronisasi awal lagi bila nanti join ulang
  APP.partner=''; APP.berduaSetup=false; berduaConnected=false;
  try{ loadBudgetCaps(); }catch(e){}
  invalidateDerive && invalidateDerive();
  currentMode='s'; swapProjStore('s'); saveApp(); syncNames();
  screenStack.length=0; mountPhone && mountPhone();
  try{ appAlert('Data ATUR Berdua sudah direset.','Selesai'); }catch(e){}
}

// Taxonomy (Category -> Sub-Category) sourced from Amel_Expense "Categories" sheet
/* ===== Taksonomi per-jenis transaksi (Turn 65) =====
 * Tiga jenis: 'out' (Pengeluaran), 'in' (Pemasukan), 'transfer' (Transfer).
 * Tiap jenis punya daftar kategori sendiri & BISA ditambah user (opsi "+ Tambah kategori").
 * `taxonomy` (gabungan) tetap dipertahankan agar lookup cat->sub yang lama tidak rusak. */
const TAXO_BY_DIR = {
  out: {
    'Food':['Meal','Snack','Breakfast','Others'],
    'Groceries':['Food','Others'],
    'Transport':['Motor','Car','Public','Bandung','Others'],

    'Setor Tabungan':['Setoran','Auto-debit','Others'],
    'Tabungan Terjadwal':['Tahunan','Liburan'],
    'Tarik Tabungan':['Tarik','Others'],
    'Alokasi Bujet':['Bujet','Others'],
    'Other Transfer':['Others']
  }
};
// Kompat lama: gabungan semua kategori (pakai jenis 'out' lebih dulu agar warna donut konsisten).
const taxonomy = Object.assign({}, TAXO_BY_DIR.transfer, TAXO_BY_DIR.in, TAXO_BY_DIR.out);
// Daftar kategori untuk satu jenis transaksi (dipakai semua dropdown kategori).
function taxFor(dir){ return TAXO_BY_DIR[dir] || TAXO_BY_DIR.out; }
// Tambah kategori baru ke jenis tertentu + sinkron ke `taxonomy` gabungan.
function addTaxoCat(dir, name){
  const tx=taxFor(dir);
  if(!tx[name]) tx[name]=['Others'];
  if(!taxonomy[name]) taxonomy[name]=tx[name];
  return tx[name];
}
// Pemetaan kategori lama -> kategori baru (agar data lama tidak rusak).
const CAT_MIGRATE={ 'Revenue':'Salary', 'Investment':'Investment Return', 'Annual Fund':'Setor Tabungan', 'Holiday Fund':'Setor Tabungan', 'Lainnya':'Other Expense' };
function migrateCat(cat,dir){
  if(taxonomy[cat]) return cat;
  if(CAT_MIGRATE[cat]) return CAT_MIGRATE[cat];
  return dir==='in'?'Other Income':(dir==='transfer'?'Other Transfer':'Other Expense');
}

  Housing:'hunian', Utilities:'tagihan', Subscription:'tagihan',
  Groceries:'belanja', Shopping:'belanja', Food:'belanja',
  Family:'keluarga', Medical:'keluarga',

// Tentukan PIC (reza/dini) sebuah transaksi: 1) override eksplisit, 2) lewat kategori->budget,
// 3) fallback deterministik dari id agar stabil antar render.
function txnPic(t){
  // ✅ PERBAIKAN: Selalu gunakan pic yang tersimpan di transaksi, walaupun tidak ada di PIC_VALID!
  if(t && t.pic) {
    if(PIC_VALID.includes(t.pic)) return t.pic;
    // Jika ada nama langsung disimpan, map ke ID yang benar
    const nm = String(t.pic).toLowerCase().trim();
    if(nm === partnerDisplay().toLowerCase().trim()) return 'dini';
    if(nm === myName().toLowerCase().trim()) return 'reza';
  }
  const key = CAT_TO_BUDGET[t && t.cat];
  if(key){ const b=householdBudgets.find(x=>x.key===key); if(b && PIC_VALID.includes(b.pic)) return b.pic; }
  // fallback: hash sederhana dari id -> stabil
  const s=String((t&&t.id)||''); let h=0; for(let i=0;i<s.length;i++){ h=(h*31+s.charCodeAt(i))>>>0; }
  return PIC_VALID[h % PIC_VALID.length];
}

async function acceptInvite(code){
  const c=initSupabase(); if(!c) throw new Error('offline');
  const sess=await currentSession(); if(!sess) throw new Error('login dulu');
  const uid=sess.user.id;
  const { data:inv, error:e1 } = await c.from('invites').select('household_id,expires_at,invited_by').eq('code',code).single();
  if(e1||!inv) throw new Error('kode tidak valid');
  // Self-invite: pembuka link adalah PENGUNDANG sendiri (pembuat undangan atau
  // sudah pemilik household yang sama). Jangan proses accept — cukup pastikan
  // household tercatat & kembalikan penanda khusus supaya caller membawa ke
  // dashboard-nya sendiri (bukan alur "gabung sebagai pasangan").
  if(inv.invited_by===uid || (APP.householdId && APP.householdId===inv.household_id)){
    APP.householdId=inv.household_id; saveApp();
    return { self:true, householdId:inv.household_id };
  }
  if(new Date(inv.expires_at) < new Date()) throw new Error('undangan kedaluwarsa');
  const myNm=(APP.name||'').trim()||null;
  const { error:e2 } = await c.from('household_members')
    .insert({ household_id:inv.household_id, user_id:uid, role:'member', display_name:myNm });
  if(e2 && e2.code!=='23505') throw e2; // 23505 = sudah anggota, abaikan
  // Kalau sudah anggota (23505) tapi punya nama baru → perbarui display_name.
  if(e2 && e2.code==='23505' && myNm){
    try{ await c.from('household_members').update({ display_name:myNm }).eq('household_id',inv.household_id).eq('user_id',uid); }catch(_){}
  }
  await c.from('invites').update({ accepted_by:uid, accepted_at:new Date().toISOString() }).eq('code',code);
  APP.householdId=inv.household_id; berduaConnected=true;
  // Ambil nama PENGUNDANG (anggota lain di household ini) → tampil di greeting Berdua.
  try{ const nm=await fetchPartnerName(inv.household_id, uid); if(nm) APP.partner=nm; }catch(_){}
  saveApp(); syncNames();
  return { self:false, householdId:inv.household_id };
}

// Prinsip pemisahan data:
//   • ATUR Sendiri (mode 's', manualTxns) = PRIVAT per akun. TIDAK PERNAH
//     di-push/pull ke/dari cloud. Pasangan tak bisa melihatnya.
//   • ATUR Berdua (mode 'b', householdTxns) = GABUNGAN & ter-sync antar kedua
//     akun household lewat tabel `transactions` (RLS berbasis household).
// berduaCloudActive() true HANYA saat: login cloud + punya household + mode 'b'.
function berduaCloudActive(){
  return APP.authMode==='cloud' && !!APP.householdId;
}
// Kolom cloud yang tersedia: household_id, user_id, local_id, type(in/out),
// amount(number), category, note(text), occurred_at. Field lokal ATUR jauh
// lebih kaya (dir, bank, ket, cur, rate, sub, pic, seq, time, dsb). Agar sync
// TANPA migrasi skema, seluruh field ekstra dibungkus JSON di kolom `note`.
function _numAmt(t){
  const v=t.amt!=null?t.amt:(t.amount!=null?t.amount:0);
  if(typeof v==='number') return Math.abs(v);
  // `amt` lokal berupa string locale ID (mis. "200.000") — titik = pemisah
  // RIBUAN, bukan desimal. Buang SEMUA non-digit (konsisten dgn manualParse),
  // jangan pakai Number() atas string bertitik (itu bikin "200.000" -> 200).
  return Math.abs(parseInt(String(v).replace(/[^\d]/g,''),10)||0);
}
// Ubah transaksi lokal (mode Berdua) -> baris cloud.
function txnToCloud(t){
  const dir=(t.dir==='in'||t.kind==='income'||t.type==='in')?'in':'out';
  // Simpan semua field lokal (kecuali yang sudah punya kolom) di envelope JSON.
  const extra={ ket:t.ket, note:t.note, dir:t.dir, bank:t.bank, cur:t.cur,
    rate:t.rate, sub:t.sub, pic:t.pic, seq:t.seq, time:t.time, origin:t.origin,
    pocket:t.pocket, source:t.source, detail:t.detail, balance:t.balance,
    timeFull:t.timeFull, dateFull:t.dateFull };
  return {
    local_id:String(t.id||t.local_id||Date.now()),
    type:dir,
    amount:_numAmt(t),
    category:t.cat||t.category||null,
    note:'ATURJSON:'+JSON.stringify(extra),
    occurred_at:t.date||t.occurred_at||new Date().toISOString()
  };
}
// Ubah baris cloud -> transaksi lokal (mode Berdua), memulihkan field ekstra.
function cloudToTxn(row){
  let extra={};
  if(row.note && String(row.note).startsWith('ATURJSON:')){
    try{ extra=JSON.parse(String(row.note).slice(9))||{}; }catch(e){ extra={}; }
  } else if(row.note){ extra.ket=row.note; }
  const dir=extra.dir || (row.type==='in'?'in':'out');
  const t={
    id:row.local_id,
    seq:extra.seq!=null?extra.seq:(typeof nextSeq==='function'?nextSeq():0),
    origin:extra.origin||'cloud',
    dir,
    amt:Number(row.amount||0).toLocaleString('id-ID'),
    cur:extra.cur||'IDR',
    rate:extra.rate!=null?extra.rate:1,
    bank:extra.bank||'',
    ket:extra.ket||(typeof dirLabel==='function'?dirLabel(dir):''),
    note:extra.note||'',
    date:(row.occurred_at||'').slice(0,10)||extra.dateFull||'',
    time:extra.time||'—',
    cat:row.category||'Lainnya',
    sub:extra.sub||''
  };
  if(extra.pic!=null) t.pic=extra.pic;
  if(extra.pocket!=null) t.pocket=extra.pocket;
  if(extra.source!=null) t.source=extra.source;
  if(extra.detail!=null) t.detail=extra.detail;
  if(extra.balance!=null) t.balance=extra.balance;
  if(extra.timeFull!=null) t.timeFull=extra.timeFull;
  if(extra.dateFull!=null) t.dateFull=extra.dateFull;
  return t;
}

// Tarik SEMUA transaksi household dari cloud -> ganti isi householdTxns lokal,
// simpan cache, lalu segarkan tampilan. INI yang membuat data Berdua kedua
// akun tergabung & sinkron. Tidak menyentuh manualTxns (mode Sendiri).
let _pullingHh=false;
async function pullHouseholdTxns(rerender){
  if(!berduaCloudActive()) return;
  if(_pullingHh) return;
  _pullingHh=true;
  try{
    const rows=await pullCloud();
    const mapped=rows.map(cloudToTxn);
    if(typeof householdTxns!=='undefined'){
      householdTxns.length=0;
      mapped.forEach(t=>householdTxns.push(t));
      // jaga _seqCounter tak tertinggal agar transaksi baru tetap muncul teratas
      if(typeof _seqCounter!=='undefined'){
        const mx=householdTxns.reduce((m,t)=>Math.max(m,t.seq||0),0);
        if(mx>_seqCounter) _seqCounter=mx;
      }
      try{ localStorage.setItem('atur_household_txns',JSON.stringify(householdTxns)); }catch(e){}
      if(typeof invalidateDerive==='function') invalidateDerive();
    }
    if(rerender!==false) refreshBerduaViews();
  }catch(e){ console.warn('pullHouseholdTxns', e); }
  finally{ _pullingHh=false; }
}
// Sinkronisasi awal saat pertama masuk Berdua+cloud pada sebuah sesi:
//  1) Naikkan transaksi Berdua LOKAL yang belum ada di cloud (mis. dicatat
//     sebelum fitur sync ada / saat offline) supaya tidak hilang saat di-pull.
//  2) Baru tarik data gabungan dari cloud (kedua akun jadi satu).
// Sengaja hanya sekali per sesi halaman agar tidak berulang tiap ganti mode.
let _berduaInitDone=false;
async function syncBerduaInitial(rerender){
  if(!berduaCloudActive()){ return; }
  if(!_berduaInitDone){
    _berduaInitDone=true;
    try{
      const cloudRows=await pullCloud();
      const cloudIds=new Set((cloudRows||[]).map(r=>String(r.local_id)));
      const localOnly=(typeof householdTxns!=='undefined'?householdTxns:[])
        .filter(t=>t && t.id!=null && !cloudIds.has(String(t.id)));
      for(const t of localOnly){ await pushTxnCloud(t); }
    }catch(e){ console.warn('syncBerduaInitial push', e); }
  }
  await pullHouseholdTxns(rerender);
}

// ---- Tujuan aset (v1.12.1): "Dana Darurat" (bawaan) atau tujuan Kustom bebas ----
// purpose disimpan di objek aset sbg string: 'darurat' | '<nama kustom>' | '' (tanpa).

let customPurposes = [];
try{ const raw=localStorage.getItem('atur_asset_purposes'); if(raw) customPurposes=JSON.parse(raw)||[]; }catch(e){ customPurposes=[]; }
function saveCustomPurposes(){ try{ localStorage.setItem('atur_asset_purposes', JSON.stringify(customPurposes.slice(0,50))); }catch(e){} }
function registerCustomPurpose(nm){
  nm=(nm||'').trim(); if(!nm) return '';
  if(nm.toLowerCase()==='dana darurat') return 'darurat';
  if(!customPurposes.some(p=>p.toLowerCase()===nm.toLowerCase())){ customPurposes.push(nm); saveCustomPurposes(); }
  return nm;
}
// Semua nama tujuan kustom yang dikenal (dari daftar tersimpan + aset kedua mode).
function knownCustomPurposes(){
  const set=new Map();
  customPurposes.forEach(p=>{ if(p) set.set(p.toLowerCase(),p); });
  [assetsSendiri,assetsBerdua].forEach(arr=>arr.forEach(a=>{
    const p=(a&&a.purpose)?a.purpose:''; if(p && p!=='darurat') set.set(p.toLowerCase(),p);
  }));
  return [...set.values()];
}

// Render blok Tujuan (select + input kustom) untuk form aset. prefix = 'a'|'ae'.

// Rasio tabungan: setoran tabungan/investasi ÷ pemasukan — dari SEMUA transaksi (gabungan sumber)
function savingRatio(){
  let txnIncome=0, txnSaved=0;
  activeTxns().forEach(t=>{
    const v=txnIDR(t);
    if(t.dir==='in') txnIncome+=v;
    // setoran tabungan/investasi = pengeluaran berkategori Investment Return/Setor Tabungan, atau sub 'Saving'
    if(t.dir==='out' && (t.cat==='Investment Return' || t.cat==='Setor Tabungan' || (t.sub||'').toLowerCase()==='saving')) txnSaved+=v;
  });
  // Pemasukan bulanan total (semua sumber) — pakai baseline + tambahan dari txn manual user.
  const income = Math.max(MONTH_BASE.in, txnIncome);
  // Setoran reguler ke tujuan keuangan (rutin) + investasi non-reguler dari transaksi.
  const goalRegular = REGULAR_GOAL_SAVING; // setoran rutin yang sukses tersimpan bulan ini
  const saved = goalRegular + txnSaved;
  // Target: kebutuhan setoran bulanan dari tujuan ÷ pemasukan (cap 60% realistis).
  const need=goalMonthlyNeed();
  const target=Math.min(60, Math.max(20, Math.round(need/income*100)))||50;
  const ratio=income>0? Math.round(saved/income*100):0;
  return {income, saved, ratio:Math.min(100,ratio), target, goalRegular, txnSaved};
}

// ===== Catatan Arus Kas: gabung semua transaksi, urut per tanggal, filter per bank =====
const ID_MON={'Jan':0,'Feb':1,'Mar':2,'Apr':3,'Mei':4,'Jun':5,'Jul':6,'Agu':7,'Sep':8,'Okt':9,'Nov':10,'Des':11};
const ID_MON_NAMES=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
// parse "05 Jun" (asumsi 2026) atau "2026-06-29" -> {sortKey(number), label("05 Jun")}
// Normalisasi tanggal hasil impor ("DD Mon" / ISO) — normDate sudah mengenali keduanya.
function normImportDate(d){ return d||'—'; }
function normDate(d){
  if(!d) return {key:0,label:'—'};
  if(/^\d{4}-\d{2}-\d{2}/.test(d)){
    const [y,m,day]=d.slice(0,10).split('-').map(Number);
    const mon=ID_MON_NAMES[m-1]||'Jun';
    return {key:y*10000+m*100+day, label:String(day).padStart(2,'0')+' '+mon};
  }
  const mt=d.match(/(\d{1,2})\s+([A-Za-z]{3})/);
  if(mt){ const day=+mt[1], mon=ID_MON[mt[2]]??5; return {key:2026*10000+(mon+1)*100+day, label:String(day).padStart(2,'0')+' '+mt[2]}; }
  return {key:0,label:d};
}
// Helper tampilan arah transaksi: in (+, hijau), out (−, merah), transfer (⇄, biru/netral).
function dirClass(d){ return d==='in'?'pos':(d==='transfer'?'trf':'neg'); }
function dirSign(d){ return d==='in'?'+':(d==='transfer'?'⇄':'−'); }
function dirIcon(d){ return d==='in'?I.dlft:(d==='transfer'?(I.swap||I.link):I.uprt); }
function dirLabel(d){ return d==='in'?'Pemasukan':(d==='transfer'?'Transfer':'Pengeluaran'); }
function allTxns(){
  const list=[];
  // Sumber: store aktif sesuai mode (Sendiri=manualTxns, Berdua=householdTxns)
  activeTxns().forEach(t=>{
    const nd=normDate(t.date); const v=txnIDR(t); const orig=manualParse(t.amt);
    const isE=t.origin==='estmt';
    const curCode=t.cur||'IDR';
    const amtRaw = curCode==='IDR' ? 'Rp '+v.toLocaleString('id-ID')
                 : (CURRENCIES[curCode]?.sym||curCode)+' '+orig.toLocaleString('id-ID')+' · Rp '+v.toLocaleString('id-ID');
    list.push({id:t.id, dir:t.dir, amtNum:v, amtRaw,
      cur:curCode,
      bank:t.bank, bankAbbr:(t.bank||'').slice(0,3).toUpperCase(),
      bankColor: bankColorOf(t.bank),
      title:t.ket||t.sender||'Transaksi', sub:catLabel(t.cat)+' · '+subLabel(t.sub),
      cat:t.cat, subc:t.sub, time:t.time, dkey:nd.key, dlabel:nd.label, seq:t.seq||0,
      src: isE?'estmt':'manual'});
  });
  // tanggal terbaru di atas; pada tanggal yang sama, input/edit terbaru (seq besar) di atas
  list.sort((a,b)=> (b.dkey-a.dkey) || (b.seq-a.seq));
  return list;
}
// Total Saldo Kamu = akumulasi pemasukan − pengeluaran dari seluruh sumber yang
// dimasukkan user (e-statement + input manual, semua tersimpan di manualTxns).
function saldoFromTxns(){
  const list=allTxns();
  let inn=0,out=0,trf=0;
  list.forEach(t=>{ if(t.dir==='in') inn+=t.amtNum; else if(t.dir==='transfer') trf+=t.amtNum; else out+=t.amtNum; });
  const banks=[...new Set(list.map(t=>t.bank).filter(Boolean))];
  return {saldo:inn-out, inn, out, trf, count:list.length, banks};
}

/* Tier ditentukan dari annual saving (gross) dalam rupiah.
   Ambang dibuat per juta agar progresif & memberi target yang terasa. */
function savingMoodBerdua(amt){
  const jt = (amt||0)/1e6; // ke juta
  if(amt<=0)      return {key:'flat', face:SAVE_FACES.flat,  color:'#94A3B8', glow:'rgba(148,163,184,.30)', label:'Yuk mulai sisihkan', cheer:'Tabungan tahunan masih nol — langkah pertama bareng pasangan paling berarti.'};
  if(jt < 25)     return {key:'calm', face:SAVE_FACES.calm,  color:'#E0A33E', glow:'rgba(224,163,62,.32)',  label:'Awal yang baik', cheer:'Kalian sudah mulai menabung. Konsisten sedikit demi sedikit, ya!'};
  if(jt < 75)     return {key:'happy',face:SAVE_FACES.happy, color:'#D9772B', glow:'rgba(217,119,43,.34)',  label:'Tabungan tumbuh', cheer:'Mantap! Tabungan tahunan kalian terus naik — pertahankan ritmenya.'};
  if(jt < 150)    return {key:'love', face:SAVE_FACES.love,  color:'#C2410C', glow:'rgba(194,65,12,.38)',   label:'Kompak menabung', cheer:'Kalian solid! Konsistensi berdua bikin mimpi finansial makin dekat.'};
  return                 {key:'star', face:SAVE_FACES.star,  color:'#9A3412', glow:'rgba(154,52,12,.42)',   label:'Juara menabung', cheer:'Luar biasa! Tabungan tahunan kalian masuk level juara — pertahankan!'};
}
// Penanda mood menabung romantis untuk kartu "Proyeksi Tabungan Setahun" di beranda (Berdua).
// Dipindah dari Atur Proyeksi Tahunan; wajah emoji lucu & romantis (lihat SAVE_FACES).
function savingMoodCardHTML(){
  if(currentMode!=='b') return '';
  const p=annualProj();
  const mood=savingMoodBerdua(p.grossSaving);
  const tiers=[0,25e6,75e6,150e6]; const sv=Math.max(0,p.grossSaving);
  let lo=0,hi=tiers[1];
  for(let k=0;k<tiers.length;k++){ if(sv>=tiers[k]){ lo=tiers[k]; hi=tiers[k+1]||tiers[k]; } }
  const isMax=mood.key==='star';
  const segPc=isMax?100:Math.min(100,Math.round((sv-lo)/((hi-lo)||1)*100));
  const toNext=isMax?0:Math.max(0,hi-sv);
  return `<div class="mood-marker" style="--mc:${mood.color};--mg:${mood.glow}">
    <div class="mood-top">
      <div class="mood-face" style="color:${mood.color};box-shadow:0 0 0 6px ${mood.glow}">${mood.face}</div>
      <div class="mood-meta">
        <div class="mood-lbl" style="color:${mood.color}">${I.heart2}<span>${mood.label}</span></div>
        <div class="mood-val">${'Rp '+jtfmt(p.grossSaving)} <span>/ tahun bersama</span></div>
      </div>
    </div>
    <div class="mood-track"><div class="mood-fill" style="width:${segPc}%;background:${mood.color}"></div></div>
    <div class="mood-foot">${ isMax
      ? `${I.spark} ${mood.cheer}`
      : `${mood.cheer} <b style="color:${mood.color}">+Rp ${jtfmt(toNext)} lagi</b> untuk naik level berikutnya.` }</div>
  </div>`;
}

// Baris proyeksi per-tahun (1–5) untuk detail aset.
function assetProjRows(base, rate, accent){
  const r=(rate||0)/100;
  if(!base){ return `<div class="re-note" style="margin:0">${I.info} Isi nilai aset untuk melihat proyeksi.</div>`; }
  if(!rate){ return `<div class="re-note" style="margin:0">${I.info} Isi bunga %/tahun untuk melihat proyeksi kenaikan. Tanpa bunga, nilai dianggap tetap.</div>`; }
  let html='';
  for(let y=1;y<=5;y++){
    const fut=Math.round(base*Math.pow(1+r,y));
    const gain=fut-base;
    html+=`<div class="re-row"><span>Tahun ${y}</span><b style="color:${accent}">${rpjt(fut)} <small style="color:#16A34A;font-weight:700">(+${jtfmt(gain)})</small></b></div>`;
  }
  return html;
}

function scrBudget(){

    const totSpent=rows.reduce((a,b)=>a+(spentOf(b)||0),0);

        </div>
      </div>`;

    `<div class="sub-scroll">
      <div class="sec-card">
        <div class="stat-grid">
          <div class="stat-box"><div class="sv neg">${jt(totSpent)}</div><div class="sl">Total terpakai</div></div>
          <div class="stat-box"><div class="sv">${jt(totCap)}</div><div class="sl">Total pagu</div></div>
        </div>
        <div class="ratio-track" style="height:10px;margin-top:14px"><div style="width:${totCap>0?Math.min(100,totSpent/totCap*100):0}%;height:100%;background:${accent};border-radius:999px"></div></div>
      </div>
      ${over.length?`<div class="alert-card">${I.bell}<div><div class="alert-t">${over.length} kategori melebihi pagu</div><div class="alert-s">${over.map(o=>o.nm).join(' · ')} — kalian akan diberi notifikasi otomatis.</div></div></div>`:''}
      <div class="sec-head" style="padding:0 4px 4px"><div class="seclabel" style="margin:0">Pagu per Kategori</div><button class="add-btn" data-hh-add style="background:${accent}"><span class="add-btn-ic">${I.plus2}</span>Tambah</button></div>
      ${rows.length===0?`<div class="sec-card" style="text-align:center;padding:28px 18px;color:var(--muted)">
        <div style="font-size:30px;line-height:1;margin-bottom:8px">🏠</div>

        <div style="font-size:13px;line-height:1.5">Tekan <b>+ Tambah</b> untuk menetapkan pagu bulanan per kategori bersama, lalu tentukan penanggung jawabnya (kamu, pasangan, atau tidak ada).</div>
      </div>`:''}
      ${rows.map((b,bi)=>{

            <button class="fund-del" data-hh-del="${bi}" aria-label="Hapus">${I.trash}</button>
          </div>
          <div class="ratio-track" style="height:8px;margin-top:10px"><div style="width:${pc}%;height:100%;background:${barc};border-radius:999px"></div></div>

          </div>
        </div>`;
      }).join('')}
      <div class="src-excel">${I.gear} Atur pagu, penanggung jawab & ambang notifikasi kapan saja</div>

    </div>`:''}
    ${budgets.map((b,bi)=>{
      const spent=sendiriBudgetSpent(b);
      const pc=b.cap>0?Math.min(100,Math.round(spent/b.cap*100)):0;
      const ratio=b.cap>0?spent/b.cap:0;
      const state= ratio>1?'over': ratio>=0.85?'warn':'ok';

/* ===== Progress analisa e-statement yang persisten =====
   Saat user mengunggah PDF lalu menekan back / pindah halaman, proses analisa

let aiParseJob = {

// Sinkronkan tampilan FAB floating progress dengan status job.
function updateFpFab(){
  const fab=document.getElementById('fpFab');
  if(!fab) return;
  // Tampilkan FAB hanya bila ada job (berjalan / selesai) DAN layar yang
  // sedang aktif BUKAN layar import itu sendiri (parsing/review).
  const onImportScreen = (()=>{
    if(screenStack.length===0) return false;
    const top=screenStack[screenStack.length-1]||'';
    return top.indexOf('id="importScroll"')>=0; // penanda khas layar import
  })();
  const show = (aiParseJob.active || aiParseJob.done) && !onImportScreen;
  fab.classList.toggle('show', show);
  if(show){
    const ic=fab.querySelector('.fp-ic');
    const t=fab.querySelector('.fp-t');
    const s=fab.querySelector('.fp-s');
    if(aiParseJob.done){
      if(ic) ic.innerHTML='<span class="fp-check">'+I.check+'</span>';
      if(t) t.textContent='Analisa selesai';
      if(s) s.textContent='Ketuk untuk tinjau '+aiParsePreview.length+' transaksi';
    } else {
      if(ic) ic.innerHTML='<span class="fp-spin"></span>';
      if(t) t.textContent='Menganalisa…';
      if(s) s.textContent='Ketuk untuk lihat progress';
    }
  }
}
// Pasang handler klik FAB sekali per render .screen.
function bindFpFab(){
  const fab=document.getElementById('fpFab');
  if(!fab || fab._bound) { updateFpFab(); return; }
  fab._bound=true;
  fab.addEventListener('click',()=>{ openParseScreen(); });
  updateFpFab();
}

// Urutkan daftar tanggal "DD Mon" memakai urutan bulan demo (months). Kembalikan array unik terurut.
function aiSortedDates(){
  const monIdx=m=>{ const i=months.findIndex(x=>x.toLowerCase()===String(m||'').toLowerCase()); return i<0?99:i; };
  const seen=[]; aiParsePreview.forEach(t=>{ const d=(t.date||'').trim(); if(d && !seen.includes(d)) seen.push(d); });
  return seen.sort((a,b)=>{
    const pa=a.split(/\s+/), pb=b.split(/\s+/);
    const ma=monIdx(pa[1]), mb=monIdx(pb[1]); if(ma!==mb) return ma-mb;
    return (parseInt(pa[0],10)||0)-(parseInt(pb[0],10)||0);
  });
}
// Apakah tanggal baris (string) berada dalam periode [from..to] (inklusif). Batas null = terbuka.
function aiDateInRange(dstr){
  if(aiDateFrom==null && aiDateTo==null) return true;
  const ord=aiSortedDates(); const idx=ord.indexOf((dstr||'').trim());
  if(idx<0) return false; // baris tanpa tanggal valid disembunyikan saat periode aktif
  if(aiDateFrom!=null && idx<aiDateFrom) return false;
  if(aiDateTo!=null && idx>aiDateTo) return false;
  return true;
}

// Kategori valid (dari taksonomi) untuk normalisasi hasil AI.
function validCats(){ return Object.keys(taxonomy); }
function normalizeCat(c){
  const cats=validCats();
  if(cats.includes(c)) return c;
  const low=String(c==null?'':c).toLowerCase();
  const hit=cats.find(x=>x.toLowerCase()===low);
  if(hit) return hit;
  if(CAT_MIGRATE[c]) return CAT_MIGRATE[c];
  return 'Other Expense';
}
function normalizeSub(cat,s){
  const subs=taxonomy[cat]||['Others'];
  if(subs.includes(s)) return s;
  const low=String(s==null?'':s).toLowerCase();
  const hit=subs.find(x=>x.toLowerCase()===low);
  return hit|| subs[subs.length-1] || 'Others';
}

function dateSortKey(date){

// ---- Ekstraksi teks PDF sederhana (tanpa library): ambil string di antara tanda kurung
//      pada operator Tj/TJ. Cukup untuk e-statement berbasis teks. ----
// ---- Pemuat skrip eksternal sekali-pakai (lazy). Hanya diunduh dari CDN
//      SAAT dibutuhkan (parsing PDF), sehingga alur normal aplikasi tetap
//      mandiri/offline. Bila CDN gagal, kita jatuh balik ke parser regex.
const _cdnCache={};
function loadScriptOnce(src){
  if(_cdnCache[src]) return _cdnCache[src];
  _cdnCache[src]=new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src=src; s.async=true;
    s.onload=()=>res(true);
    s.onerror=()=>{ delete _cdnCache[src]; rej(new Error('cdn-failed:'+src)); };
    document.head.appendChild(s);
  });
  return _cdnCache[src];
}

const PDFJS_SRC='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
const PDFJS_WORKER='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
const TESS_SRC='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';

// Ekstraksi teks via pdf.js (akurat, menangani PDF terkompresi). Mengembalikan
// {text, pages, hasTextLayer}. Lempar error bila pdf.js tak bisa dimuat.
async function extractViaPdfjs(file){
  await loadScriptOnce(PDFJS_SRC);
  const pdfjs=window.pdfjsLib;
  if(!pdfjs) throw new Error('pdfjs-missing');
  try{ pdfjs.GlobalWorkerOptions.workerSrc=PDFJS_WORKER; }catch(e){}
  const buf=await file.arrayBuffer();
  const doc=await pdfjs.getDocument({data:buf}).promise;
  let all=[]; let charCount=0;
  const n=doc.numPages;
  for(let p=1;p<=n;p++){
    const page=await doc.getPage(p);
    const tc=await page.getTextContent();
    const line=tc.items.map(it=>it.str).join(' ');
    charCount+=line.length;
    all.push(line);
  }
  return { text:all.join('\n'), pages:n, charCount, doc };
}

// OCR halaman PDF (untuk e-statement hasil scan/foto yang tak punya text layer).
// Merender tiap halaman ke canvas lalu menjalankan Tesseract (ind+eng).
async function ocrPdfDoc(doc, maxPages){
  await loadScriptOnce(TESS_SRC);
  if(!window.Tesseract) throw new Error('tesseract-missing');
  const lim=Math.min(doc.numPages, maxPages||6); // batasi agar tak terlalu lama
  let out=[];
  for(let p=1;p<=lim;p++){
    const page=await doc.getPage(p);
    const vp=page.getViewport({scale:2});
    const canvas=document.createElement('canvas');
    canvas.width=vp.width; canvas.height=vp.height;
    const ctx=canvas.getContext('2d');
    await page.render({canvasContext:ctx,viewport:vp}).promise;
    const dataUrl=canvas.toDataURL('image/png');
    const r=await window.Tesseract.recognize(dataUrl,'ind+eng');
    out.push((r&&r.data&&r.data.text)||'');
  }
  return out.join('\n');
}

// Parser regex lama (cadangan terakhir): tarik teks di dalam ( ... ) dari byte PDF.
function extractPdfTextRegex(buf){
  try{
    let bin=''; const bytes=new Uint8Array(buf);
    for(let i=0;i<bytes.length;i++) bin+=String.fromCharCode(bytes[i]);
    const out=[]; const re=/\(((?:\\.|[^()\\])*)\)/g; let m;
    while((m=re.exec(bin))!==null){
      let s=m[1].replace(/\\([()\\nrt])/g,(x,c)=>({'n':'\n','r':'\r','t':'\t'}[c]||c));
      if(/[A-Za-z0-9]/.test(s)) out.push(s);
    }
    return out.join(' ');
  }catch(e){ return ''; }
}

// Orkestrator ekstraksi teks PDF (Opsi C):
//   1) pdf.js (text layer) — paling akurat untuk PDF digital.
//   2) Bila teks terlalu sedikit (kemungkinan PDF hasil scan) → OCR Tesseract.
//   3) Bila pdf.js gagal dimuat → parser regex byte lama.
async function extractPdfText(file){
  let buf=null;
  try{ buf=await file.arrayBuffer(); }catch(e){ buf=null; }
  try{
    const r=await extractViaPdfjs(file);
    const txt=(r.text||'').trim();
    // Heuristik: <40 karakter "berarti" per halaman → kemungkinan PDF scan.
    const perPage=txt.replace(/\s+/g,'').length/Math.max(1,r.pages);
    if(perPage>=40 || !window.Tesseract && txt.length>120){
      return txt;
    }
    // Coba OCR sebagai pelengkap bila teks tipis.
    try{
      const ocr=await ocrPdfDoc(r.doc);
      const merged=[txt, (ocr||'').trim()].filter(Boolean).join('\n');
      if(merged.replace(/\s+/g,'').length>txt.replace(/\s+/g,'').length) return merged;
    }catch(e){ /* OCR gagal → pakai teks pdf.js apa adanya */ }
    return txt;
  }catch(e){
    // pdf.js tak tersedia (CDN diblok/offline) → cadangan regex byte.
    return buf ? extractPdfTextRegex(buf) : '';
  }
}

// (3) classifyTxn(text, pocket, dir): kembalikan {cat, sub, conf, dir}.
//     conf = probabilitas kecocokan yang DIPELAJARI, disesuaikan sinyal:
//       + arah pasti & kantong sepakat → naik; - kantong/merchant bertentangan → turun.
function classifyTxn(text, pocket, dir){
  const hay=String(text==null?'':text);
  // --- (a) sinyal struktural: paling menentukan ---
  for(const [re,fdir,c,s,w] of TXN_STRUCT){
    if(re.test(hay)) return { cat:c, sub:s, conf:w, dir:(fdir||dir||'out') };
  }
  // --- (b) kata kunci merchant terpelajar ---
  let kw=null, kwMatches=0;
  for(const row of KW_CAT){ if(row[0].test(hay)){ kwMatches++; if(!kw) kw=row; } }
  // --- (c) petunjuk nama kantong ---
  const pc = pocket ? pocketToCat(pocket) : null;
  let cat, sub, conf, outDir=dir;
  if(kw){
    cat=kw[1]; sub=kw[2]; conf=kw[3];
    // arah searah dgn kategori pemasukan/pengeluaran?
    if(TAXO_BY_DIR.in[cat]) outDir='in'; else if(TAXO_BY_DIR.transfer[cat]) outDir='transfer'; else outDir='out';
    // kantong SEPAKAT dgn merchant → kepastian naik; BERTENTANGAN → turun (minta ditinjau)
    if(pc){
      if(pc[0]===cat) conf=Math.min(1,conf+0.03);
      else if(pc[0]!=='Other Expense') conf-=0.12;
    }
    if(kwMatches>2) conf-=0.05;                    // banyak kategori bersaing → sedikit ragu
  } else if(pc && pc[0]!=='Other Expense'){
    // Tak ada kata kunci: pakai kategori dari nama kantong (petunjuk lumayan, bukan pasti)
    cat=pc[0]; sub=pc[1]; conf=0.6;
  } else {
    // Tak ada sinyal apa pun → keyakinan rendah, minta ditinjau
    cat = dir==='in'?'Other Income':(dir==='transfer'?'Other Transfer':'Other Expense');
    sub='Others'; conf=0.3;
  }
  conf=Math.max(0.25,Math.min(1,Math.round(conf*100)/100));
  return { cat, sub, conf, dir:outDir };
}

function localParse(text){
  const res=[]; if(!text) return res;
  if(typeof text!=='string') text=String(text);
  const tokens=text.split(/\s{2,}|\n|;/).map(s=>s.trim()).filter(Boolean);
  let i=0;
  tokens.forEach(line=>{
    const am=line.match(/(?:rp\.?\s*)?(\d{1,3}(?:[.,]\d{3})+|\d{4,})(?:[.,]\d{2})?/i);
    if(!am) return;
    const amt=parseInt(am[1].replace(/[.,]/g,''),10); if(!amt||amt<1000) return;
    const dirHit=/(masuk|kredit|credit|gaji|salary|cr\b|\+)/i.test(line);
    let dir=dirHit?'in':'out';
    const dm=line.match(/(\d{1,2})[\/\-\s](jan|feb|mar|apr|mei|may|jun|jul|agu|aug|sep|okt|oct|nov|des|dec)/i);
    const date=dm?`${dm[1].padStart(2,'0')} ${dm[2].slice(0,3).replace(/may/i,'Mei').replace(/aug/i,'Agu').replace(/oct/i,'Okt').replace(/dec/i,'Des')}`:'—';
    const tm=line.match(/\b([01]?\d|2[0-3]):([0-5]\d)\b/);
    const time=tm?`${tm[1].padStart(2,'0')}:${tm[2]}`:'';
    // ---- KLASIFIKASI + CONFIDENCE dari classifyTxn (berbasis data) ----
    const cl=classifyTxn(line, '', dir);
    dir=cl.dir||dir;
    res.push({sender:(line.replace(am[0],'').replace(/[^A-Za-z0-9 &.\-]/g,' ').replace(/\s+/g,' ').trim().slice(0,40))||'Transaksi '+(++i), note:'', amt, date, time, dir, cat:cl.cat, sub:cl.sub, conf:cl.conf, save:/(tabung|saving|invest|bibit|reksa)/i.test(line)});
  });
  return res;
}

function isJagoSampleFile(file,text){
  // Shortcut demo HANYA untuk berkas contoh yang namanya eksplisit "sample/dummy/demo".
  // PDF Bank Jago ASLI milik pengguna TIDAK boleh ke-trigger di sini — biar
  // diteruskan ke AI (OpenAI) untuk diurai sungguhan.
  const nm=((file&&file.name)||'').toLowerCase();
  if(/jago/.test(nm) && /(sample|dummy|demo|contoh)/.test(nm)) return true;
  return false;
}
// Deteksi nama bank dari nama berkas / isi e-statement → dipakai sebagai label
// sumber di Catatan Arus Kas (mis. "Jago"), bukan label generik "Impor".
function detectBankName(file,text){
  const hay=(((file&&file.name)||'')+' '+(text||'')).toLowerCase();
  const banks=[
    [/bank\s*jago|jago/,'Jago'],[/\bbca\b|bank central asia/,'BCA'],
    [/mandiri/,'Mandiri'],[/\bbni\b/,'BNI'],[/\bbri\b/,'BRI'],
    [/jenius|btpn/,'Jenius'],[/seabank/,'SeaBank'],[/\bgopay\b/,'GoPay'],
    [/\bovo\b/,'OVO'],[/\bdana\b/,'DANA'],[/shopeepay/,'ShopeePay'],
    [/bibit/,'Bibit'],[/blu\b|bca digital/,'blu'],[/permata/,'Permata'],
    [/\bcimb\b|niaga/,'CIMB Niaga'],[/danamon/,'Danamon'],[/\bocbc\b/,'OCBC'],
    [/line\s*bank/,'LINE Bank'],[/superbank/,'Superbank']
  ];
  for(const [re,nm] of banks){ if(re.test(hay)) return nm; }
  return 'e-Statement';
}
function jagoSampleParse(){
  return JAGO_SAMPLE_TXNS.map(t=>{
    let dir=(t.dir==='in'?'in':'out');
    let pc=pocketToCat(t.pocket);
    const hay=[t.sender,t.note,t.pocket].filter(Boolean).join(' ');
    const tdet=detectTransfer(hay);
    if(t.dir==='transfer'){ dir='transfer'; if(tdet) pc=tdet; else if(!taxFor('transfer')[pc[0]]) pc=['Antar Kantong','Internal']; }
    else if(tdet){ dir='transfer'; pc=tdet; }
    return {sender:t.sender||'Transaksi', note:t.note||'', amt:Math.abs(+t.amt||0),
            date:t.date||'—', time:t.time||'', dir:dir,
            pocket:t.pocket||'', cat:pc[0], sub:pc[1], conf:0.99};
  }).filter(t=>t.amt>0).sort((a,b)=>dateSortKey(a.date)-dateSortKey(b.date));
}

// ---- Pengurai TERSTRUKTUR untuk e-statement Bank Jago (format per-kantong).
//      Membaca aliran teks PDF apa adanya: deteksi header KANTONG, lalu setiap
//      blok transaksi berbentuk baris-baris:
//        Tanggal · Waktu · Sumber/Tujuan(1-2 baris) · "Pembayaran QRIS/Transfer/…"
//        · ID#… · Catatan(opsional) · JUMLAH(tak bertanda; minus utk keluar) · SALDO
//      Aturan kunci: DUA angka terakhir di blok = [Jumlah, Saldo-setelah-transaksi].
//      Jumlah bertanda minus = keluar; tanpa minus = masuk. Kategori dari NAMA KANTONG.
//      Menghasilkan 8 kolom granular (source/detail/balance/dateFull/timeFull) agar
//      seragam dengan jalur AI — dipakai sebagai cadangan akurat saat AI tak tersedia. ----
const JAGO_POCKETS=['Kantong Utama','GoPay','OVO','Shopping','Self Care','Food','Holiday Fund','Transport','Utilities','Subscription','Groceries','Annual Fund'];
const JAGO_TXKW=/(Pembayaran QRIS|Transaksi POS|Transfer Keluar|Transfer Masuk|Tambah Uang Kantong|Pindah uang antar Kantong|Tarik Uang Kantong|Setor Uang Kantong|Isi Saldo E-Wallet|Pajak Bunga|Bunga)/i;
// Deteksi transaksi jenis TRANSFER (perpindahan dana, bukan income/expense riil).
// Mengembalikan [cat,sub] bila cocok, atau null bila bukan transfer.
function detectTransfer(text){
  const s=text||'';
  if(/Tambah Uang Kantong|Pindah uang antar Kantong/i.test(s)) return ['Antar Kantong','Internal'];
  if(/Isi Saldo E-?Wallet|Top-?up/i.test(s)){
    let sub='Others';
    if(/GoPay/i.test(s)) sub='GoPay'; else if(/OVO/i.test(s)) sub='OVO';
    else if(/DANA/i.test(s)) sub='DANA'; else if(/ShopeePay/i.test(s)) sub='ShopeePay';
    return ['Top-up E-Wallet',sub];
  }
  if(/Setor Uang Kantong/i.test(s)) return ['Setor Tabungan','Setoran'];
  if(/Tarik Uang Kantong/i.test(s)) return ['Tarik Tabungan','Tarik'];
  return null;
}
// Normalisasi aliran teks e-statement agar SERAGAM baik dari PyMuPDF (satu token
// per baris) MAUPUN pdf.js (semua item satu halaman digabung 1 baris dgn spasi).
// Kita SISIPKAN newline di batas struktural: sebelum tanggal, waktu, nama kantong,
// kata kunci jenis transaksi, "ID#", dan di sekitar setiap angka (Jumlah/Saldo).
// Tanpa ini, layout inline pdf.js membuat reDate (butuh tanggal sendirian di baris)
// TIDAK PERNAH cocok → 0 transaksi → aplikasi salah fallback ke localParse.
function normalizeJagoStream(text){
  let t=String(text||'').replace(/\r/g,'\n');
  const MON='Jan|Feb|Mar|Apr|Mei|Jun|Jul|Agu|Sep|Okt|Nov|Des';
  // 0) BUANG tanggal buka rekening ("Akun Aktif, mulai 25 Mar 2025") — ini BUKAN
  //    transaksi. Bila dibiarkan, tanggalnya lolos reDate & memicu baris palsu
  //    (blok berikutnya = angka ringkasan Saldo Sebelumnya/Pemasukan). Hapus
  //    seluruh frasa termasuk tanggalnya sebelum langkah split di bawah.
  t=t.replace(new RegExp('Akun Aktif,\\s*mulai\\s+\\d{1,2}\\s+(?:'+MON+')\\s+20\\d{2}','gi'),' ');
  // 1) newline SEBELUM setiap "DD Mon 20YY"
  t=t.replace(new RegExp('\\s*(?=\\b\\d{1,2}\\s+(?:'+MON+')\\s+20\\d{2}\\b)','gi'),'\n');
  // 2) newline SETELAH tanggal (pisahkan dari waktu/teks berikutnya)
  t=t.replace(new RegExp('(\\b\\d{1,2}\\s+(?:'+MON+')\\s+20\\d{2}\\b)\\s*','gi'),'$1\n');
  // 3) newline di sekitar waktu "HH.MM" / "HH:MM(:SS)"
  t=t.replace(/\s*\b([01]?\d|2[0-3])[.:]([0-5]\d)(?:[.:]([0-5]\d))?\b\s*/g,'\n$1.$2$3\n');
  // 4) newline SEBELUM kata kunci jenis transaksi
  t=t.replace(/\s*(?=(Pembayaran QRIS|Transaksi POS|Transfer Keluar|Transfer Masuk|Tambah Uang Kantong|Pindah uang antar Kantong|Tarik Uang Kantong|Setor Uang Kantong|Isi Saldo E-Wallet|Pajak Bunga|Bunga)\b)/gi,'\n');
  // 5) newline SEBELUM "ID#" dan SESUDAH kode ID (agar Catatan berdiri sendiri)
  t=t.replace(/\s*(ID#\s*[0-9A-Za-z-]+)\s*/g,'\n$1\n');
  // 6) newline di sekitar ANGKA rupiah (Jumlah bertanda & Saldo)
  t=t.replace(/\s*(-?\d{1,3}(?:\.\d{3})+(?:,\d+)?)\s*/g,'\n$1\n');
  // 7) newline sebelum header nama kantong bila menempel dgn "ID Kantong"
  t=t.replace(/\s*(?=ID Kantong\b)/g,'\n');
  return t.replace(/\n{2,}/g,'\n');
}
function parseJagoText(text){
  if(!text || !/Bank Jago|KANTONG|Kantong Utama|Laporan Keuangan/i.test(text)) return [];
  text=normalizeJagoStream(text);
  const lines=text.replace(/\r/g,'\n').split('\n').map(s=>s.trim()).filter(Boolean);
  const reDate=/^(\d{1,2})\s+(Jan|Feb|Mar|Apr|Mei|Jun|Jul|Agu|Sep|Okt|Nov|Des)\s+20\d{2}$/i;
  const reTime=/^([01]?\d|2[0-3])[.:]([0-5]\d)(?:[.:]([0-5]\d))?$/;
  // angka format Indonesia: "-900.000", "9.125", "42.230.074,50", "+386" (bunga kecil)
  const reNum=/^[+-]?\d{1,3}(\.\d{3})*(,\d+)?$|^[+-]?\d+(,\d+)?$/;
  // baris non-transaksi (header tabel / ringkasan / footer) yang harus dilewati
  const NOISE=/^(Jago|DUMMY|Laporan Keuangan|www\.|LPS|Dokumen dummy|Mata Uang|Saldo Sebelumnya|Total Pemasukan|Total Pengeluaran|Saldo Akhir|Tanggal & Waktu|Sumber\/Tujuan|Rincian Transaksi|Catatan|Jumlah|Saldo|Akun Aktif|ID Kantong|RINGKASAN|SOROTAN|KANTONG|Total Saldo|Halaman|PT Bank Jago|IDR|This recreated)/i;
  const toNum=(s)=>parseFloat(String(s).replace(/\./g,'').replace(',','.'))||0;
  let pocket='Kantong Utama';
  const res=[];
  for(let i=0;i<lines.length;i++){
    // header kantong: baris yang PERSIS nama kantong, biasanya diikuti "ID Kantong"
    const pk=JAGO_POCKETS.find(p=>p.toLowerCase()===lines[i].toLowerCase());
    if(pk && (i+1>=lines.length || /^ID Kantong/i.test(lines[i+1]) || lines[i+1]==='')){ pocket=pk; continue; }
    if(!reDate.test(lines[i])) continue;
    const dm=lines[i].match(reDate);
    const monRaw=dm[2]; const mon=monRaw.charAt(0).toUpperCase()+monRaw.slice(1,3).toLowerCase();
    const dateFull=`${dm[1].padStart(2,'0')} ${mon} ${lines[i].match(/20\d{2}/)[0]}`;
    const date=`${dm[1].padStart(2,'0')} ${mon}`;
    let j=i+1, timeFull='';
    if(j<lines.length && reTime.test(lines[j])){
      const tm=lines[j].match(reTime);
      timeFull=`${tm[1].padStart(2,'0')}.${tm[2]}`+(tm[3]?`.${tm[3]}`:''); j++;
    }
    // kumpulkan blok sampai transaksi berikutnya / header kantong / akhir
    const block=[];
    while(j<lines.length && !reDate.test(lines[j])
          && !(JAGO_POCKETS.some(p=>p.toLowerCase()===lines[j].toLowerCase()) && /^ID Kantong/i.test(lines[j+1]||''))){
      block.push(lines[j]); j++;
    }
    // DUA angka terakhir di blok = Jumlah lalu Saldo-setelah
    const numIdx=block.map((b,k)=>reNum.test(b)?k:-1).filter(k=>k>=0);
    if(numIdx.length<2){ i=j-1; continue; }
    const jk=numIdx[numIdx.length-2], sk=numIdx[numIdx.length-1];
    const jumlah=toNum(block[jk]);
    const balance=Math.round(toNum(block[sk]));     // saldo setelah transaksi -> kolom Catatan
    const dir=jumlah<0?'out':'in';
    const amt=Math.abs(Math.round(jumlah));
    if(!amt){ i=j-1; continue; }
    // GUARD baris palsu: transaksi Jago SELALU punya waktu (HH.MM) tepat setelah
    // tanggal, atau kata kunci jenis transaksi (Transfer/QRIS/Bunga/…) di bloknya.
    // Baris ringkasan (Saldo akhir 30 Jun 2026 …, Total Saldo … 31 May 2026) tak
    // punya waktu & tak punya kata kunci → lewati agar tak jadi transaksi hantu.
    const hasTxKw=block.some(b=>JAGO_TXKW.test(b));
    if(!timeFull && !hasTxKw){ i=j-1; continue; }
    // bagian teks sebelum angka: source (sebelum kata kunci jenis) + detail (sesudahnya)
    const mid=block.slice(0,jk).filter(b=>!NOISE.test(b));
    const joined=mid.join(' ').replace(/\s+/g,' ').trim();
    const mkw=joined.match(JAGO_TXKW);
    let source='', detail=joined;
    if(mkw){ source=joined.slice(0,mkw.index).trim(); detail=joined.slice(mkw.index).trim(); }
    else { source=mid[0]||''; }
    const pc=pocketToCat(pocket);
    // ---- KLASIFIKASI BERBASIS DATA: gabungkan merchant/detail + nama kantong ----
    // classifyTxn menilai sinyal struktural (Antar Kantong/Bunga/Pajak/Gaji/Refund),
    // kata kunci merchant terpelajar, & petunjuk kantong. CONFIDENCE = probabilitas
    // KECOCOKAN kategori+sub yang dipelajari dari buku kas, bukan kelengkapan data.
    const hay=[source,detail,pocket].filter(Boolean).join(' ');
    const cl=classifyTxn(hay, pocket, dir);
    // Arah dari e-statement (tanda +/-) tetap otoritatif untuk uang keluar/masuk,
    // kecuali classifyTxn mendeteksi transfer struktural (perpindahan antar kantong).
    let cat=cl.cat, sub=cl.sub, conf=cl.conf, finalDir=dir;
    if(cl.dir==='transfer'){ finalDir='transfer'; }
    else {
      // Bila kantong jelas menunjuk kategori & merchant tak informatif, dan
      // classifyTxn jatuh ke "Other", pakai kategori kantong (petunjuk lumayan).
      if((cat==='Other Expense'||cat==='Other Income') && pc[0]!=='Other Expense'){ cat=pc[0]; sub=pc[1]; conf=Math.max(conf,0.6); }
    }
    if(!source && !detail) conf-=0.10;            // blok minim teks → sedikit turun
    conf=Math.max(0.25,Math.min(1,Math.round(conf*100)/100));
    res.push({
      sender:source||detail||'Transaksi', source, detail,
      note:'', amt, balance,
      date, dateFull, time:timeFull, timeFull,
      dir:finalDir, pocket, cat, sub, conf
    });
    i=j-1;
  }
  return res.sort((a,b)=>dateSortKey(a.date)-dateSortKey(b.date));
}
// ---- REKONSILIASI hasil AI dengan baseline TERSTRUKTUR (parseJagoText) ----
//   Masalah: AI (gpt-4o-mini) sering MEMOTONG daftar transaksi yang panjang karena
//   batas token keluaran → hanya sebagian transaksi yang kembali. Parser terstruktur
//   `parseJagoText` bersifat deterministik & menangkap SEMUA baris. Fungsi ini
//   menggabungkan keduanya: pakai kategori/analisis AI di mana transaksi COCOK,
//   lalu KEMBALIKAN transaksi yang AI lewatkan dari baseline terstruktur.
//   Kunci pencocokan: tanggal + waktu + nominal (toleran terhadap variasi format).
//   Mengembalikan {txns, recovered}: recovered = jumlah transaksi yang dipulihkan.
function reconcileWithStructured(aiTxns, baseTxns){
  aiTxns=Array.isArray(aiTxns)?aiTxns:[];
  baseTxns=Array.isArray(baseTxns)?baseTxns:[];
  // Bila tak ada baseline (mis. bukan e-statement Jago), pakai hasil AI apa adanya.
  if(!baseTxns.length) return { txns:aiTxns.slice().sort((a,b)=>dateSortKey(a.date)-dateSortKey(b.date)), recovered:0 };
  // Kunci pencocokan: "dd-mon|HH:MM|amt". Waktu bisa "HH.MM" atau "HH:MM"; normalkan.
  const normT=(t)=>String(t||'').replace(/[.:]/g,':').replace(/^(\d):/,'0$1:').slice(0,5);
  const normD=(d)=>{ const m=String(d||'').match(/(\d{1,2})\s*([A-Za-z]{3})/); return m?(m[1].padStart(2,'0')+' '+m[2].charAt(0).toUpperCase()+m[2].slice(1,3).toLowerCase()):String(d||'').trim(); };
  const keyOf=(t)=>`${normD(t.date)}|${normT(t.timeFull||t.time)}|${Math.abs(Math.round(+t.amt||0))}`;
  // Kunci longgar (tanpa waktu) sebagai cadangan bila waktu berbeda format/hilang.
  const keyLoose=(t)=>`${normD(t.date)}|${Math.abs(Math.round(+t.amt||0))}`;
  const aiExact=new Map();
  aiTxns.forEach(t=>{ const k=keyOf(t); aiExact.set(k,(aiExact.get(k)||0)+1); });
  // Kunci longgar HANYA dari transaksi AI yang tak punya waktu jelas — supaya
  // transaksi AI yang PUNYA waktu tapi beda tak sengaja menekan baris baseline yang
  // sah (mis. dua transaksi tgl+nominal sama di jam berbeda).
  const aiLoose=new Map();
  aiTxns.forEach(t=>{ if(!normT(t.timeFull||t.time)){ const k=keyLoose(t); aiLoose.set(k,(aiLoose.get(k)||0)+1); } });
  const exactSeen=new Map(), baseLooseSeen=new Map();
  let recovered=0;
  const extra=[];
  baseTxns.forEach(b=>{
    const ke=keyOf(b), kl=keyLoose(b);
    exactSeen.set(ke,(exactSeen.get(ke)||0)+1);
    baseLooseSeen.set(kl,(baseLooseSeen.get(kl)||0)+1);
    // AI sudah punya (cocok persis) sebanyak/lebih dari kemunculan baseline sejauh
    // ini → biarkan versi AI (dukung transaksi kembar mis. transfer antar kantong).
    if((aiExact.get(ke)||0)>=exactSeen.get(ke)) return;
    // cocok longgar: HANYA bila AI punya transaksi tgl+nominal sama TANPA waktu
    // sebanyak/lebih dari yang muncul di baseline sejauh ini → anggap tercakup.
    const aiN=aiLoose.get(kl)||0;
    if(aiN>=baseLooseSeen.get(kl)) return;
    // transaksi ini AI LEWATKAN → pulihkan dari baseline terstruktur.
    extra.push(b); recovered++;
  });
  const merged=aiTxns.concat(extra).sort((a,b)=>dateSortKey(a.date)-dateSortKey(b.date));
  return { txns:merged, recovered };
}
// Endpoint backend proxy (serverless). Relatif terhadap origin, jadi otomatis
// benar saat di-deploy ke Vercel ('/api/parse-estatement'). Bisa di-override.
const AI_PROXY_URL = (window.ATUR_AI_PROXY_URL || '/api/parse-estatement');

// Prompt sistem (dipakai HANYA bila jalur BYO-key langsung; jalur proxy memakai
// prompt yang sama di sisi server agar key tetap rahasia).
function aiSystemPrompt(cats){
  return 'Kamu pengurai e-statement bank Indonesia (mis. Bank Jago). E-statement bisa berbentuk per-KANTONG: tiap halaman punya header nama kantong (Kantong Utama, Shopping, Food, Holiday Fund, Transport, Utilities, Subscription, Groceries, Self Care, Annual Fund, dll.) lalu daftar transaksi dengan kolom: Tanggal & Waktu, Sumber/Tujuan, Rincian Transaksi, Catatan, Jumlah(+/-), Saldo. '
    +'Aturan: (1) Ekstrak SEMUA transaksi dari SEMUA kantong, jangan lewatkan satu pun. (2) KATEGORI: ANALISIS SETIAP transaksi dari RINCIAN/merchant-nya, JANGAN samakan semua transaksi satu kantong ke satu kategori. Nama kantong hanya PETUNJUK; bila deskripsi jelas menunjuk kategori lain, ikuti deskripsi (mis. "OPENAI"->Subscription, "Bluebird"/"grab"->Transport, "apotek"->Medical). Baru pakai kategori kantong bila deskripsi tak informatif. (2b) "sub" = sub-kategori spesifik dari deskripsi (mis. Food->"Kopi", Transport->"Taksi online"), kosongkan bila tak bisa disimpulkan. (3) "dir":"in" bila Jumlah bertanda + (uang masuk), "out" bila bertanda - (uang keluar). (4) "sender" = Sumber/Tujuan + Rincian. "note" = isi kolom Catatan (boleh kosong). (5) URUTKAN hasil secara KRONOLOGIS berdasarkan tanggal naik. (6) "conf" = keyakinanmu pada kategori, 0..1, ISI REALISTIS per transaksi (jelas ~0.95+, menebak <=0.6), jangan samakan semua. '
    +'Balas HANYA JSON object {"transactions":[ ... ]}. Tiap item: {"sender":string,"note":string,"amt":number(rupiah, tanpa titik, selalu positif),"date":"DD Mon"(Jan Feb Mar Apr Mei Jun Jul Agu Sep Okt Nov Des),"time":"HH:MM","dir":"in"|"out","pocket":string(nama kantong asal),"cat":salah satu dari ['+cats.join(', ')+'],"sub":string,"conf":0..1}.';
}

// Bentuk akhir setiap item dari AI menjadi struktur transaksi internal.
function shapeAiTxns(arr){
  return arr.map(t=>{
    // KATEGORI: utamakan hasil ANALISIS AI per-transaksi (t.cat/t.sub) — itulah
    // inti gunanya AI. Nama kantong dipakai HANYA sebagai cadangan: bila AI tidak
    // mengisi kategori, atau AI tidak yakin (conf rendah) padahal kantong jelas.
    let cat, sub;
    const aiCat = t.cat ? normalizeCat(t.cat) : '';
    const aiConf = (typeof t.conf==='number') ? t.conf : null;
    const pc = t.pocket ? pocketToCat(t.pocket) : null;
    if(aiCat){
      // AI memberi kategori → pakai itu (analisis per-transaksi).
      cat = aiCat;
      sub = normalizeSub(cat, t.sub);
    } else if(pc){
      // AI tidak isi kategori → turunkan dari nama kantong.
      cat = pc[0]; sub = t.sub?normalizeSub(cat,t.sub):pc[1];
    } else {
      cat = normalizeCat(t.cat); sub = normalizeSub(cat, t.sub);
    }
    // Sumber/Tujuan & Rincian terpisah (Tahap 1 backend). Fallback dari `sender` lama.
    const source=(t.source!=null&&String(t.source).trim())?String(t.source).trim():(t.sender?String(t.sender).split(' — ')[0].trim():'');
    const detail=(t.detail!=null&&String(t.detail).trim())?String(t.detail).trim():(t.sender?String(t.sender):'');
    const balRaw=(t.balance==null||t.balance==='')?null:Math.round(+String(t.balance).replace(/[^\d.\-]/g,'')||0);
    // Jenis: hormati 'transfer' dari AI; selain itu auto-deteksi transfer dari deskripsi.
    let dir = t.dir==='transfer' ? 'transfer' : (t.dir==='in'?'in':'out');
    const tdet=detectTransfer(((source||'')+' '+(detail||'')+' '+(t.sender||'')));
    if(tdet && dir!=='transfer'){ dir='transfer'; cat=tdet[0]; sub=tdet[1]; }
    else if(dir==='transfer' && !taxFor('transfer')[cat]){ const td=tdet||['Other Transfer','Others']; cat=td[0]; sub=td[1]; }
    // Confidence: hormati nilai dari AI. Bila AI tak mengisi, pakai 0.7 (sedang)
    // supaya pengguna sadar perlu dicek — BUKAN 0.9 yang menyesatkan.
    let conf = (aiConf!=null) ? Math.max(0, Math.min(1, aiConf)) : 0.7;
    return {sender:String(t.sender||(source||detail)||'Transaksi'), source, detail, note:String(t.note||''),
      amt:Math.abs(Math.round(+String(t.amt).replace(/[^\d]/g,'')||0)),
      balance:balRaw, date:String(t.date||'—'), dateFull:String(t.dateFull||t.date||''),
      time:String(t.time||''), timeFull:String(t.timeFull||t.time||''),
      dir, pocket:String(t.pocket||''), cat, sub, conf};
  }).filter(t=>t.amt>0).sort((a,b)=>dateSortKey(a.date)-dateSortKey(b.date));
}

// Jalur 1 — Proxy backend (DIUTAMAKAN). Key OpenAI ada di server, tidak ke browser.
// Lempar error khusus 'ai-not-configured' bila server belum di-set, agar bisa
// turun ke jalur BYO-key / lokal.
async function parseViaProxy(text){
  const resp=await fetch(AI_PROXY_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ text:text.slice(0,48000), cats:validCats() })
  });
  if(resp.status===501){ throw new Error('ai-not-configured'); }
  if(!resp.ok){ throw new Error('proxy-'+resp.status); }
  // Bila route /api belum aktif, Vercel bisa mengembalikan HTML (200) alih-alih JSON.
  // Deteksi ini agar diagnostik menampilkan penyebab sebenarnya, bukan error JSON kabur.
  const ct=(resp.headers.get('content-type')||'');
  if(!/json/i.test(ct)){
    const peek=await resp.text().catch(()=>'');
    if(/^\s*</.test(peek)) throw new Error('proxy-html'); // dapat HTML, bukan JSON → route belum ter-deploy
    try{ const d=JSON.parse(peek); const a=Array.isArray(d.transactions)?d.transactions:[]; return shapeAiTxns(a); }
    catch(e){ throw new Error('proxy-badjson'); }
  }
  const data=await resp.json();
  const arr=Array.isArray(data.transactions)?data.transactions:[];
  return shapeAiTxns(arr);
}

// Jalur 2 — BYO-key langsung dari browser ke OpenAI (fallback bila proxy tak ada
// DAN user mengisi kuncinya sendiri di Pengaturan). Tetap didukung untuk dev/lokal.
async function parseViaUserKey(text, apiKey){
  if(!apiKey || !text) throw new Error('no-key-or-text');
  const resp=await fetch('https://api.openai.com/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
    body:JSON.stringify({
      model:'gpt-4o-mini', temperature:0,
      response_format:{type:'json_object'},
      messages:[{role:'system',content:aiSystemPrompt(validCats())},{role:'user',content:text.slice(0,48000)}]
    })
  });
  if(!resp.ok) throw new Error('api-'+resp.status);
  const data=await resp.json();
  let content=(data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content)||'{"transactions":[]}';
  let arr;
  try{ const p=JSON.parse(content); arr=Array.isArray(p)?p:(p.transactions||p.data||p.items||[]); }
  catch(e){ const m=content.match(/\[[\s\S]*\]/); arr=m?JSON.parse(m[0]):[]; }
  return shapeAiTxns(arr);
}

// Terjemahkan error jalur AI menjadi alasan yang bisa dibaca user (diagnostik).
// Ini kunci untuk kasus "request tak pernah sampai OpenAI": kita ungkap penyebabnya
// alih-alih diam-diam jatuh ke parser lokal.
function aiFailReason(e, textLen){
  const m=(e && (e.message||String(e)))||'';
  if(textLen!=null && textLen<20) return 'Teks hasil ekstraksi PDF kosong — AI tak dipanggil. PDF mungkin hasil scan/terproteksi atau pdf.js gagal dimuat.';
  if(m==='no-text') return 'Teks e-statement kosong — AI tak dipanggil.';
  if(m==='ai-empty') return 'Server AI membalas tanpa transaksi (kemungkinan format teks tak dikenali model).';
  if(m==='ai-not-configured') return 'Server AI belum dikonfigurasi (OPENAI_API_KEY belum diset) dan tak ada kunci pribadi.';
  if(m==='proxy-html') return '/api/parse-estatement mengembalikan HTML, bukan JSON — route serverless belum ter-deploy di Vercel.';
  if(m==='proxy-badjson') return 'Balasan /api/parse-estatement bukan JSON yang valid.';
  if(/^proxy-501$/.test(m)) return 'Server AI belum dikonfigurasi (HTTP 501).';
  if(/^proxy-4\d\d$/.test(m)) return 'Permintaan ke server AI ditolak ('+m.replace('proxy-','HTTP ')+'). Cek rate-limit / isi permintaan.';
  if(/^proxy-5\d\d$/.test(m)) return 'Server AI / OpenAI bermasalah ('+m.replace('proxy-','HTTP ')+').';
  if(/^proxy-/.test(m)) return 'Server AI membalas status tak terduga ('+m.replace('proxy-','HTTP ')+').';
  if(/^api-/.test(m)) return 'OpenAI (kunci pribadi) menolak permintaan ('+m.replace('api-','HTTP ')+').';
  if(/Failed to fetch|NetworkError|Load failed/i.test(m)) return 'Tak bisa menjangkau server AI (jaringan/CORS diblokir atau /api tidak ter-deploy).';
  if(/JSON|Unexpected token/i.test(m)) return 'Balasan server AI bukan JSON valid (mungkin /api mengembalikan HTML — route belum aktif).';
  return 'Jalur AI gagal: '+m.slice(0,120);
}

// Orkestrator: coba proxy dulu; bila server belum dikonfigurasi, baru pakai
// kunci milik user (bila ada). Mengembalikan {txns, via}.
async function parseEstatementAI(text){
  if(!text) throw new Error('no-text');
  try{
    const txns=await parseViaProxy(text);
    return { txns, via:'proxy' };
  }catch(e){
    const key=(APP.aiKey||'').trim();
    if((e&&e.message==='ai-not-configured') && key){
      const txns=await parseViaUserKey(text,key);
      return { txns, via:'userkey' };
    }
    throw e; // proxy error lain / tak ada key -> biar caller fallback ke lokal
  }
}

// Tentukan label + gaya indikator jalur parser yang aktif untuk ditampilkan ke user:
//  - "AI (server)"       : proxy backend Vercel dipakai (key di server) → ideal.
//  - "AI (kunci sendiri)": BYO-key user langsung ke OpenAI.
//  - "Pengurai lokal"    : fallback tanpa AI (Jago-struct / heuristik umum).
//  - "Data demo"         : tak ada transaksi terbaca sama sekali → contoh.
function parserPathInfo(){
  const m=aiParseMeta.mode, via=aiParseMeta.via;
  if(m==='ai' && via==='proxy')   return {label:'AI (server)',        cls:'diag-ai',   tone:'ok',   icon:I.spark};
  if(m==='ai' && via==='userkey') return {label:'AI (kunci sendiri)', cls:'diag-ai',   tone:'ok',   icon:I.spark};
  if(m==='ai' && via==='sample')  return {label:'Data contoh (sample)',cls:'diag-demo', tone:'info', icon:I.spark};

const MONTH_BASE={in:0,out:0}; // default 0 — terisi dari e-statement / input manual user
// Bulan "berjalan" = bulan TERBARU yang punya transaksi (dipakai untuk label/segment).
function curMonthKey(){
  let maxKey=0;
  activeTxns().forEach(t=>{ const k=normDate(t.date).key; if(k>maxKey) maxKey=k; });
  if(maxKey>0){ const y=Math.floor(maxKey/10000); const m=Math.floor((maxKey%10000)/100); return y+'-'+String(m).padStart(2,'0'); }
  return '2026-06';
}
function manualParse(amtStr){ return +(''+amtStr).replace(/[^\d]/g,'')||0; }
// Format ribuan bergaya Indonesia (x.xxx.xxx) untuk teks yang sedang diketik.
function fmtThousand(str){ const d=(''+(str==null?'':str)).replace(/[^\d]/g,''); return d?(+d).toLocaleString('id-ID'):''; }
// Pasang auto-format ribuan (titik) secara live pada sebuah input nominal.
// Input WAJIB type="text" inputmode="numeric" agar titik bisa tampil.
function attachThousandFmt(inp){
  if(!inp || inp.dataset.thFmt==='1') return;
  inp.dataset.thFmt='1';
  inp.addEventListener('input',()=>{
    const start=inp.selectionStart, before=inp.value, dotsBefore=(before.slice(0,start).match(/\./g)||[]).length;
    const formatted=fmtThousand(inp.value);
    inp.value=formatted;
    // jaga posisi kursor agar tidak loncat ke akhir saat titik bertambah
    const dotsAfter=(formatted.slice(0,start).match(/\./g)||[]).length;
    const pos=Math.max(0,Math.min(formatted.length,(start||0)+(dotsAfter-dotsBefore)));
    try{ inp.setSelectionRange(pos,pos); }catch(e){}
  });
}
// Tanggal default untuk form input manual: ikuti tanggal transaksi TERBARU yang
// sudah ada (mis. dari e-statement Mei), agar input manual jatuh di periode data
// yang sama dan tidak otomatis loncat ke bulan berjalan. Fallback: hari ini.
function defaultTxnDate(){
  let maxKey=0;
  activeTxns().forEach(t=>{ const k=normDate(t.date).key; if(k>maxKey) maxKey=k; });
  if(maxKey>0){
    const y=Math.floor(maxKey/10000), m=Math.floor((maxKey%10000)/100), d=maxKey%100;
    return y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');
  }
  return new Date().toISOString().slice(0,10);
}
// ARUS KAS = GABUNGAN SEMUA SUMBER. monthTotals menjumlahkan SEMUA transaksi
// (manual + e-statement, lintas bulan) — bukan hanya satu bulan — sesuai kebutuhan
// "hitung semua transaksi". Bila ingin fokus per-bulan, pakai curMonthTxns().
function monthTotals(){
  let inn=MONTH_BASE.in, out=MONTH_BASE.out, trf=0;
  activeTxns().forEach(t=>{ const v=txnIDR(t); if(t.dir==='in') inn+=v; else if(t.dir==='transfer') trf+=v; else out+=v; });
  return {inn,out,trf};
}
// Total untuk SATU bulan tertentu (dipakai grafik per-bulan agar tiap batang akurat).
// monthIndex 0..5 -> Jan..Jun 2026.
function monthTotalsForIndex(monthIndex){
  const targetKey=2026*100+(monthIndex+1);
  let inn=0, out=0, trf=0;
  activeTxns().forEach(t=>{ const nd=normDate(t.date); if(nd.key&&Math.floor(nd.key/100)===targetKey){ const v=txnIDR(t); if(t.dir==='in') inn+=v; else if(t.dir==='transfer') trf+=v; else out+=v; } });
  return {inn,out,trf};
}

const CAT_TO_DONUT = {
