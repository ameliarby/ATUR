<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="app-version" content="1.12.1">
<meta name="theme-color" content="#EFEFF6">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ATUR">
<meta name="description" content="ATUR — aplikasi pencatatan & pelacakan keuangan pribadi (Sendiri) dan rumah tangga (Berdua).">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>ATUR — Financial Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    /* Sendiri (blue) */
    --s-primary:#2563EB; --s-tint:#EEF3FF; --s-ontint:#1E3A8A; --s-soft:#DCE7FF;
    /* Berdua (terracotta) */
    --b-primary:#C2410C; --b-tint:#FFF3EC; --b-ontint:#9A3412; --b-soft:#FFE2D2;
    --coral:#F97316;
    /* neutrals — softer, cooler */
    --page:#EFEFF6; --card:#FFFFFF; --ink:#1A1A22; --muted:#8A8A99; --faint:#B4B4C0;
    --success:#15924F; --accent:#FFC65C; --ink-pill:#1C1C24;
    /* soft elevation */
    --sh-sm:0 1px 2px rgba(28,28,40,.04),0 4px 12px rgba(28,28,40,.05);
    --sh-md:0 2px 6px rgba(28,28,40,.05),0 10px 28px rgba(28,28,40,.07);
    --sh-pill:0 10px 26px rgba(20,20,30,.30),0 3px 8px rgba(20,20,30,.22);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
  body{
    font-family:'Plus Jakarta Sans','Inter','Helvetica Neue',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
    background:#D9D9E6;
    color:var(--ink);
    padding:40px 24px 60px;
  }
  .page-title{text-align:center;margin-bottom:6px;font-size:26px;font-weight:700;letter-spacing:.04em;color:#3A3645;}
  .page-sub{text-align:center;margin-bottom:36px;font-size:14px;color:#74717f;}
  .stage{display:flex;gap:48px;justify-content:center;align-items:flex-start;flex-wrap:wrap;}
  .device-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;}
  .device-tag{
    font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
    padding:6px 14px;border-radius:999px;
  }
  .tag-s{background:var(--s-soft);color:var(--s-ontint);}
  .tag-b{background:var(--b-soft);color:var(--b-ontint);}

  /* device frame */
  .phone{
    width:390px;height:844px;border-radius:48px;background:#0c0b0a;
    padding:11px;box-shadow:0 30px 70px rgba(0,0,0,.28),0 8px 22px rgba(0,0,0,.18);
    position:relative;
  }
  .screen{
    width:100%;height:100%;border-radius:38px;overflow:hidden;background:var(--page);
    position:relative;display:flex;flex-direction:column;
  }
  /* ambient color glow behind everything — mode-tinted */
  .screen::before{
    content:"";position:absolute;top:-120px;left:-60px;width:360px;height:360px;
    border-radius:50%;filter:blur(70px);opacity:.55;z-index:0;pointer-events:none;
    transition:background-color .5s ease;
  }
  .mode-s.screen::before{background:#C9D8FF;}
  .mode-b.screen::before{background:#FFD8C2;}
  .screen::after{
    content:"";position:absolute;bottom:60px;right:-80px;width:280px;height:280px;
    border-radius:50%;filter:blur(80px);opacity:.4;z-index:0;pointer-events:none;
    background:#E4E0FF;
  }

  /* mode transitions */
  .hero,.hero-num,.fab,.nav-item,.nav-item.active,.ratio-val,.ratio-fill,.goal-prog,.pill-num{
    transition:background-color .35s ease,color .35s ease,box-shadow .35s ease;
  }
  .mode-swap{transition:opacity .22s ease;}
  .mode-swap.fading{opacity:0;}
  .notch{
    position:absolute;top:11px;left:50%;transform:translateX(-50%);
    width:120px;height:30px;background:#0c0b0a;border-radius:0 0 18px 18px;z-index:50;
  }
  /* status bar */
  .statusbar{
    height:48px;display:flex;align-items:flex-end;justify-content:space-between;
    padding:0 28px 6px;font-size:13px;font-weight:600;color:var(--ink);flex:none;
    position:relative;z-index:5;
  }
  .statusbar .icons{display:flex;gap:7px;align-items:center;}
  .statusbar .icons svg{display:block;}
  .sb-clock{font-variant-numeric:tabular-nums;letter-spacing:.02em;}

  .scroll{flex:1;overflow-y:auto;padding:4px 20px 96px;scrollbar-width:none;position:relative;z-index:2;}
  .scroll::after{content:"";display:block;height:24px;}
  .scroll::-webkit-scrollbar{display:none;}

  /* ===== Mobile web-app mode: fill the whole viewport, drop the desktop mockup chrome =====
     On phones the app becomes a real full-bleed web app instead of a 390x844 device mockup. */
  @media (max-width:600px){
    /* Kunci lebar viewport: tak ada geser/scroll horizontal di HP.
       Elemen glow (.screen::before/::after, .subscreen::before) meluber ke
       kiri/kanan; di sini kita pastikan tak ada yang bisa digeser sumbu-X. */
    html,body{padding:0;margin:0;background:var(--page);overflow-x:hidden;width:100%;max-width:100%;}
    .page-title,.page-sub,.device-tag,.notch{display:none;}
    .stage{display:block;gap:0;}
    .device-wrap{gap:0;}
    .phone{
      width:100%;height:100vh;height:100dvh;min-height:100vh;min-height:100dvh;
      border-radius:0;background:var(--page);padding:0;box-shadow:none;
      overflow:hidden;max-width:100%;
    }
    .screen{
      border-radius:0;width:100%;height:100vh;height:100dvh;overflow:hidden;
    }
    /* respect real notch / home-bar safe areas */
    .statusbar{padding-top:env(safe-area-inset-top);height:auto;min-height:48px;}
    .scroll{padding-bottom:calc(96px + env(safe-area-inset-bottom));}
    /* Cegah konten anak lebih lebar dari layar memicu geser horizontal. */
    .scroll,.sub-scroll{overflow-x:hidden;}
    .subscreen{overflow:hidden;}
    /* Square the inner overlays so no rounded gap shows against the square
       screen. SEMUA scrim/overlay disertakan agar tak ada lengkungan hitam
       yang tersisa, dan dibuat menutup PENUH layar.
       CATATAN: .subscreen punya transform -> ia jadi containing-block untuk
       position:fixed di dalamnya, jadi 'fixed' TIDAK menempel ke viewport.
       Pakai position:absolute + inset:0 supaya scrim selalu mengisi PENUH
       parent-nya (.screen / .subscreen yang sudah full-bleed & kotak di HP),
       di SEMUA ukuran layar HP. SEMUA jenis scrim/overlay disertakan. */
    .subscreen,.scrim,.sub-scrim,.dlg-scrim,.sheet-scrim,
    .apc-pop-mask,.bd-scrim,.fp-fab{border-radius:0;}
    .scrim,.sub-scrim,.dlg-scrim,.sheet-scrim,
    .apc-pop-mask,.bd-scrim{
      position:absolute;inset:0;width:100%;height:100%;max-width:100%;
    }
    /* dialog & bottom-sheet scrim tetas boleh punya radius pada KARTU di dalamnya,
       hanya lapisan gelap (mask) yang dikotakkan & dipenuhkan di atas. */
  }

  /* ===== Desktop / tablet (>=601px): app tetap dalam bingkai, tapi ADAPTIF tinggi
     layar supaya tidak terpotong di laptop pendek, dan latar dibuat rapi agar
     nyaman dibuka di browser desktop. Layout aplikasi tetap 1 kolom (mobile-first)
     dan otomatis responsive. ===== */
  @media (min-width:601px){
    body{
      padding:24px 24px 32px;
      background:radial-gradient(1200px 600px at 50% -10%,#EAEAFB 0%,#DDDDEC 45%,#D2D2E2 100%);
      min-height:100vh;
    }
    .page-title{font-size:24px;margin-bottom:4px;}
    .page-sub{margin-bottom:20px;}
    .stage{align-items:center;min-height:calc(100vh - 140px);}
    /* Bingkai perangkat ADAPTIF: lebar tetap nyaman, tinggi mengikuti viewport
       (dibatasi 760–920px) sehingga seluruh app terlihat tanpa terpotong. */
    .phone{
      width:clamp(380px,32vw,430px);
      height:min(900px, calc(100vh - 96px));
      max-height:920px;
    }
  }
  /* Layar sangat lebar: perbesar sedikit & beri bayangan lebih dalam supaya
     terasa seperti web-app desktop, bukan mockup mungil. */
  @media (min-width:1200px){
    .phone{ width:clamp(400px,30vw,460px); box-shadow:0 40px 90px rgba(0,0,0,.30),0 12px 30px rgba(0,0,0,.18); }
  }

  /* ============================================================
     DESKTOP-RICH LAYOUT (>=1024px)
     Markup SAMA persis dengan mobile (satu sumber kebenaran) — hanya
     tata letak yang berubah via CSS Grid, sehingga SEMUA fitur otomatis
     ter-mirror antara HP & desktop tanpa menggandakan logic/JS.
     Frame telepon melebar jadi kanvas desktop; .scroll jadi grid multi-kolom.
     ============================================================ */
  @media (min-width:1024px){
    body{ padding:28px 32px 40px; }
    .page-sub{ margin-bottom:22px; }
    .stage{ display:block; min-height:auto; }
    .device-wrap{ gap:14px; }
    /* Kanvas desktop: lebar, tinggi mengikuti isi (bukan frame tetap). */
    .phone{
      width:min(1180px, calc(100vw - 64px)); max-width:1180px;
      height:auto; min-height:0; max-height:none;
      border-radius:30px; padding:0; background:var(--page);
      box-shadow:0 40px 90px rgba(0,0,0,.22),0 12px 30px rgba(0,0,0,.14);
      margin:0 auto;
    }
    .screen{ border-radius:30px; height:auto; min-height:calc(100vh - 200px); }
    .notch{ display:none; }
    .statusbar{ display:none; }
    /* GRID: header full-width + 3 kolom (rail kiri · utama · rail kanan). */
    .scroll{
      display:grid; overflow:visible; padding:22px 28px 40px;
      grid-template-columns:minmax(260px,300px) minmax(0,1fr) minmax(280px,330px);
      grid-auto-rows:min-content; gap:16px 20px; align-items:start;
    }
    .scroll::after{ display:none; }
    /* Header membentang penuh; toggle & chat bar sejajar rapi. */
    .header{ grid-column:1 / -1; padding:2px 2px 6px; }
    .head-top{ margin-bottom:4px; }
    .greeting{ margin-top:10px; }
    /* Toggle + chat bar berdampingan di baris header (lebih kaya info). */
    .toggle{ display:inline-flex; width:auto; min-width:260px; vertical-align:middle; }
    .aibar{ display:inline-flex; width:auto; min-width:340px; max-width:520px;
      margin-top:0; margin-left:14px; vertical-align:middle; }
    .aibar-ph{ min-width:120px; }

    /* Penempatan kartu ke kolom. order dipakai agar urutan visual rapi
       tanpa mengubah urutan DOM (aksesibilitas tetap logis). */
    #heroSlot{ grid-column:2; order:1; }
    #sec-kategori{ grid-column:2; order:2; }
    #ledgerSlot{ grid-column:2; order:3; }

    #sec-proj{ grid-column:1; order:1; }
    #sec-wealth{ grid-column:1; order:2; }

    #duoLinkSlot{ grid-column:3; order:1; }
    #sec-budget{ grid-column:3; order:2; }
    #sec-goal{ grid-column:3; order:3; }

    /* Kartu di desktop: sedikit lebih lega, sudut lebih halus. */
    .scroll > .card{ margin:0; }

    /* Kategori tampil sebagai GRID kartu (bukan list vertikal) — lebih rich. */
    .goals-strip{ display:grid; grid-template-columns:1fr 1fr; gap:10px; overflow:visible; }
    .goal-card{ min-width:0; }

    /* FAB & navbar: di desktop tetap ada tapi diposisikan relatif ke kanvas. */
    .navbar{ border-radius:0 0 30px 30px; }

    /* Overlay/pop-up: batasi lebar & tengahkan supaya tidak melar full-canvas.
       .subscreen (screen detail: Tanya AI, kategori, dsb.) di desktop jadi panel
       terpusat dengan lebar nyaman baca, bukan membentang penuh 1180px. */
    .screen{ position:relative; }
    .subscreen{
      position:fixed; top:0; bottom:0; z-index:120;
      border-radius:0; left:50%; right:auto; width:min(560px,100vw);
      transform:translateX(-50%) translateX(120%);
      box-shadow:0 30px 80px rgba(0,0,0,.28);
    }
    .subscreen.show{ transform:translateX(-50%); }
    .sub-bar{ padding-top:22px; }
    .exp-scrim, .sub-scrim, .dlg-scrim, .sheet-scrim, .apc-pop-mask, .bd-scrim, .scrim{
      border-radius:30px;
    }
    .exp-card{ max-width:460px; border-radius:22px; margin-bottom:24px; }
    .fab-menu{ max-width:340px; }
  }
  /* 1024–1279px: turunkan ke 2 kolom (utama + rail kanan); kartu rail kiri
     ikut ke kolom utama agar tak sempit. */
  @media (min-width:1024px) and (max-width:1279px){
    .scroll{ grid-template-columns:minmax(0,1fr) minmax(260px,300px); }
    #heroSlot,#sec-kategori,#ledgerSlot,#sec-proj,#sec-wealth{ grid-column:1; }
    #sec-proj{ order:3; } #sec-wealth{ order:5; }
    #sec-kategori{ order:2; } #ledgerSlot{ order:6; }
    #duoLinkSlot,#sec-budget,#sec-goal{ grid-column:2; }
    .aibar{ min-width:280px; max-width:420px; }
  }

  /* header */
  .header{padding:8px 2px 4px;}
  .head-top{display:flex;align-items:center;justify-content:space-between;}
  .wordmark{font-size:21px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;}
  .wordmark-img{height:26px;width:auto;display:block;}
  .greeting{font-size:22px;font-weight:700;letter-spacing:-.01em;margin-top:14px;line-height:1.25;}
  .greeting span{color:var(--muted);font-weight:500;}
  .sub-greet{font-size:13px;color:var(--muted);margin-top:3px;font-weight:500;}
  .ava{
    width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:700;font-size:15px;box-shadow:var(--sh-sm);
  }
  .mode-s .ava{background:linear-gradient(145deg,#3B82F6,#2563EB);}
  .mode-b .ava{background:linear-gradient(145deg,#EA6A2E,#C2410C);}

  /* header right cluster: Tanya AI pill + export icon + avatar */
  .head-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
  .ai-btn{
    position:relative;display:inline-flex;align-items:center;gap:5px;height:36px;padding:0 13px;
    border-radius:999px;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent;
    background:linear-gradient(#fff,#fff) padding-box,linear-gradient(120deg,#22D3EE,#34D399,#A3E635,#FDE047,#22D3EE) border-box;
    background-size:100% 100%,300% 300%;border:2px solid transparent;box-shadow:var(--sh-sm);
    animation:aiflow 6s linear infinite;
  }
  @keyframes aiflow{0%{background-position:0 0,0% 50%}100%{background-position:0 0,300% 50%}}
  .ai-btn svg{width:17px;height:17px;stroke:var(--accent);}
  .ai-btn .ai-lbl{font-family:inherit;font-weight:800;font-size:13px;letter-spacing:-.01em;color:#1F2430;}
  .ai-btn:active{transform:scale(.96);}
  .exp-btn{
    width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    border:1px solid rgba(28,28,40,.10);background:rgba(255,255,255,.7);cursor:pointer;flex-shrink:0;
    box-shadow:var(--sh-sm);-webkit-tap-highlight-color:transparent;color:var(--accent);
  }
  .exp-btn svg{width:19px;height:19px;}
  .exp-btn:active{transform:scale(.94);}
  @media (max-width:360px){ .ai-btn .ai-lbl{display:none;} .ai-btn{padding:0 9px;} }

  /* Tanya AI chat bar (below the Sendiri/Berdua toggle) */
  .aibar{
    display:flex;align-items:center;gap:10px;width:100%;margin-top:12px;
    height:46px;padding:0 6px 0 6px;border-radius:999px;cursor:pointer;
    -webkit-tap-highlight-color:transparent;text-align:left;
    background:#fff;border:1.5px solid color-mix(in srgb,var(--accent) 32%,#E6E8F0);
    box-shadow:var(--sh-sm);transition:transform .12s,border-color .2s,box-shadow .2s;
  }
  .aibar:active{transform:scale(.985);}
  .aibar:hover{border-color:var(--accent);box-shadow:0 4px 14px -6px color-mix(in srgb,var(--accent) 60%,transparent);}
  .aibar-chip{
    display:inline-flex;align-items:center;gap:6px;flex-shrink:0;height:34px;padding:0 12px;
    border-radius:999px;background:color-mix(in srgb,var(--accent) 12%,#fff);color:var(--accent);
  }
  .aibar-chip svg{width:16px;height:16px;stroke:var(--accent);flex-shrink:0;}
  .aibar-lbl{font-family:inherit;font-weight:800;font-size:13px;letter-spacing:-.01em;color:var(--accent);white-space:nowrap;}
  .aibar-ph{flex:1;min-width:0;overflow:hidden;}
  .aibar-ph-txt{
    display:inline-block;max-width:100%;font-size:14px;font-weight:600;color:#9AA0AE;
    white-space:nowrap;overflow:hidden;text-overflow:clip;
    opacity:1;transition:opacity .22s ease;
  }
  .aibar-ph-txt.fade{opacity:0;}
  .aibar-send{
    width:34px;height:34px;flex-shrink:0;border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:var(--accent);color:#fff;
  }
  .aibar-send svg{width:16px;height:16px;stroke:#fff;}
  @media (prefers-reduced-motion:reduce){ .aibar-ph-txt{transition:none;} }

  /* export bottom-sheet */
  .exp-scrim{position:absolute;inset:0;z-index:70;display:flex;align-items:flex-end;justify-content:center;
    background:rgba(20,16,40,.46);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    opacity:0;pointer-events:none;transition:opacity .24s;padding:0;}
  .exp-scrim.show{opacity:1;pointer-events:auto;}
  .exp-card{width:100%;max-width:440px;background:#fff;border-radius:26px 26px 0 0;padding:22px 20px 24px;
    box-shadow:0 -14px 44px -8px rgba(0,0,0,.34);transform:translateY(30px);transition:transform .3s cubic-bezier(.2,.8,.2,1);}
  .exp-scrim.show .exp-card{transform:translateY(0);}
  .exp-hd{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
  .exp-hic{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;
    background:var(--accent);color:#fff;flex-shrink:0;}
  .exp-hic svg{width:22px;height:22px;}
  .exp-ht{font-size:17px;font-weight:800;letter-spacing:-.01em;}
  .exp-hs{font-size:12px;color:var(--muted);margin-top:1px;}
  .exp-sec{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:14px 2px 8px;}
  .seg2{display:flex;gap:6px;background:rgba(28,28,40,.05);border-radius:14px;padding:4px;}
  .seg2 button{flex:1;border:none;background:transparent;cursor:pointer;padding:9px 0;border-radius:11px;
    font-family:inherit;font-size:13px;font-weight:700;color:var(--muted);transition:all .18s ease;-webkit-tap-highlight-color:transparent;}
  .seg2 button.on{background:#fff;color:var(--accent);box-shadow:var(--sh-sm);}
  .exp-fields{display:flex;gap:10px;margin-top:10px;}
  .exp-fld{flex:1;display:flex;flex-direction:column;gap:5px;}
  .exp-fld span{font-size:11px;font-weight:600;color:var(--muted);}
  .exp-fld select,.exp-fld input{width:100%;border:1px solid rgba(28,28,40,.14);border-radius:12px;
    padding:11px 12px;font-family:inherit;font-size:14px;font-weight:600;background:#fff;color:#1F2430;-webkit-appearance:none;appearance:none;}
  .exp-fld select:focus,.exp-fld input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.12);}
  .mode-b .exp-fld select:focus,.mode-b .exp-fld input:focus{box-shadow:0 0 0 3px rgba(194,65,12,.12);}
  .exp-file{display:flex;align-items:center;gap:12px;margin-top:16px;padding:12px 14px;
    background:rgba(28,28,40,.04);border-radius:14px;}
  .exp-xf{width:34px;height:34px;border-radius:9px;background:#15924F;color:#fff;display:flex;align-items:center;
    justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;}
  .exp-xn{font-size:12.5px;font-weight:700;color:#1F2430;word-break:break-all;line-height:1.35;}
  .exp-xs{font-size:11px;color:var(--muted);margin-top:2px;}
  .exp-dl{width:100%;margin-top:16px;border:none;border-radius:15px;padding:15px 0;cursor:pointer;
    font-family:inherit;font-size:15px;font-weight:800;color:#fff;background:var(--accent);
    display:flex;align-items:center;justify-content:center;gap:8px;-webkit-tap-highlight-color:transparent;
    box-shadow:0 8px 20px -6px rgba(37,99,235,.5);}
  .mode-b .exp-dl{box-shadow:0 8px 20px -6px rgba(194,65,12,.5);}
  .exp-dl svg{width:19px;height:19px;stroke:#fff;}
  .exp-dl:active{transform:scale(.985);}
  .exp-cancel{text-align:center;margin-top:12px;font-size:13.5px;font-weight:600;color:var(--muted);cursor:pointer;padding:6px;}

  /* Tanya AI chat screen */
  .ta-wrap{display:flex;flex-direction:column;height:100%;}
  .ta-body{flex:1;overflow-y:auto;padding:14px 16px 8px;display:flex;flex-direction:column;gap:11px;}
  .ta-msg{max-width:86%;font-size:13px;line-height:1.55;padding:11px 13px;border-radius:16px;box-shadow:var(--sh-sm);}
  .ta-msg.bot{align-self:flex-start;background:#fff;border-bottom-left-radius:5px;}
  .ta-msg.user{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:5px;font-weight:500;}
  .ta-msg.bot b{color:var(--accent);}
  .ta-msg .step{margin:6px 0 0;padding-left:18px;}
  .ta-msg .step li{margin-bottom:4px;}
  .ta-msg .kpi{font-weight:800;color:var(--accent);}
  .ta-msg .warn{background:#FFF7E6;border:1px solid #FFE1A6;color:#8A6D00;font-size:11px;padding:8px 10px;border-radius:10px;margin-top:8px;line-height:1.45;}
  .ta-acts{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px;}
  .ta-acts button{border:1px solid var(--accent);background:rgba(37,99,235,.08);color:var(--accent);font-family:inherit;font-size:11px;font-weight:700;padding:6px 11px;border-radius:10px;cursor:pointer;}
  .mode-b .ta-acts button{background:rgba(194,65,12,.08);}
  .ta-suggest{padding:4px 16px 2px;}
  .ta-sg-label{font-size:11px;font-weight:700;color:var(--muted);margin:6px 0 8px;text-transform:uppercase;letter-spacing:.04em;}
  .ta-chips{display:flex;flex-wrap:wrap;gap:7px;}
  .ta-chip{border:1px solid rgba(28,28,40,.12);background:#fff;color:#1F2430;font-family:inherit;font-size:11.5px;font-weight:600;padding:8px 12px;border-radius:999px;cursor:pointer;box-shadow:var(--sh-sm);line-height:1.2;}
  .ta-chip:active{transform:scale(.96);}
  .ta-input{padding:11px 14px 16px;background:rgba(255,255,255,.9);backdrop-filter:blur(6px);border-top:1px solid rgba(28,28,40,.07);display:flex;gap:9px;align-items:center;}
  .ta-input input{flex:1;border:1px solid rgba(28,28,40,.14);border-radius:999px;padding:11px 15px;font-family:inherit;font-size:13px;background:#fff;}
  .ta-input input:focus{outline:none;border-color:var(--accent);}
  .ta-send{width:42px;height:42px;border-radius:50%;border:none;background:var(--accent);color:#fff;cursor:pointer;flex-shrink:0;box-shadow:var(--sh-md);display:flex;align-items:center;justify-content:center;}
  .ta-send svg{width:19px;height:19px;stroke:#fff;}
  .ta-typing{align-self:flex-start;display:flex;gap:4px;padding:12px 14px;background:#fff;border-radius:16px;box-shadow:var(--sh-sm);}
  .ta-typing span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:tablink 1s infinite;}
  .ta-typing span:nth-child(2){animation-delay:.2s;} .ta-typing span:nth-child(3){animation-delay:.4s;}
  @keyframes tablink{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}
  .mode-s{--accent:#2563EB;} .mode-b{--accent:#C2410C;}

  /* toggle — sleek sliding-thumb segmented control on frosted track */
  .toggle{
    position:relative;display:flex;margin:18px 0 8px;padding:4px;
    border-radius:18px;background:rgba(255,255,255,.65);backdrop-filter:blur(6px);
    box-shadow:inset 0 0 0 1px rgba(28,28,40,.05),var(--sh-sm);isolation:isolate;
  }
  .toggle-thumb{
    position:absolute;top:4px;bottom:4px;left:4px;
    width:calc(50% - 4px);border-radius:14px;z-index:1;
    transition:transform .42s cubic-bezier(.34,1.4,.5,1),background-color .35s ease,box-shadow .35s ease;
  }
  .mode-s .toggle-thumb{transform:translateX(0);background:linear-gradient(180deg,#3B82F6,#2563EB);
    box-shadow:0 6px 14px rgba(37,99,235,.34),inset 0 1px 0 rgba(255,255,255,.22);}
  .mode-b .toggle-thumb{transform:translateX(100%);background:linear-gradient(180deg,#E4621F,#C2410C);
    box-shadow:0 6px 14px rgba(194,65,12,.34),inset 0 1px 0 rgba(255,255,255,.22);}
  .toggle button{
    position:relative;z-index:2;flex:1;border:none;background:transparent;cursor:pointer;
    padding:11px 0;font-size:13px;font-weight:600;letter-spacing:.01em;
    color:var(--muted);display:flex;align-items:center;justify-content:center;gap:7px;
    transition:color .3s ease,transform .12s ease;-webkit-tap-highlight-color:transparent;
  }
  .toggle button:active{transform:scale(.97);}
  .dotmark{width:6px;height:6px;border-radius:50%;display:inline-block;background:currentColor;opacity:.45;transition:opacity .3s ease;}
  .dotmark.duo{box-shadow:-7px 0 0 -1px currentColor;margin-left:6px;}
  .mode-s .toggle .seg-s{color:#fff;} .mode-b .toggle .seg-b{color:#fff;}
  .mode-s .toggle .seg-s .dotmark,.mode-b .toggle .seg-b .dotmark{opacity:1;}

  /* cards — borderless, soft floating shadow */
  .card{
    background:var(--card);border-radius:22px;border:none;
    padding:18px;margin-bottom:14px;box-shadow:var(--sh-md);position:relative;
  }
  .seclabel{
    font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;
    color:var(--muted);margin-bottom:12px;
  }
  .sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .sec-head .seclabel{margin-bottom:0;}
  .sec-month{color:var(--accent);font-weight:700;text-transform:none;letter-spacing:0;}
  .chip-link{font-size:12px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:3px;}

  /* HERO — signature dark balance pill (reference's black card) */
  .hero{padding:0;background:transparent;box-shadow:none;}
  .pill{
    background:var(--ink-pill);border-radius:26px;padding:22px 22px 20px;color:#fff;
    box-shadow:var(--sh-pill);position:relative;overflow:hidden;
  }
  .pill::after{
    content:"";position:absolute;top:-50px;right:-30px;width:160px;height:160px;border-radius:50%;
    filter:blur(30px);opacity:.5;transition:background-color .4s ease;
  }
  .mode-s .pill::after{background:rgba(59,130,246,.55);}
  .mode-b .pill::after{background:rgba(234,106,46,.55);}
  .pill-label{font-size:12.5px;color:rgba(255,255,255,.62);font-weight:500;display:flex;align-items:center;gap:7px;position:relative;z-index:1;}
  .pill-num{font-size:34px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.015em;margin-top:8px;position:relative;z-index:1;}
  .pill-sub{font-size:12px;color:rgba(255,255,255,.55);margin-top:8px;line-height:1.5;position:relative;z-index:1;}
  .pill-delta{
    display:inline-flex;align-items:center;gap:5px;margin-top:14px;position:relative;z-index:1;
    background:rgba(255,255,255,.12);color:#7DEBA8;
    font-size:12px;font-weight:600;padding:6px 11px;border-radius:999px;
  }
  /* hero month-navigation header + masuk/keluar split (mode sendiri) */
  .pill-topbar{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1;margin-bottom:14px;}
  .pill-month{display:flex;align-items:center;gap:10px;}
  .pm-nav{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.12);border:none;color:#fff;
    display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none;transition:background .18s;}
  .pm-nav:hover{background:rgba(255,255,255,.22);}
  .pm-nav:disabled{opacity:.28;cursor:default;}
  .pm-nav svg{width:14px;height:14px;}
  .pm-lbl{font-size:13.5px;font-weight:600;color:#fff;min-width:78px;text-align:center;}
  .pill-toCatatan{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.12);color:rgba(255,255,255,.85);
    border:none;font-family:inherit;font-size:11.5px;font-weight:600;padding:7px 12px;border-radius:999px;cursor:pointer;
    transition:background .18s;}
  .pill-toCatatan:hover{background:rgba(255,255,255,.22);}
  .pill-toCatatan svg{width:13px;height:13px;}
  .io-split{display:flex;gap:10px;margin-top:14px;position:relative;z-index:1;}
  .io-box{flex:1;background:rgba(255,255,255,.08);border-radius:14px;padding:11px 13px;}
  .io-box .io-cap{font-size:11px;color:rgba(255,255,255,.6);display:flex;align-items:center;gap:5px;}
  .io-box .io-cap i{width:7px;height:7px;border-radius:50%;display:inline-block;}
  .io-box .io-amt{font-size:16.5px;font-weight:700;font-variant-numeric:tabular-nums;margin-top:5px;letter-spacing:-.01em;}
  .io-in .io-amt{color:#7DEBA8;} .io-out .io-amt{color:#FBBFAE;}
  .io-in .io-cap i{background:#7DEBA8;} .io-out .io-cap i{background:#FBBFAE;}
  /* mini-grafik 6 bulan DI DALAM hero hitam */
  .hero-chart{margin-top:16px;position:relative;z-index:1;}
  .hero-chart .ch-nav{background:rgba(255,255,255,.12);border:none;box-shadow:none;color:#fff;width:24px;height:24px;}
  .hero-chart .ch-nav:hover{background:rgba(255,255,255,.24);}
  .hero-chart .ch-nav svg{width:13px;height:13px;}
  .hero-chart .ch-prev{left:-6px;} .hero-chart .ch-next{right:-6px;}
  .hero-chart .ch-nav:disabled{opacity:.28;}
  .hero-legend{display:flex;gap:14px;margin-top:10px;font-size:11px;color:rgba(255,255,255,.6);flex-wrap:wrap;align-items:center;position:relative;z-index:1;}
  .hero-legend i{display:inline-block;width:8px;height:8px;border-radius:3px;margin-right:5px;vertical-align:middle;}
  .hero-legend .ln{width:13px;height:3px;border-radius:2px;}
  .hero-legend .swipe-hint{margin-left:auto;color:rgba(255,255,255,.4);font-size:10px;}
  /* contribution bar inside pill (berdua) */
  .contrib-bar{display:flex;height:9px;border-radius:6px;overflow:hidden;margin-top:16px;background:rgba(255,255,255,.14);position:relative;z-index:1;}
  .contrib-bar .seg-reza{background:#EA6A2E;}
  .contrib-bar .seg-dini{background:var(--accent);}
  .contrib-legend{display:flex;gap:18px;margin-top:10px;font-size:11.5px;color:rgba(255,255,255,.7);position:relative;z-index:1;}
  .contrib-legend i{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:6px;vertical-align:middle;}

  /* charts */
  .legend-inline{display:flex;gap:16px;margin-top:16px;font-size:11.5px;color:var(--muted);flex-wrap:wrap;}
  .legend-inline i{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:6px;vertical-align:middle;}
  .legend-inline .ln{width:14px;height:3px;border-radius:2px;}
  .chart-swipe{position:relative;touch-action:pan-y;user-select:none;-webkit-user-select:none;}
  .ch-nav{position:absolute;top:50%;transform:translateY(-50%);z-index:3;width:28px;height:28px;border-radius:50%;
    background:#fff;border:1px solid #ECEBF3;box-shadow:0 2px 8px rgba(26,26,34,.10);color:#6E6D7E;
    display:flex;align-items:center;justify-content:center;cursor:pointer;transition:opacity .18s,background .18s;}
  .ch-nav:hover{background:#F6F5FB;}
  .ch-nav svg{width:15px;height:15px;}
  .ch-prev{left:-4px;} .ch-next{right:-4px;}
  .ch-nav:disabled{opacity:.28;cursor:default;}
  .swipe-hint{color:var(--faint);font-size:10.5px;margin-left:auto;font-weight:500;}
  .xaxis span.on{color:var(--ink);font-weight:700;}
  .xaxis{display:flex;margin-top:10px;}
  .xaxis span{flex:1;text-align:center;font-size:11px;color:var(--muted);font-weight:500;}

  /* donut layout */
  .donut-wrap{display:flex;gap:18px;align-items:center;}
  .cat-list{flex:1;display:flex;flex-direction:column;gap:10px;}
  .cat-row{display:flex;align-items:center;font-size:13px;}
  .cat-row .dot{width:9px;height:9px;border-radius:3px;margin-right:10px;flex:none;}
  .cat-row .nm{flex:1;color:var(--ink);font-weight:500;}
  .cat-row .pc{color:var(--muted);font-weight:600;font-variant-numeric:tabular-nums;}
  .cat-more{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:var(--accent,#2563EB);margin-top:4px;}
  .cat-more svg{width:13px;height:13px;}

  /* saving ratio */
  .ratio-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .ratio-val{font-size:28px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.01em;}
  .mode-s .ratio-val{color:var(--s-primary);}
  .mode-b .ratio-val{color:var(--b-primary);}
  .badge-ok{background:rgba(21,146,79,.12);color:var(--success);font-size:11.5px;font-weight:600;padding:6px 11px;border-radius:999px;display:inline-flex;align-items:center;gap:5px;}
  .ratio-track{height:14px;background:#EDECF4;border-radius:9px;position:relative;overflow:visible;}
  .ratio-fill{height:100%;border-radius:9px;}
  .mode-s .ratio-fill{background:linear-gradient(90deg,#3B82F6,#2563EB);}
  .mode-b .ratio-fill{background:linear-gradient(90deg,#E4621F,#C2410C);}
  .target-line{position:absolute;top:-5px;bottom:-5px;width:2px;background:var(--ink);left:50%;border-radius:2px;}
  .target-lbl{position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--muted);white-space:nowrap;font-weight:500;}

  /* emotional saving mood — Atur Berdua */
  .mood-card{background:linear-gradient(160deg,#FFF8F3,#FFFFFF);border:1px solid rgba(194,65,12,.14);overflow:hidden;}
  .mood-top{display:flex;align-items:center;gap:14px;}
  .mood-face{width:54px;height:54px;flex:0 0 54px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#fff;transition:color .4s ease,box-shadow .4s ease;animation:moodPop .5s cubic-bezier(.34,1.56,.64,1);}
  .mood-face svg{width:40px;height:40px;}
  @keyframes moodPop{0%{transform:scale(.4);opacity:0;}70%{transform:scale(1.12);}100%{transform:scale(1);opacity:1;}}
  .mood-meta{flex:1;min-width:0;}
  .mood-lbl{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:800;letter-spacing:.01em;}
  .mood-lbl svg{width:14px;height:14px;}
  .mood-val{font-size:18px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums;letter-spacing:-.01em;margin-top:2px;}
  .mood-val span{font-size:11px;font-weight:600;color:var(--muted);}
  .mood-track{height:9px;background:#F0E7DF;border-radius:9px;overflow:hidden;margin:13px 0 9px;}
  .mood-fill{height:100%;border-radius:9px;transition:width .6s cubic-bezier(.4,0,.2,1);}
  .mood-foot{font-size:11.5px;color:var(--muted);font-weight:600;line-height:1.5;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
  .mood-foot svg{width:14px;height:14px;vertical-align:-2px;color:var(--mc);}
  /* v1.9.0: penanda mood di dalam kartu Proyeksi Tabungan Setahun (beranda) */
  .mood-marker{margin-top:14px;padding:13px 14px;border-radius:14px;background:linear-gradient(160deg,#FFF6F0,#FFFFFF);border:1px solid rgba(194,65,12,.16);}

  /* goals */
  .goals-strip{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
  .goals-strip::-webkit-scrollbar{display:none;}
  .goal-card{flex:none;width:148px;background:#FAFAFC;border-radius:18px;padding:14px;}
  .goal-ic{width:34px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center;}
  .mode-s .goal-ic{background:var(--s-tint);color:var(--s-primary);}
  .mode-b .goal-ic{background:var(--b-tint);color:var(--b-primary);}
  .goal-name{font-size:13px;font-weight:600;margin-top:10px;}
  .goal-amt{font-size:11.5px;color:var(--muted);margin-top:4px;font-variant-numeric:tabular-nums;}
  .goal-track{height:7px;background:#EDECF4;border-radius:5px;margin-top:12px;overflow:hidden;}
  .goal-prog{height:100%;border-radius:5px;}
  .mode-s .goal-prog{background:var(--s-primary);}
  .mode-b .goal-prog{background:var(--b-primary);}
  .goal-pc{font-size:11px;font-weight:600;color:var(--muted);margin-top:7px;text-align:right;}
  /* Pagu Harian — carousel mini di kartu Anggaran Bulan Ini */
  .ph-strip{display:flex;gap:9px;overflow-x:auto;padding:2px 0 2px;margin-top:13px;scrollbar-width:none;}
  .ph-strip::-webkit-scrollbar{display:none;}
  .ph-card{flex:none;width:128px;background:#FAFAFC;border-radius:14px;padding:11px 12px;border:1px solid #EFEEF4;}
  .ph-card.over{background:#FEF2F2;border-color:#FECACA;}
  .ph-nm{font-size:11.5px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .ph-day{font-size:15px;font-weight:700;margin-top:5px;font-variant-numeric:tabular-nums;letter-spacing:-.01em;}
  .ph-day.ok{color:#16A34A;}
  .ph-day.over{color:#DC2626;}
  .ph-sub{font-size:10px;color:var(--muted);font-weight:600;margin-top:1px;}
  .ph-track{height:5px;background:#EDECF4;border-radius:999px;margin-top:8px;overflow:hidden;}
  .ph-fill{height:100%;border-radius:999px;background:var(--coral);}
  .ph-fill.over{background:#DC2626;}
  .ph-cap{font-size:10px;color:var(--muted);font-weight:600;margin-top:6px;font-variant-numeric:tabular-nums;}

  /* ledger */
  .ledger-row{display:flex;align-items:center;gap:12px;margin-bottom:15px;}
  .avatar{width:40px;height:40px;border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;flex:none;}
  .av-r{background:linear-gradient(145deg,#EA6A2E,#C2410C);}
  .av-d{background:linear-gradient(145deg,#FFD27A,#F4A93C);}
  .ledger-info{flex:1;}
  .ledger-name{font-size:14px;font-weight:600;}
  .ledger-amt{font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums;margin-top:2px;}
  .ledger-pc{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;}
  .ledger-split{display:flex;height:10px;border-radius:6px;overflow:hidden;margin-top:6px;}
  .ledger-split .l-r{background:#C2410C;}
  .ledger-split .l-d{background:var(--accent);}
  .ledger-meta{font-size:11.5px;color:var(--muted);margin-top:12px;}
  .ledger-priv{font-size:11px;color:var(--muted);margin-top:7px;font-style:italic;display:flex;gap:7px;align-items:center;}

  /* bottom nav — dark floating bar (reference style) */
  .navbar{
    position:absolute;bottom:18px;left:18px;right:18px;height:64px;background:#16161C;
    border-radius:32px;display:flex;align-items:center;justify-content:space-between;
    padding:8px 10px;z-index:40;box-shadow:0 12px 30px rgba(15,15,22,.34),inset 0 0 0 1px rgba(255,255,255,.05);
  }
  /* inactive = circular dark chip with light-gray icon */
  .nav-item{
    width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    color:#9A9AA6;background:transparent;transition:background-color .3s ease,color .3s ease;cursor:pointer;
  }
  .nav-item svg{display:block;}
  /* active = expanding white pill with dark icon + label */
  .nav-item.active{
    width:auto;border-radius:999px;background:#fff;padding:0 18px 0 14px;gap:8px;color:#16161C;font-weight:700;font-size:13px;
  }
  .nav-item .nav-lbl{display:none;white-space:nowrap;}
  .nav-item.active .nav-lbl{display:inline;}

  /* FAB + breakdown menu */
  .fab{
    position:absolute;right:26px;bottom:98px;width:56px;height:56px;border-radius:50%;
    color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;
    z-index:46;box-shadow:0 10px 22px rgba(20,20,30,.28);transition:transform .35s cubic-bezier(.34,1.4,.5,1),background-color .35s ease;
  }
  .mode-s .fab{background:linear-gradient(145deg,#3B82F6,#2563EB);}
  .mode-b .fab{background:linear-gradient(145deg,#E4621F,#C2410C);}
  .fab.open{transform:rotate(135deg);}
  .fab-svg{transition:none;}
  /* scrim */
  .scrim{
    position:absolute;inset:0;background:rgba(15,15,22,.34);backdrop-filter:blur(2px);
    z-index:44;opacity:0;pointer-events:none;transition:opacity .3s ease;border-radius:38px;
  }
  .scrim.show{opacity:1;pointer-events:auto;}
  /* action sheet that pops above the FAB */
  .fab-menu{
    position:absolute;right:24px;bottom:166px;z-index:47;display:flex;flex-direction:column;gap:10px;align-items:flex-end;
    opacity:0;transform:translateY(10px) scale(.96);transform-origin:bottom right;pointer-events:none;
    transition:opacity .28s ease,transform .32s cubic-bezier(.34,1.3,.5,1);
  }
  .fab-menu.show{opacity:1;transform:translateY(0) scale(1);pointer-events:auto;}
  .fab-action{
    display:flex;align-items:center;gap:12px;background:#fff;border-radius:18px;padding:12px 16px;
    box-shadow:var(--sh-md);cursor:pointer;min-width:212px;
  }
  .fab-action .fa-ic{width:38px;height:38px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex:none;color:#fff;}
  .mode-s .fab-action .fa-ic{background:linear-gradient(145deg,#3B82F6,#2563EB);}
  .mode-b .fab-action .fa-ic{background:linear-gradient(145deg,#E4621F,#C2410C);}
  .fab-action .fa-tx{display:flex;flex-direction:column;}
  .fab-action .fa-t{font-size:13.5px;font-weight:600;color:var(--ink);}
  .fab-action .fa-s{font-size:11px;color:var(--muted);margin-top:1px;}

  .home-indicator{position:absolute;bottom:7px;left:50%;transform:translateX(-50%);width:130px;height:5px;border-radius:3px;background:rgba(0,0,0,.16);z-index:60;}

  /* ===== floating action button inside a sub-screen (e.g. Catatan) ===== */
  .sub-fab{
    position:absolute;right:18px;bottom:24px;width:56px;height:56px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;z-index:58;
    box-shadow:0 10px 22px rgba(20,20,30,.28);transition:transform .35s cubic-bezier(.34,1.4,.5,1),background-color .35s ease;
  }
  .mode-s .sub-fab{background:linear-gradient(145deg,#3B82F6,#2563EB);}
  .mode-b .sub-fab{background:linear-gradient(145deg,#E4621F,#C2410C);}
  .sub-fab.open{transform:rotate(135deg);}
  .sub-scrim{
    position:absolute;inset:0;background:rgba(15,15,22,.34);backdrop-filter:blur(2px);
    z-index:56;opacity:0;pointer-events:none;transition:opacity .3s ease;border-radius:38px;
  }
  .sub-scrim.show{opacity:1;pointer-events:auto;}
  .sub-fab-menu{
    position:absolute;right:18px;bottom:90px;z-index:59;display:flex;flex-direction:column;gap:10px;align-items:flex-end;
    opacity:0;transform:translateY(10px) scale(.96);transform-origin:bottom right;pointer-events:none;
    transition:opacity .28s ease,transform .32s cubic-bezier(.34,1.3,.5,1);
  }
  .sub-fab-menu.show{opacity:1;transform:translateY(0) scale(1);pointer-events:auto;}

  /* ===== FAB floating "Progress Analisa" =====
     Muncul saat analisa e-statement masih berjalan TAPI user sudah keluar dari
     layar progress (mis. menekan back / pindah ke beranda). Selalu bisa diketuk
     untuk kembali membuka layar progress sampai analisa beres. Diletakkan di
     dalam .screen (BUKAN .subscreen) supaya tetap tampil di layar mana pun. */
  .fp-fab{
    position:absolute;left:18px;bottom:96px;z-index:62;display:none;align-items:center;gap:10px;
    padding:9px 15px 9px 11px;border-radius:999px;cursor:pointer;color:#fff;
    box-shadow:0 10px 24px rgba(20,20,30,.30);
    transition:transform .18s ease,box-shadow .25s ease,opacity .25s ease;
    max-width:calc(100% - 36px);
  }
  .fp-fab.show{display:flex;animation:fpPop .32s cubic-bezier(.34,1.4,.5,1);}
  .fp-fab:active{transform:scale(.96);}
  .mode-s .fp-fab{background:linear-gradient(145deg,#3B82F6,#2563EB);}
  .mode-b .fp-fab{background:linear-gradient(145deg,#E4621F,#C2410C);}
  .fp-fab .fp-spin{
    width:18px;height:18px;border-radius:50%;flex:none;
    border:2.4px solid rgba(255,255,255,.35);border-top-color:#fff;
    animation:fpSpin .8s linear infinite;
  }
  .fp-fab .fp-check{width:18px;height:18px;flex:none;display:flex;align-items:center;justify-content:center;}
  .fp-fab .fp-tx{display:flex;flex-direction:column;line-height:1.15;min-width:0;}
  .fp-fab .fp-t{font-size:12.5px;font-weight:700;white-space:nowrap;}
  .fp-fab .fp-s{font-size:10.5px;font-weight:500;opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  @keyframes fpSpin{to{transform:rotate(360deg);}}
  @keyframes fpPop{from{opacity:0;transform:translateY(8px) scale(.9);}to{opacity:1;transform:translateY(0) scale(1);}}

  /* ===== tappable home cards ===== */
  .tappable{cursor:pointer;transition:transform .18s ease,box-shadow .25s ease;}
  .tappable:active{transform:scale(.985);}

    transform:translateX(100%);transition:transform .36s cubic-bezier(.32,.72,.3,1);

  .subscreen::before{
    content:"";position:absolute;top:-120px;left:-60px;width:340px;height:340px;border-radius:50%;
    filter:blur(72px);opacity:.5;z-index:0;pointer-events:none;background:#C9D8FF;

  /* invite screen */
  .invite-ic{width:74px;height:74px;border-radius:50%;background:#FFF3EC;color:#C2410C;display:flex;align-items:center;justify-content:center;margin:14px auto 16px;}

  /* v1.11.31: toast ringan non-blocking (feedback "Tautan tersalin", dll) */
  .app-toast{position:fixed;left:50%;bottom:calc(24px + env(safe-area-inset-bottom,0px));transform:translate(-50%,16px);z-index:9999;display:flex;align-items:center;gap:8px;max-width:min(88vw,340px);padding:12px 16px;border-radius:14px;background:#1A1A22;color:#fff;font-family:inherit;font-size:13px;font-weight:700;line-height:1.35;box-shadow:0 10px 30px rgba(0,0,0,.28);opacity:0;pointer-events:none;transition:opacity .22s ease,transform .22s ease;}

  /* Mode "anchored": posisi (left/top) diatur via JS di dekat elemen yang diklik. */

  .app-toast.anchored.show{transform:translateY(0);}

  /* ===== WhatsApp connect screen ===== */
  .wa-hero{background:linear-gradient(160deg,#25D366,#128C7E);border-radius:22px;padding:22px 18px;color:#fff;text-align:center;box-shadow:0 14px 30px -12px rgba(18,140,126,.6);margin-bottom:16px;}

  .wa-hero-d{font-size:12px;opacity:.92;margin-top:5px;line-height:1.5;}

  .wa-field label{display:block;font-size:11.5px;font-weight:700;color:#5A5670;margin:0 2px 6px;}
  .wa-phone{display:flex;gap:8px;align-items:stretch;}
  .wa-cc{display:flex;align-items:center;gap:5px;font-size:14px;font-weight:700;color:#1A1A22;background:#fff;border:1.5px solid #E4E3EE;border-radius:13px;padding:0 12px;flex:none;}
  .wa-phone input{flex:1;border:1.5px solid #E4E3EE;border-radius:13px;padding:13px 14px;font-family:inherit;font-size:14px;font-weight:600;color:#1A1A22;outline:none;transition:border-color .18s ease;}
  .wa-phone input:focus{border-color:#25D366;}
  .wa-connect{width:100%;border:none;border-radius:14px;padding:15px;background:#25D366;color:#fff;font-family:inherit;font-size:14.5px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 10px 22px -8px rgba(37,211,102,.7);-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:filter .15s ease,transform .12s ease;}
  .wa-connect:hover{filter:brightness(1.04);}
  .wa-connect:active{transform:scale(.97);}
  .wa-connect:disabled{background:#A9DDC0;box-shadow:none;cursor:default;}
  .wa-or{text-align:center;font-size:11px;font-weight:700;color:#A7A4B8;letter-spacing:.08em;margin:16px 0;position:relative;}
  .wa-or::before,.wa-or::after{content:"";position:absolute;top:50%;width:34%;height:1px;background:#EAE9F1;}

  .wa-code-box{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:19px;font-weight:700;letter-spacing:.06em;color:#1A1A22;background:#fff;border:1.5px dashed #B8E6CC;border-radius:14px;padding:15px;text-align:center;box-shadow:var(--sh-sm);}

  .wa-step:last-child{border-bottom:none;}
  .wa-step-n{width:24px;height:24px;border-radius:50%;background:#25D366;color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex:none;margin-top:1px;}
  .wa-step-t{font-size:13px;font-weight:700;color:#1A1A22;}
  .wa-step-d{font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.5;}
  .wa-status{display:flex;align-items:center;gap:9px;justify-content:center;font-size:12.5px;font-weight:700;padding:13px;border-radius:13px;margin-top:6px;}
  .wa-status.wait{background:#FFF7E6;color:#B45309;}
  .wa-status.ok{background:#E7F8EF;color:#15803D;}
  .wa-status .invite-dot{width:9px;height:9px;border-radius:50%;}

  .wa-api-note{font-size:10.5px;color:#94909F;line-height:1.55;background:#FAFAFC;border:1px solid #EEEDF4;border-radius:12px;padding:11px 12px;margin-top:14px;}
  .wa-api-note b{color:#5A5670;}
  .wa-disconnect{width:100%;border:1px solid #F3D6CB;background:#fff;border-radius:13px;padding:13px;margin-top:14px;color:#C2410C;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;}

  /* ===== manual input: split form + live preview ===== */

  .addsplit.embedded .add-formpane{background:#fff;border:1px solid #EDECF4;border-radius:18px;padding:14px;box-shadow:var(--sh-sm);}
  .prev-hd{font-size:12.5px;font-weight:800;color:#2455C4;display:flex;align-items:center;gap:7px;margin-bottom:12px;}

  .prev-dot{width:9px;height:9px;border-radius:50%;flex:none;}
  .prev-dot.in{background:#16A34A;} .prev-dot.out{background:#DC2626;}
  .prev-vals{display:flex;align-items:center;justify-content:flex-end;flex-wrap:wrap;gap:6px;min-width:0;flex:1 1 auto;text-align:right;font-variant-numeric:tabular-nums;}
  .prev-now{font-size:13px;font-weight:700;color:#6B6880;white-space:nowrap;}
  .prev-arr{font-size:13px;color:#9A96A8;flex:none;}
  .prev-new{font-size:13.5px;font-weight:800;white-space:nowrap;}

  .prev-sep{height:1px;background:#E5EBF6;margin:10px 0;}
  .prev-hint{font-size:11px;color:#7E7B90;margin-top:10px;line-height:1.45;}
  /* ===== Catatan Arus Kas: filter + per-tanggal ===== */
  .cf-chips{display:flex;gap:8px;overflow-x:auto;padding:2px 0;-ms-overflow-style:none;scrollbar-width:none;flex:1;min-width:0;}
  .cf-chips::-webkit-scrollbar{display:none;}
  .cf-chip{flex:none;border:1px solid #E4E3EE;background:#fff;border-radius:999px;padding:8px 15px;font-family:inherit;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;}
  .cf-chip.on{background:var(--accent,#2563EB);border-color:var(--accent,#2563EB);color:#fff;}
  .cf-filterbar{display:flex;align-items:center;gap:9px;margin:12px 0;}

  .cf-act svg{width:16px;height:16px;}
  .cf-daterange{display:flex;align-items:flex-end;gap:9px;margin-bottom:12px;}
  .cf-dr-fld{flex:1;min-width:0;}
  .cf-dr-fld label{display:block;font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px;}
  .cf-dr-fld input{width:100%;box-sizing:border-box;height:38px;border:1px solid #E4E3EE;border-radius:10px;padding:0 10px;font-family:inherit;font-size:12.5px;font-weight:600;background:#FAFAFD;color:#1A1A22;-webkit-appearance:none;appearance:none;}
  /* hilangkan ruang putih berlebih pada date-picker bawaan WebKit */

  .cf-main{flex:1;min-width:0;}

  .cf-pic{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;border-radius:50%;font-size:9.5px;font-weight:800;color:#fff;margin-right:6px;vertical-align:1px;flex:none;}
  .cf-pic.reza{background:#EA6A2E;} .cf-pic.dini{background:#F4A93C;}
  .cf-m{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  .cf-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex:none;}

  .cf-srctag{font-size:9px;font-weight:800;letter-spacing:.03em;text-transform:uppercase;color:#94909F;background:#F1F2F7;border-radius:6px;padding:2px 6px;}
  /* ===== Bulk delete (drag-to-select) — Arus Kas & Tinjau AI ===== */
  .sel-btn{border:1px solid var(--accent,#2563EB);background:#fff;color:var(--accent,#2563EB);font-family:inherit;font-size:12px;font-weight:800;border-radius:9px;padding:6px 12px;cursor:pointer;white-space:nowrap;}

  .selbar-top .sel-hint{font-size:11.5px;color:var(--muted);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  /* lingkaran centang di kiri baris (muncul hanya saat mode pilih) */
  .selck{width:22px;height:22px;border-radius:50%;border:2px solid #C9CAD6;flex:none;display:flex;align-items:center;justify-content:center;background:#fff;transition:background .12s,border-color .12s;}

  /* ===== Berdua: kontribusi (ganti saldo penyeimbang) ===== */

  .contrib-person{display:flex;align-items:center;gap:11px;}

  .contrib-legend{display:flex;gap:16px;justify-content:center;font-size:10.5px;color:var(--muted);font-weight:600;margin:12px 0 6px;}

  /* ===== v1.9.0: kontribusi user vs pasangan ringkas (beranda Pengeluaran per Kategori) ===== */
  .khc-contrib{margin-top:14px;padding-top:13px;border-top:1px solid var(--line);}
