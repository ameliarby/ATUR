  Entertainment:'Belanja & Perawatan',
  'Tax/Fee':'Pajak & Biaya', Interest:'Pajak & Biaya',
  'Other Expense':'Lainnya'
};
function donutCatOf(cat){ return CAT_TO_DONUT[cat] || 'Lainnya'; }

// DIBATASI ke BULAN TERPILIH (focusMonth) — sehingga "Pengeluaran per Kategori",
// "Anggaran Bulan Ini" & kontribusi bersama menyesuaikan bulan yang dipilih

// & proyeksi tahunan TIDAK lewat sini — mereka tetap akumulasi semua bulan.
function curMonthTxns(){
  const target=2026*100+(Math.max(0,Math.min(months.length-1,focusMonth))+1);

function deriveSig(){ return currentMode+':'+activeTxns().length+':'+_seqCounter+':'+focusMonth; }

  txns.forEach(t=>{

      // donut "pengeluaran per kategori" agar chart & label kategori tetap sinkron
      // (kalau tidak, semua setoran menumpuk di slice 'Lainnya').
      const isSave=(ck==='Investment Return'||ck==='Setor Tabungan')||((t.sub||'').toLowerCase()==='saving');
      // donut kategori (hanya belanja nyata)
      if(!isSave){ const dk=donutCatOf(ck); byDonut[dk]=(byDonut[dk]||0)+v; }
      // kategori taksonomi kanonik (dipakai pagu per-kategori arus kas)
      byCat[ck]=(byCat[ck]||0)+v;
      // pagu rumah tangga (Berdua) — pakai kategori kanonik agar cocok CAT_TO_BUDGET
      const bk=CAT_TO_BUDGET[ck]; if(bk) byBudget[bk]=(byBudget[bk]||0)+v;
      // kontribusi per PIC (siapa penanggung jawab transaksi)
      const who=txnPic(t);
      if(byPic[who]){ if(isSave) byPic[who].saving+=v; else byPic[who].expense+=v; }
      // donut kategori × PIC (Berdua: pengeluaran per kategori per orang, 1:1 nama donut)
      if(!isSave){
        const dk=donutCatOf(ck);
        if(!byDonutPic[dk]) byDonutPic[dk]={reza:0,dini:0,total:0};
        if(byDonutPic[dk][who]!==undefined) byDonutPic[dk][who]+=v;
        byDonutPic[dk].total+=v;
      }
    }
    // transfer tidak dimasukkan ke ringkasan pemasukan/pengeluaran per bank
    if(t.dir!=='transfer'){
      const bnk=t.bank||'Lainnya';
      if(!byBank[bnk]) byBank[bnk]={inn:0,out:0};
      byBank[bnk][t.dir==='in'?'inn':'out']+=v;
    }
  });
  _deriveCache={ count:txns.length, inn, out, trf, net:inn-out, byDonut, byBudget, byBank, byPic, byCat, byDonutPic };
  _deriveSig=sig;
  return _deriveCache;
}
function invalidateDerive(){ _deriveCache=null; _deriveSig=''; }
// Kategori donut (cats) ter-update dari transaksi bila ada data; jika belum ada
// transaksi pengeluaran sama sekali, pakai komposisi demo bawaan.
function donutCats(){
  const d=deriveAll();
  const totalOut=Object.values(d.byDonut).reduce((a,b)=>a+b,0);
  if(totalOut<=0) return cats.map(c=>({...c, amt:0, pc:0}));
  return cats.map(c=>{
    const amt=d.byDonut[c.nm]||0;
    return {...c, amt, pc:Math.round(amt/totalOut*100)};
  }).sort((a,b)=>(b.amt||0)-(a.amt||0));
}
// Kategori yang BENAR-BENAR punya pengeluaran (pc/amt > 0), sudah terurut
// dari terbesar. Dipakai agar daftar kategori menyesuaikan transaksi user:
// kalau user hanya punya transaksi "Makanan", cuma kategori itu yang muncul.
function donutCatsActive(){
  return donutCats().filter(c=>(c.amt||0)>0 && (c.pc||0)>0);
}
// Beranda: tampilkan MAKSIMAL 6 kategori dengan pengeluaran terbesar.
// Sisanya (>6) hanya muncul di landing page "Pengeluaran per Kategori".
const DONUT_HOME_MAX=6;
function donutCatsHome(){
  const act=donutCatsActive();
  if(act.length===0) return donutCats().slice(0,DONUT_HOME_MAX); // demo kosong
  return act.slice(0,DONUT_HOME_MAX);
}
function donutCatsHidden(){
  const act=donutCatsActive();
  return Math.max(0, act.length-DONUT_HOME_MAX);
}
// Pagu (key) -> rupiah pengeluaran
function budgetSpent(key){
  const d=deriveAll();
  return (d.byBudget[key]||0)/1e6; // juta
}
// Pengeluaran (juta) untuk satu kartu pagu mode Sendiri.
// Nama kartu pagu Sendiri kini SAMA PERSIS dengan nama kategori donut/arus kas,
// sehingga angka "terpakai" pada pagu = total pengeluaran kategori itu di Arus Kas.
// Bila nama lama (mis. 'Hiburan'/'Belanja') masih tersimpan, dipetakan via tabel.
const SENDIRI_BUDGET_TO_DONUT = {
  'Hiburan':'Lainnya',
  'Belanja':'Lainnya'
};
function sendiriDonutKey(b){
  // identitas dulu (nama pagu == nama donut), lalu tabel kompatibilitas, lalu 'Lainnya'.
  if(cats.some(c=>c.nm===b.nm)) return b.nm;
  return SENDIRI_BUDGET_TO_DONUT[b.nm] || 'Lainnya';
}
function sendiriBudgetSpent(b){
  const d=deriveAll();
  // "Terpakai" pada kartu pagu = pengeluaran kategori INI saja (per kategori, bukan
  // gabungan/keseluruhan). Cocokkan pakai kunci kanonik agar nama pagu ('Food' atau
  // 'Makanan & Minuman' atau nama lama) menemukan angka byCat kategori yang sama.
  const key=canonCat(b.nm);
  if(d.byCat && (key in d.byCat)) return (d.byCat[key]||0)/1e6;
  // Nama pagu lama yang hanya cocok sebagai nama donut (mis. 'Hiburan'/'Belanja'
  // dipetakan ke 'Lainnya') — jumlahkan hanya transaksi yg kategori kanoniknya
  // juga jatuh ke donut yang sama, TANPA mencampur kategori lain di luar itu.
  const dk=sendiriDonutKey(b);
  let sum=0;
  Object.keys(d.byCat||{}).forEach(ck=>{ if(donutCatOf(ck)===dk) sum+=d.byCat[ck]; });
  return sum/1e6;
}

// Transaksi pengeluaran (bulan fokus) milik SATU kartu pagu Sendiri — dipakai untuk
// rincian belanja harian per kategori. Aturan pencocokan identik dengan
// sendiriBudgetSpent: pertama coba kunci kanonik (per kategori presisi); bila nama
// pagu lama (mis. 'Hiburan'/'Belanja') hanya cocok sebagai donut, ambil semua txn yang
// kategori kanoniknya jatuh ke donut yang sama.
function sendiriBudgetTxns(b){
  const key=canonCat(b.nm);
  const byCatHasKey = (function(){ const d=deriveAll(); return d.byCat && (key in d.byCat); })();
  const dk=sendiriDonutKey(b);
  return curMonthTxns().filter(t=>{
    if(t.dir!=='out') return false;
    const ck=canonCat(t.cat)||'Lainnya';
    return byCatHasKey ? (ck===key) : (donutCatOf(ck)===dk);
  });
}

// Rincian belanja HARIAN untuk satu kartu pagu: [{key, label, amt}] urut tanggal naik,
// plus rata-rata belanja/hari (dibagi jumlah hari yang benar-benar ada transaksi).
function budgetDailyBreakdown(b){
  const txns=sendiriBudgetTxns(b);
  const byDay={}; // key tanggal -> {key, day, label, amt}
  txns.forEach(t=>{
    const nd=normDate(t.date); if(!nd.key) return;
    const day=nd.key%100;
    if(!byDay[nd.key]) byDay[nd.key]={key:nd.key, day, label:nd.label, amt:0};
    byDay[nd.key].amt += txnIDR(t);
  });
  const days=Object.values(byDay).sort((a,b)=>a.key-b.key);
  const total=days.reduce((a,d)=>a+d.amt,0);
  const avg = days.length ? Math.round(total/days.length) : 0;
  const peak = days.reduce((m,d)=>Math.max(m,d.amt),0);
  return { days, total, avg, peak, nDays:days.length };
}

// Daftar transaksi (semua, gabungan sumber) untuk satu kategori donut ->
// [judul, tgl, "Rp x", bank/sumber, pic]. Elemen ke-5 (pic: 'reza'/'dini')
// dipakai chips filter Amel/Pasangan di layar detail kategori (mode Berdua).
function txnsForDonutCat(nm){
  const d=deriveAll();
  const totalOut=Object.values(d.byDonut).reduce((a,b)=>a+b,0);
  if(totalOut<=0) return null; // belum ada data -> pakai demo catDetail
  return curMonthTxns()
    .filter(t=>t.dir==='out' && donutCatOf(canonCat(t.cat))===nm)
    .map(t=>{ const nd=normDate(t.date); return [t.ket||t.sender||'Transaksi', nd.label, 'Rp '+jtfmt(manualParse(t.amt)), (t.bank||t.source||''), txnPic(t)]; });
}

// Ubah <select> jadi input teks inline saat user pilih "+ Tambah…": ketik manual lalu Enter/blur.
function inlineAddSelect(selectEl, placeholder, onCommit, onCancel){
  if(!selectEl) return;
  const wrap=document.createElement('div'); wrap.className='inline-add';
  const inp=document.createElement('input');
  inp.type='text'; inp.className='form-in inline-add-in'; inp.placeholder=placeholder;
  const ok=document.createElement('button'); ok.type='button'; ok.className='inline-add-ok'; ok.textContent='✓';
  const no=document.createElement('button'); no.type='button'; no.className='inline-add-no'; no.textContent='✕';
  wrap.appendChild(inp); wrap.appendChild(ok); wrap.appendChild(no);
  selectEl.style.display='none';
  selectEl.parentNode.insertBefore(wrap, selectEl.nextSibling);
  let done=false;
  const cleanup=()=>{ wrap.remove(); selectEl.style.display=''; };
  const commit=()=>{ if(done) return; const v=(inp.value||'').trim(); if(!v){ cancel(); return; } done=true; cleanup(); onCommit(v); };
  const cancel=()=>{ if(done) return; done=true; cleanup(); if(onCancel) onCancel(); };
  ok.addEventListener('click',commit);
  no.addEventListener('click',cancel);
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); commit(); } else if(e.key==='Escape'){ cancel(); } });
  // Blur HANYA meng-commit bila sudah ada teks. JANGAN auto-cancel saat kosong —
  // sebelumnya blur dini (mis. native select picker menutup) memicu cancel sehingga
  // kolom teks "hilang begitu saja" sebelum user sempat mengetik. Biarkan terbuka.
  inp.addEventListener('blur',()=>setTimeout(()=>{
    if(done) return;
    if(document.activeElement===ok || document.activeElement===no || document.activeElement===inp) return;
    if((inp.value||'').trim()) commit(); // ada teks -> simpan; kosong -> tetap terbuka
  },150));
  setTimeout(()=>inp.focus(),30);
}

    'Tarik napas, uangmu sudah dicatat dengan baik. 💆'
  ]
};
let _greetSlot='pagi', _greetIdx=0, _greetTimer=null;

function currentGreetSlot(){
  const h=new Date().getHours();
  if(h>=11&&h<15) return 'siang';
  if(h>=15&&h<18) return 'sore';
  if(h>=18||h<4) return 'malam';
  return 'pagi';
}

function applySubGreet(){
  const s=document.getElementById('subGreet');
  if(!s) return;
  if(currentMode==='b'){
    s.textContent='Atur keuangan bersama, transparan tanpa drama. 💞';
    return;
  }
  const list=GREET_SUB[_greetSlot]||GREET_SUB.pagi;
  const txt=list[_greetIdx % list.length]||'';
  // animasi halus saat berganti
  s.style.transition='opacity .35s ease';
  s.style.opacity='0';
  setTimeout(()=>{ s.textContent=txt; s.style.opacity='1'; },180);
}

function startGreetLoop(){
  if(_greetTimer) return;
  _greetTimer=setInterval(()=>{
    const slot=currentGreetSlot();
    if(slot!==_greetSlot){ _greetSlot=slot; _greetIdx=0; }
    else { _greetIdx++; }
    // hanya animasikan jika tab terlihat & masih di mode sendiri
    if(document.visibilityState!=='hidden') applySubGreet();
  },10000);
}

function setGreeting(){
  _greetSlot=currentGreetSlot();
  let word='Pagi', emo='☀️';
  if(_greetSlot==='siang'){word='Siang';emo='🌤️';}
  else if(_greetSlot==='sore'){word='Sore';emo='🌇';}
  else if(_greetSlot==='malam'){word='Malam';emo='🌙';}
  const g=document.getElementById('greetLine');
  const s=document.getElementById('subGreet');
  if(currentMode==='b'){
    if(g) g.innerHTML=`${word}, <span>${myName()} & ${partnerDisplay()}</span> ${emo}`;
    if(s){ s.style.opacity='1'; s.textContent='Atur keuangan bersama, transparan tanpa drama. 💞'; }
  } else {
    if(g) g.innerHTML=`${word}, <span>${myName()}</span> ${emo}`;
    if(s){ s.style.opacity='1'; applySubGreet(); }
  }
  startGreetLoop();
}

// Opsional: minta server AI ATUR menyegarkan variasi sub-kalimat (tone casual).
// Aman & non-blocking — gagal/diam = tetap pakai daftar statis di atas.
async function refreshGreetingLines(){
  try{
    const r=await fetch('/api/greeting-lines',{method:'GET',headers:{'Accept':'application/json'}});
    if(!r.ok) return;
    const data=await r.json();
    let changed=false;
    ['pagi','siang','sore','malam'].forEach(k=>{
      if(Array.isArray(data[k]) && data[k].length){
        GREET_SUB[k]=data[k].slice(0,5).map(x=>String(x).slice(0,90));
        changed=true;
      }
    });
    if(changed) applySubGreet();
  }catch(e){/* diam: pakai statis */}
}

// Slider & grafik proyeksi kekayaan di beranda (1–5 tahun), render ulang in-place.
function rerenderWealthProj(){
  const card=document.getElementById('sec-wealth'); if(!card) return;
  const old=card.querySelector('#wealthProj'); if(!old) return;
  // bangun ulang HTML blok proyeksi via screenHTML tidak praktis; render manual.
  const yr=Math.min(5,Math.max(1,wealthProjYear));
  const now=wealthTotalNow();
  const proj=wealthProjTotal(yr);
  const gain=proj-now;
  const avg=wealthAvgRate();
  const series=[0,1,2,3,4,5].map(y=>wealthProjTotal(y));
  const maxV=Math.max(...series,1);
  const bars=series.map((v,y)=>{
    const h=Math.max(6,Math.round(v/maxV*100));
    const on=(y===yr);
    return `<button type="button" class="wp-bar${on?' on':''}${y===0?' base':''}" data-projyr="${y}" style="--h:${h}%" aria-label="Tahun ${y}"><span class="wp-col"></span><span class="wp-yl">${y===0?'kini':y+'th'}</span></button>`;
  }).join('');
  old.innerHTML=`<div class="wp-head">
      <div class="wp-lbl">${I.spark} Proyeksi ${yr} tahun</div>
      <div class="wp-rate">~${avg.toFixed(1)}%/th rata-rata</div>
    </div>
    <div class="wp-val">${rpjt(proj)}</div>
    <div class="wp-gain">${gain>=0?'+':'−'}Rp ${jtfmt(Math.abs(gain))} dari nominal sekarang</div>
    <div class="wp-chart">${bars}</div>
    <div class="wp-sliderrow">
      <span class="wp-sl-lbl">1th</span>
      <input type="range" class="wp-slider" id="wealthProjSlider" min="1" max="5" step="1" value="${yr}">
      <span class="wp-sl-lbl">5th</span>
    </div>
    <div class="wp-note">Estimasi bunga majemuk per instrumen. Atur bunga %/tahun di tiap aset.</div>`;
  bindWealthProj();
}

// Re-render hero + grafik (in-place) saat bulan fokus berubah, tanpa reload homepage.
function rerenderMonthViews(){
  focusMonth=Math.max(0,Math.min(months.length-1,focusMonth));
  invalidateDerive(); // agregasi donut/pagu ikut bulan terpilih
  const heroSlot=document.getElementById('heroSlot');
  // grafik kini menyatu di dalam hero -> render ulang seluruh hero saja
  if(heroSlot && currentMode==='s'){ heroSlot.innerHTML=heroHTML('s'); bindMonthNav(); }
  else if(heroSlot && currentMode==='b'){ heroSlot.innerHTML=heroHTML('b'); bindMonthNav(); }
  // Kartu yang bergantung bulan: Pengeluaran per Kategori & Anggaran Bulan Ini.
  const kat=document.getElementById('sec-kategori');
  if(kat) kat.innerHTML=kategoriCardInner();
  const bud=document.getElementById('sec-budget');
  if(bud) bud.innerHTML=budgetCardInner();
}
function stepMonth(d){ focusMonth=Math.max(0,Math.min(months.length-1,focusMonth+d)); rerenderMonthViews(); }

// tombol panah & chevron Catatan di dalam hero (dirender ulang tiap ganti bulan)
function bindHeroNav(){

  if(hp) hp.addEventListener('click',e=>{ e.stopPropagation(); stepMonth(-1); });
  if(hn) hn.addEventListener('click',e=>{ e.stopPropagation(); stepMonth(1); });

function bindMonthNav(){
  bindHeroNav();
  // tombol & geser di kartu grafik (elemen ini TIDAK dirender ulang saat ganti bulan)
  const cp=document.getElementById('chartPrev'), cn=document.getElementById('chartNext'), sw=document.getElementById('chartSwipe');
  if(cp) cp.addEventListener('click',e=>{ e.stopPropagation(); stepMonth(-1); });
  if(cn) cn.addEventListener('click',e=>{ e.stopPropagation(); stepMonth(1); });
  if(sw){
    let x0=null,y0=null,moved=false;
    sw.addEventListener('touchstart',e=>{ x0=e.touches[0].clientX; y0=e.touches[0].clientY; moved=false; },{passive:true});
    sw.addEventListener('touchmove',e=>{ if(x0!=null && Math.abs(e.touches[0].clientX-x0)>8) moved=true; },{passive:true});
    sw.addEventListener('touchend',e=>{
      if(x0==null) return; const dx=e.changedTouches[0].clientX-x0, dy=e.changedTouches[0].clientY-(y0||0);
      if(Math.abs(dx)>36 && Math.abs(dx)>Math.abs(dy)){ e.stopPropagation(); stepMonth(dx<0?1:-1); }
      x0=null;
    });
    sw.addEventListener('click',e=>{ if(moved){ e.stopPropagation(); moved=false; } });
    let mx=null;
    sw.addEventListener('mousedown',e=>{ mx=e.clientX; });
    sw.addEventListener('mouseup',e=>{ if(mx==null) return; const dx=e.clientX-mx; if(Math.abs(dx)>40){ e.stopPropagation(); stepMonth(dx<0?1:-1); } mx=null; });
  }
}

function setMode(mode){
  if(mode===currentMode) return;
  // v1.11.20: masuk ATUR Berdua tidak lagi lewat gerbang input nama pasangan.
  // User langsung masuk dashboard Berdua; bila belum terhubung, dashboard
  // menampilkan kartu ajak-pasangan (Hubungkan via WhatsApp) — bukan form nama.
  if(mode==='b' && !APP.berduaSetup){ APP.berduaSetup=true; saveApp(); }
  currentMode=mode;
  swapProjStore(mode); // tukar goals/scheduledCosts/fixed* agar terpisah per mode
  // Masuk mode Berdua saat login cloud + punya household → tarik data gabungan
  // dari backend (sync 2 akun) & pastikan listener real-time terpasang.
  if(mode==='b' && typeof berduaCloudActive==='function' && berduaCloudActive()){
    if(typeof syncBerduaRealtime==='function') syncBerduaRealtime(()=>{ if(typeof refreshBerduaViews==='function') refreshBerduaViews(); });
    if(typeof syncBerduaInitial==='function') syncBerduaInitial();
  }
  const screen=document.getElementById('screen');
  const heroSlot=document.getElementById('heroSlot');
  const duoLinkSlot=document.getElementById('duoLinkSlot');
  const ledgerSlot=document.getElementById('ledgerSlot');

  screen.classList.toggle('mode-s', mode==='s');
  screen.classList.toggle('mode-b', mode==='b');
  refreshTag();
  setGreeting();

  [heroSlot,duoLinkSlot,ledgerSlot].forEach(el=>el.classList.add('fading'));
  setTimeout(()=>{
    // Render ULANG seluruh dashboard dari screenHTML(mode) agar SEMUA kartu yang
    // bergantung mode ikut tersegar (Pengeluaran per Kategori, Sumber Kekayaan,
    // Proyeksi). Mencegah bug bar kontribusi pasangan "nyangkut" di mode Sendiri.
    refreshDash();
  },220);
}

/* manual transaction store (demo: in-memory, persisted to localStorage when available) */
let manualTxns = [];
let catatanFilter = 'all';
let catatanDir = 'all'; // 'all' | 'in' | 'out'
let catatanFrom = ''; // ISO yyyy-mm-dd atau ''
let catatanTo = '';   // ISO yyyy-mm-dd atau ''
let catatanDateOpen = false; // panel rentang tanggal disembunyikan secara default

// Filter penanggung jawab di layar detail transaksi per kategori (Berdua):
// '' = semua, 'reza' = user, 'dini' = pasangan. Di-reset tiap kali membuka
// layar detail kategori agar tidak "nyangkut" dari kunjungan sebelumnya.

// membangun ulang layar yang sama saat filter berubah).

try { manualTxns = JSON.parse(localStorage.getItem('atur_manual_txns')||'[]'); } catch(e){ manualTxns=[]; }

// ATUR Berdua memakai STORE TERPISAH dari ATUR Sendiri. Transaksi yang dicatat
// di mode Berdua TIDAK tercampur / tersinkron dengan mode Sendiri, dan sebaliknya.
// Keduanya default KOSONG sampai user menambah transaksi sendiri.
let householdTxns = [];
try { householdTxns = JSON.parse(localStorage.getItem('atur_household_txns')||'[]'); } catch(e){ householdTxns=[]; }
householdTxns.forEach((t,i)=>{ if(!t.id) t.id='h'+i+'_'+(t.date||'')+(t.time||''); });
// Store aktif sesuai mode: 's' (Sendiri) -> manualTxns, 'b' (Berdua) -> householdTxns.
function activeTxns(){ return currentMode==='b' ? householdTxns : manualTxns; }
function saveActiveTxns(){
  invalidateDerive();
  try{
    if(currentMode==='b') localStorage.setItem('atur_household_txns',JSON.stringify(householdTxns));
    else localStorage.setItem('atur_manual_txns',JSON.stringify(manualTxns));
  }catch(e){}
}
// seq = penanda urutan input/perubahan. Transaksi baru / yang diedit mendapat seq
// terbaru (terbesar) agar selalu muncul paling atas di tanggal yang sama —
// user tak perlu scroll ke bawah untuk melihat row yang baru saja diubah.
let _seqCounter = Math.max(
  manualTxns.reduce((m,t)=> Math.max(m, t.seq||0), 0),
  householdTxns.reduce((m,t)=> Math.max(m, t.seq||0), 0)
);
manualTxns.forEach(t=>{ if(t.seq==null) t.seq=++_seqCounter; }); // beri seq awal untuk data lama (urutan tersimpan)
householdTxns.forEach(t=>{ if(t.seq==null) t.seq=++_seqCounter; });
function nextSeq(){ return ++_seqCounter; }
// Seed e-statement transactions into the unified editable store (once) so every txn is editable/deletable.
function parseJt(s){ // "10,14jt" -> 10140000 ; "0,29jt" -> 290000 ; "850000" -> 850000
  s=(''+s).trim();
  if(/jt/i.test(s)){ const num=parseFloat(s.replace(/[^\d,\.]/g,'').replace(/\./g,'').replace(',','.'))||0; return Math.round(num*1e6); }
  return Math.round(parseFloat(s.replace(/[^\d]/g,''))||0);
}
function seedEstmtTxns(){
  if(manualTxns.some(t=>t.origin==='estmt')) return; // already seeded
  srcBreakdown.forEach(s=>{ s.txns.forEach((t,ti)=>{
    const v=parseJt(t.amt);
    manualTxns.push({
      id:'e_'+s.abbr+'_'+ti,
      origin:'estmt',
      seq:nextSeq(),
      dir:t.dir,
      amt:Math.round(v).toLocaleString('id-ID'),
      bank:s.nm,
      ket:(t.rmk&&t.rmk!=='—')?t.rmk:t.sender,
      date:t.date, time:t.time,
      cat:t.cat, sub:t.sub
    });
  }); });
  saveManualTxns();
}
function saveManualTxns(){ invalidateDerive(); try{ localStorage.setItem('atur_manual_txns',JSON.stringify(manualTxns)); }catch(e){} }

function bindAddForm(sub){
  const form=sub.querySelector('#addForm');
  if(!form) return;
  attachThousandFmt(form.querySelector('#f-amt'));
  // mode embedded di arus kas: ketuk area di luar pane input -> ke Catatan Arus Kas
  if(form.dataset.embedded==='1'){
    const pane=form.querySelector('.add-formpane');
    const goCf=()=>openScreen(scrCatatan());
    const backHint=form.querySelector('[data-cf-back]');
    if(backHint) backHint.addEventListener('click',goCf);
    form.addEventListener('click',(e)=>{
      // abaikan klik di dalam pane input atau pada tombol simpan
      if(e.target.closest('.add-formpane') || e.target.closest('#f-save') || e.target.closest('.form-note')) return;
      goCf();
    });
  }
  // direction toggle (3 jenis: out / in / transfer) — kategori ikut menyesuaikan jenis
  form.querySelectorAll('.dir-opt').forEach(opt=>{
    opt.addEventListener('click',()=>{
      form.querySelectorAll('.dir-opt').forEach(o=>o.classList.remove('on'));
      opt.classList.add('on');
      if(typeof rebuildCats==='function') rebuildCats(opt.dataset.dir);
    });
  });
  const fCat=form.querySelector('#f-cat');
  const fSub=form.querySelector('#f-sub');
  const fBank=form.querySelector('#f-bank');
  const fCur=form.querySelector('#f-cur');
  const curHint=form.querySelector('#f-cur-hint');
  function curDir(){ return form.querySelector('.dir-opt.on')?.dataset.dir || 'out'; }
  function fillSub(cat,sel){
    const list=taxonomy[cat]||['Others'];
    fSub.innerHTML=list.map(s=>`<option value="${s}"${s===sel?' selected':''}>${subLabel(s)}</option>`).join('')
                 +`<option value="__add__">+ Tambah sub…</option>`;
  }
  // Bangun ulang daftar kategori sesuai JENIS transaksi aktif (Pemasukan/Pengeluaran/Transfer).
  function rebuildCats(dir,sel){
    const keys=Object.keys(taxFor(dir));
    const pick=sel&&keys.includes(sel)?sel:keys[0];
    fCat.innerHTML=keys.map(c=>`<option value="${c}"${c===pick?' selected':''}>${catLabel(c)}</option>`).join('')+`<option value="__add__">+ Tambah kategori…</option>`;
    prevCat=pick; fillSub(pick);
  }
  // Tampilkan kurs ke IDR saat mata uang non-IDR dipilih.
  function refreshCurHint(){
    if(!fCur||!curHint) return;
    const code=fCur.value;
    if(code==='IDR'){ curHint.textContent=''; return; }
    const v=manualParse(form.querySelector('#f-amt').value);
    const r=curRate(code);
    curHint.textContent = `Kurs default: 1 ${code} = Rp ${r.toLocaleString('id-ID')}` + (v>0?` · ≈ Rp ${Math.round(v*r).toLocaleString('id-ID')}`:'');
  }
  if(fCur){ fCur.addEventListener('change',()=>{ refreshCurHint(); if(typeof refreshPreview==='function') refreshPreview(); }); }
  { const fa=form.querySelector('#f-amt'); if(fa) fa.addEventListener('input',refreshCurHint); refreshCurHint(); }
  // category change / + Tambah
  let prevCat=fCat.value;
  fCat.addEventListener('change',()=>{
    if(fCat.value==='__add__'){
      const dir=curDir();
      inlineAddSelect(fCat,'Nama kategori baru',(name)=>{ addTaxoCat(dir,name); rebuildCats(dir,name); },()=>{ rebuildCats(dir,prevCat); });
      return;
    }
    prevCat=fCat.value; fillSub(fCat.value);
  });
  // sub change / + Tambah
  let prevSub=fSub.value;
  fSub.addEventListener('change',()=>{
    if(fSub.value==='__add__'){
      const cat=fCat.value;
      inlineAddSelect(fSub,'Nama sub-kategori baru',(name)=>{ if(!taxonomy[cat]) taxonomy[cat]=[]; if(!taxonomy[cat].includes(name)) taxonomy[cat].push(name); fillSub(cat,name); prevSub=name; },()=>{ fSub.value=prevSub; });
      return;
    }
    prevSub=fSub.value;
  });
  // bank + Tambah
  let prevBank=fBank.value;
  fBank.addEventListener('change',()=>{
    if(fBank.value==='__add__'){
      inlineAddSelect(fBank,'Nama sumber / bank baru',(name)=>{ if(!sourceCatalog.some(s=>s.nm===name)) sourceCatalog.push({nm:name,abbr:name.slice(0,3).toUpperCase(),c:'#64748B',on:false}); fBank.innerHTML=sourceCatalog.map(s=>`<option value="${s.nm}"${s.nm===name?' selected':''}>${s.nm}</option>`).join('')+`<option value="__add__">+ Tambah sumber…</option>`; prevBank=name; },()=>{ fBank.value=prevBank; });
      return;
    }
    prevBank=fBank.value;
  });
  // save
  form.querySelector('#f-save').addEventListener('click',()=>{
    const amt=manualParse(form.querySelector('#f-amt').value);
    if(!amt || amt<=0){ appAlert('Isi nominal transaksi dulu ya.'); return; }
    const dir=form.querySelector('.dir-opt.on').dataset.dir;
    const ket=form.querySelector('#f-rmk').value.trim();
    const cur=(form.querySelector('#f-cur')?.value)||'IDR';
    const rec={
      id:(currentMode==='b'?'h':'m')+Date.now(),
      seq:nextSeq(),
      origin:'manual',
      dir,
      amt:(+amt).toLocaleString('id-ID'),
      cur, rate:curRate(cur),
      bank:fBank.value,
      ket: ket || dirLabel(dir),
      note:'',
      date:form.querySelector('#f-date').value,
      time:'—',
      cat:fCat.value, sub:fSub.value
    };
    // penanggung jawab (initial) — hanya mode Berdua; default ke user (reza)
    const pickedFPic=form.querySelector('.f-pic-pick .pic-opt.on')?.dataset.fpic;
    if(PIC_VALID.includes(pickedFPic)) rec.pic=pickedFPic;
    activeTxns().push(rec); saveActiveTxns();
    // Mode Berdua + cloud → dorong transaksi ke backend agar tersinkron ke pasangan.
    if(currentMode==='b' && typeof berduaCloudActive==='function' && berduaCloudActive()){
      pushTxnCloud(rec).catch(()=>{});
    }
    // langsung pindah ke Catatan Arus Kas
    openScreen(scrCatatan());
  });
  // toggle penanggung jawab (initial) pada form input manual (mode Berdua)
  const fPic=form.querySelector('.f-pic-pick');
  if(fPic){ fPic.querySelectorAll('.pic-opt').forEach(btn=>btn.addEventListener('click',()=>{
    const who=btn.dataset.fpic; if(!PIC_VALID.includes(who)) return;
    fPic.querySelectorAll('.pic-opt').forEach(x=>x.classList.remove('on','reza','dini'));
    btn.classList.add('on',who);
  })); }
  // live preview dampak ke arus kas bulan ini
  const prev=sub.querySelector('#addPreview');
  if(prev){
    const baseIn=+prev.dataset.baseIn, baseOut=+prev.dataset.baseOut;
    function refreshPreview(){
      const raw=manualParse(form.querySelector('#f-amt').value);
      const cur=(form.querySelector('#f-cur')?.value)||'IDR';
      const v=Math.round(raw*(cur==='IDR'?1:curRate(cur)));
      const dir=form.querySelector('.dir-opt.on').dataset.dir;
      const newIn = baseIn + (dir==='in'? v:0);
      const newOut= baseOut+ (dir==='out'? v:0);
      const elInArr=sub.querySelector('#pv-in-arr'), elInNew=sub.querySelector('#pv-in-new');
      const elOutArr=sub.querySelector('#pv-out-arr'), elOutNew=sub.querySelector('#pv-out-new');
      const elNet=sub.querySelector('#pv-net'), hint=sub.querySelector('#pv-hint');
      if(v>0 && dir==='in'){ elInArr.textContent='→'; elInNew.textContent=rpjt(newIn); } else { elInArr.textContent=''; elInNew.textContent=''; }
      if(v>0 && dir==='out'){ elOutArr.textContent='→'; elOutNew.textContent=rpjt(newOut); } else { elOutArr.textContent=''; elOutNew.textContent=''; }
      elNet.textContent=rpjt(newIn-newOut);
      elNet.className='prev-net '+((newIn-newOut)>=0?'pos':'neg');
      hint.textContent = v>0
        ? (dir==='in'? `Pemasukan bertambah ${rp(v)}.` : (dir==='transfer'? `Transfer ${rp(v)} dicatat (tidak memengaruhi pemasukan/pengeluaran).` : `Pengeluaran bertambah ${rp(v)}.`))
        : 'Isi nominal untuk lihat perubahannya secara langsung.';
    }
    form.querySelector('#f-amt').addEventListener('input',refreshPreview);
    const _fcur=form.querySelector('#f-cur'); if(_fcur) _fcur.addEventListener('change',refreshPreview);
    form.querySelectorAll('.dir-opt').forEach(o=>o.addEventListener('click',refreshPreview));
  }
}

/* ---------- v1.11.0 boot: cek sesi cloud → tamu → intro → gate ---------- */
// Routing setelah sesi cloud terdeteksi (dipakai boot() & onAuthStateChange).
// Dijaga agar tidak dobel-jalan oleh flag authRouted.
let authRouted=false;
async function routeAfterAuth(session){
  if(authRouted) return;
  authRouted=true;
  applySessionToApp(session);
  // Bersihkan token magic-link / kode OAuth dari URL biar tidak nyangkut saat refresh.
  try{ if(location.hash.includes('access_token')||location.hash.includes('type=')||location.search.includes('code=')){ history.replaceState(null,'',location.origin+location.pathname); } }catch(e){}
  // PENTING (pemisahan konsep):
  //  - urlJoin = kode undangan yang BENAR-BENAR datang dari URL (?join=).
  //    HANYA ini yang menentukan tampilan onboarding varian "join".
  //  - pendingJoin (localStorage/APP) hanya dipakai untuk MENYELESAIKAN accept
  //    setelah user memang tiba lewat undangan lalu login (mis. OAuth redirect).
  //    Ia TIDAK boleh memicu tampilan "Kamu diundang" pada login biasa.
  let urlJoin='';
  try{ urlJoin=new URLSearchParams(location.search).get('join')||''; }catch(e){}
  // Kode yang dipakai untuk proses accept: utamakan URL, lalu pendingJoin bila ADA
  // urlJoin sebelumnya (artinya user datang dari undangan & baru login).
  let joinCode = urlJoin;
  if(!joinCode){ try{ joinCode=localStorage.getItem('atur_pending_join')||APP.pendingJoin||''; }catch(e){} }
  // Flag alur undangan (di-set saat pasangan menekan "Masuk dengan Google" di
  // halaman "Kamu diundang"). Setelah OAuth redirect balik, ?join= sudah hilang
  // dari URL, jadi tampilan join dikenali lewat flag ini + pendingJoin.
  let joinFlow=false;
  try{ joinFlow = APP.joinFlow || localStorage.getItem('atur_join_flow')==='1'; }catch(e){ joinFlow=!!APP.joinFlow; }
  // Tampilan join: undangan dari URL kunjungan ini, ATAU kembali dari Google
  // dalam alur undangan (joinFlow) dengan kode masih tersimpan.
  const showJoinUI = !!urlJoin || (joinFlow && !!joinCode);
  let joined=false;
  if(urlJoin){
    // Simpan agar tetap ada bila user baru harus isi nama dulu sebelum accept selesai.
    APP.pendingJoin=urlJoin; saveApp();
    try{ localStorage.setItem('atur_pending_join', urlJoin); }catch(e){}
    try{ history.replaceState(null,'',location.origin+location.pathname); }catch(e){}
  }
  migrateLocalToCloud().catch(()=>{});
  // === Requirement A & B: user login BARU (belum punya nama) → SELALU isi nama dulu. ===
  const isNewProfile = !((APP.name||'').trim());
  if(isNewProfile || !APP.profileDone){
    // Varian "join": undangan dari URL, atau kembali dari Google dalam alur undangan.
    // Selain itu → varian login biasa. Bersihkan flag joinFlow setelah dipakai.
    if(showJoinUI){ APP.joinFlow=false; saveApp(); try{ localStorage.removeItem('atur_join_flow'); }catch(e){} }
    mountOnboarding(showJoinUI ? {mode:'join', code:joinCode, step:'name'} : {mode:'login'});
    return;
  }
  // Profil sudah lengkap & memang datang dari undangan (URL / alur Google join)
  // → proses accept lalu masuk Berdua. Login biasa tak boleh ikut ke sini.
  if(joinCode && showJoinUI){
    let res=null;
    try{ res=await acceptInvite(joinCode); joined=true; }catch(e){}
    APP.pendingJoin=''; APP.joinFlow=false; saveApp();
    try{ localStorage.removeItem('atur_pending_join'); localStorage.removeItem('atur_join_flow'); }catch(e){}
    // Self-invite (pengundang buka link-nya sendiri) → JANGAN masuk sebagai
    // "pasangan yang baru gabung". Lanjut ke penanganan pengundang di bawah,
    // yang akan menarik nama pasangan (bila sudah gabung) lalu ke dashboard.
    if(joined && res && res.self){ /* jatuh ke blok pengundang */ }
    else if(joined){ enterBerduaAfterJoin(); return; }
  }
  // Pengundang (sudah punya household): pastikan display_name-nya tercatat &
  // tarik nama pasangan bila sudah bergabung, supaya greeting Berdua benar.
  if(APP.householdId){
    try{
      const c=initSupabase();
      if(c && (APP.name||'').trim()){
        await c.from('household_members').update({ display_name:APP.name.trim() })
          .eq('household_id',APP.householdId).eq('user_id',session.user.id);
      }
      const nm=await fetchPartnerName(APP.householdId, session.user.id);
      if(nm){ APP.partner=nm; berduaConnected=true; saveApp(); syncNames(); }
    }catch(e){}
    // Sudah tersambung household → pasang listener real-time & tarik data Berdua
    // gabungan sekarang (cache householdTxns) supaya begitu user membuka mode
    // Berdua datanya sudah tersinkron. Mode Sendiri (manualTxns) tak tersentuh.
    try{
      if(typeof berduaCloudActive==='function' && berduaCloudActive()){
        if(typeof syncBerduaRealtime==='function') syncBerduaRealtime(()=>{ if(typeof refreshBerduaViews==='function') refreshBerduaViews(); });
        if(typeof syncBerduaInitial==='function') syncBerduaInitial(false);
      }
    }catch(e){}
  }
  mountPhone();
}
// Masuk langsung ke dashboard ATUR BERDUA (bukan Sendiri) setelah pasangan gabung.
function enterBerduaAfterJoin(){
  APP.berduaSetup=true; berduaConnected=true; currentMode='b';
  saveApp(); syncNames();
  try{ swapProjStore('b'); }catch(e){}
  mountPhone();
  // Pastikan tampilan aktif mode-b (mountPhone default bisa render mode-s).
  try{
    const screen=document.getElementById('screen');
    if(screen){ screen.classList.add('mode-b'); screen.classList.remove('mode-s'); }
    if(typeof refreshTag==='function') refreshTag();
    if(typeof setGreeting==='function') setGreeting();
    if(typeof refreshDash==='function') refreshDash();
    if(typeof syncBerduaRealtime==='function') syncBerduaRealtime(()=>{ if(typeof refreshBerduaViews==='function') refreshBerduaViews(); });
    // Pasangan baru gabung → tarik data Berdua gabungan dari backend.
    if(typeof syncBerduaInitial==='function') syncBerduaInitial();
  }catch(e){}
}
async function boot(){
  // Tangkap ?join= SEDINI mungkin & simpan supaya bertahan melewati login
  // (OAuth Google / magic-link email me-redirect balik → tanpa ini kode hilang).
  try{
    const jp=new URLSearchParams(location.search).get('join');
    if(jp){ APP.pendingJoin=jp; saveApp(); localStorage.setItem('atur_pending_join', jp); }
  }catch(e){}
  // Dengarkan perubahan sesi: menangkap kasus token magic-link/OAuth yang baru
  // selesai ditukar SETELAH boot() sempat menampilkan Welcome (hindari race).
  try{
    const c=initSupabase();
    if(c && c.auth && c.auth.onAuthStateChange){
      c.auth.onAuthStateChange((event,session)=>{
        if(session && (event==='SIGNED_IN'||event==='INITIAL_SESSION'||event==='TOKEN_REFRESHED')){
          routeAfterAuth(session);
        }
      });
    }
  }catch(e){}
  try{
    const session = await currentSession();
    if(session){ await routeAfterAuth(session); return; }
  }catch(e){ /* offline / SDK gagal → fallback ke tamu */ }
  // Undangan Berdua HANYA dianggap aktif bila datang dari URL (?join=) pada kunjungan
  // ini. Sisa kode di localStorage TIDAK boleh memicu tampilan "Kamu diundang" pada
  // kunjungan biasa (mis. pengundang yang sebelumnya membuat undangan). Ini mencegah
  // login Google/Email biasa salah masuk ke varian "join".
  let urlJoin='';
  try{ urlJoin=new URLSearchParams(location.search).get('join')||''; }catch(e){}
  if(urlJoin){
    APP.pendingJoin=urlJoin; saveApp();
    try{ localStorage.setItem('atur_pending_join', urlJoin); }catch(e){}
    // Pasangan yang buka undangan → SELALU tampilkan halaman "Kamu diundang"
    // (varian join) lebih dulu, TANPA pernah merender Welcome/Home Sendiri.
    //  - Sudah cloud → mountOnboarding langsung ke tahap isi nama.
    //  - Belum login → mountOnboarding tahap PILIHAN (Masuk Google / tanpa login).
    mountOnboarding({mode:'join', code:urlJoin}); return;
  }
  // Belum login: default opening = layar Welcome (login + slide), BUKAN langsung Home.
  // Guest yang sudah pernah menyelesaikan onboarding tetap dibawa ke Home.
  if(APP.authMode==='guest' && APP.profileDone){ mountPhone(); return; }
  mountWelcome();
}
boot();
</script>
